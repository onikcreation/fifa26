function fbKeyToTeamKey(fbKey){
  // 1. explicit rename map (fast path for known rank changes)
  if(_TEAM_KEY_RENAMED[fbKey])return _TEAM_KEY_RENAMED[fbKey];
  const dotKey=fbKey.replace(/_/g,'.');
  // 2. exact match in TEAMS
  if(TEAMS[dotKey])return dotKey;
  // 3. fuzzy: find TEAMS key with same name ignoring rank number
  const name=_stripRank(dotKey);
  const found=Object.keys(TEAMS).find(k=>_stripRank(k)===name);
  return found||dotKey;
}
// TEAMS key → Firebase key
function teamKeyToFbKey(teamKey){
  return teamKey.replace(/[.#$[\]]/g,'_');
}

function loadSquads(){
  document.getElementById('sqGrid').innerHTML=`<div class="sq-loading" style="grid-column:1/-1"><i class='fas fa-spinner fa-spin'></i> ${(window._S).sqLoading}</div>`;
  onValue(ref(db,'squads'),snap=>{
    sqData=snap.val()||{};
    sqLoaded=true;

    // Sort and pick first team
    const sorted=Object.keys(sqData).sort((a,b)=>{
      const ra=parseInt(getRank(fbKeyToTeamKey(a)))||999;
      const rb=parseInt(getRank(fbKeyToTeamKey(b)))||999;
      return ra-rb;
    });

    // Set first team as active BEFORE building buttons
    if(sorted.length>0)sqTeam=sorted[0];

    buildSqGrpBtns();
    buildSqTeamBtns();

    if(sqTeam){
      // Show position filter
      const posRow=document.getElementById('sqPosRow');
      if(posRow)posRow.style.display='';
      renderSquad();
    } else {
      document.getElementById('sqGrid').innerHTML=`<div class="sq-empty" style="grid-column:1/-1">${(window._S).sqNoData}</div>`;
    }
  },{onlyOnce:true});
}

function buildSqGrpBtns(){
  const S=window._S;
  const gs=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  const el=document.getElementById('sqGrpFilters');
  if(el)el.innerHTML=gs.map(g=>
    `<button class="fb ${sqGrp===g?'on':''}" onclick="window._sqg('${g}')">${g==='ALL'?S.allGroups:'Group '+g}</button>`
  ).join('');
  const sel=document.getElementById('sqGrpSelect');
  if(sel)sel.innerHTML=gs.map(g=>`<option value="${g}" ${sqGrp===g?'selected':''}>${g==='ALL'?S.allGroups:'Group '+g}</option>`).join('');
}
window._sqg=function(g){
  sqGrp=g;sqTeam='';sqPos='ALL';
  buildSqGrpBtns();
  buildSqTeamBtns();
  document.getElementById('sqHeader').innerHTML='';
  document.getElementById('sqGrid').innerHTML='';
  const posRow=document.getElementById('sqPosRow');
  if(posRow)posRow.style.display='none';
};

function buildSqTeamBtns(){
  const pool=sqGrp==='ALL'?Object.keys(sqData):Object.keys(sqData).filter(fbKey=>{
    const teamKey=fbKeyToTeamKey(fbKey);
    return(GROUPS[sqGrp]||[]).includes(teamKey);
  });
  const sorted=pool.sort((a,b)=>{
    const ra=parseInt(getRank(fbKeyToTeamKey(a)))||999;
    const rb=parseInt(getRank(fbKeyToTeamKey(b)))||999;
    return ra-rb;
  });
  const container=document.getElementById('sqTeamBtns');
  container.innerHTML=sorted.map(fbKey=>{
    const teamKey=fbKeyToTeamKey(fbKey);
    const t=TEAMS[teamKey];
    const code=t?.code||'';
    const flagHtml=code?`<img src="https://flagcdn.com/20x15/${code}.png" loading="lazy" onerror="this.style.display='none'">`:'';
    return`<button class="sq-team-btn ${sqTeam===fbKey?'on':''}" onclick="setSqTeam('${fbKey.replace(/'/g,"\\'")}')" data-key="${esc(fbKey)}">
      ${flagHtml}
      ${esc(tNameRanked(teamKey)||fbKey)}
    </button>`;
  }).join('');
  const sel=document.getElementById('sqTeamSelect');
  if(sel)sel.innerHTML=`<option value="">-- দেশ বেছে নিন --</option>`+sorted.map(fbKey=>{
    const teamKey=fbKeyToTeamKey(fbKey);
    return`<option value="${esc(fbKey)}" ${sqTeam===fbKey?'selected':''}>${tNameRanked(teamKey)||fbKey}</option>`;
  }).join('');
}

window._sqt=function(fbKey){if(fbKey)window.setSqTeam(fbKey);};
window.setSqTeam=function(fbKey){
  sqTeam=fbKey;sqPos='ALL';
  // Update team buttons & select
  document.querySelectorAll('.sq-team-btn').forEach(b=>b.classList.toggle('on',b.dataset.key===fbKey));
  const sel=document.getElementById('sqTeamSelect');
  if(sel)sel.value=fbKey;
  // Reset position buttons
  document.querySelectorAll('.sq-pos-btn').forEach((b,i)=>b.classList.toggle('on',i===0));
  // Show position filter row
  const posRow=document.getElementById('sqPosRow');
  if(posRow)posRow.style.display='';
  renderSquad();
};

window.setSqPos=function(pos,btn){
  sqPos=pos;
  document.querySelectorAll('.sq-pos-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderSquad();
};

function renderSquad(){
  if(!sqTeam||!sqData[sqTeam])return;
  const data=sqData[sqTeam];
  const teamKey=fbKeyToTeamKey(sqTeam);
  const t=TEAMS[teamKey];
  const code=t?.code||'';
  const rank=getRank(teamKey);

  // Header stats
  const players=data.players||[];
  const totalCaps=players.reduce((s,p)=>s+(p.caps||0),0);
  const totalGoals=players.reduce((s,p)=>s+(p.goals||0),0);
  const avgAge=players.length?(players.reduce((s,p)=>s+(p.age||0),0)/players.length).toFixed(1):'—';
  const captain=players.find(p=>p.captain);
  // Most capped & top scorer
  const mostCapped=[...players].sort((a,b)=>(b.caps||0)-(a.caps||0))[0];
  const topScorer=[...players].sort((a,b)=>(b.goals||0)-(a.goals||0))[0];

  const SQ=window._S;
  document.getElementById('sqHeader').innerHTML=`
    <div class="sq-header">
      <div class="sq-header-body">
        <div class="sq-header-left">
          ${code?`<img class="sq-header-flag" src="https://flagcdn.com/96x72/${code}.png" loading="lazy" onerror="this.style.display='none'">`:''}
          <div class="sq-header-info">
            <div class="sq-header-name">${tNameRanked(teamKey)}</div>
            <div class="sq-header-sub">GROUP ${data.group||'?'}</div>
          </div>
        </div>
        <div class="sq-header-right">
          ${rank?`<div class="sq-stat-box"><div class="sq-stat-n">#${rank}</div><div class="sq-stat-l">FIFA RANK</div></div>`:''}
          ${t?.pts?`<div class="sq-stat-box"><div class="sq-stat-n" style="font-size:1.1rem">${t.pts.toFixed(2)}</div><div class="sq-stat-l">FIFA PTS</div></div>`:''}
          <div class="sq-stat-box"><div class="sq-stat-n">${players.length}</div><div class="sq-stat-l">${SQ.sqPlayers}</div></div>
          <div class="sq-stat-box"><div class="sq-stat-n">${avgAge}</div><div class="sq-stat-l">${SQ.sqAge}</div></div>
          ${data.coach?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqCoach||'COACH'}</div><div class="sq-extra-row"><i class='fas fa-user-tie'></i><span>${esc(data.coach)}</span></div></div>`:''}
          ${captain?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqCaptain||'CAPTAIN'}</div><div class="sq-extra-row"><i class='fas fa-shield-halved'></i><span>${esc(captain.name)}</span> · #${captain.no||''} · ${captain.pos||''}</div></div>`:''}
          ${mostCapped&&mostCapped.caps?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqMostCapped}</div><div class="sq-extra-row"><i class='fas fa-trophy'></i><span>${esc(mostCapped.name)}</span> · ${mostCapped.caps} caps · ${mostCapped.pos||''}</div></div>`:''}
          ${topScorer&&topScorer.goals?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqTopScorer}</div><div class="sq-extra-row"><i class='fas fa-futbol'></i><span>${esc(topScorer.name)}</span> · ${topScorer.goals} ${SQ.sqGoalSuffix} · ${topScorer.pos||''}</div></div>`:''}
        </div>
      </div>
    </div>`;

  // Filter by position
  const filtered=sqPos==='ALL'?players:players.filter(p=>p.pos===sqPos);

  if(filtered.length===0){
    document.getElementById('sqGrid').innerHTML=`<div class="sq-empty" style="grid-column:1/-1">${(window._S).sqNoPos}</div>`;
    return;
  }

  document.getElementById('sqGrid').innerHTML=filtered.map(p=>`
    <div class="sq-card ${p.captain?'captain':''}">
      <div class="sq-no">
        <div style="text-align:center">
          <div>${p.no||'—'}</div>
          <div class="sq-pos-badge ${p.pos||''}">${p.pos||''}</div>
        </div>
      </div>
      <div class="sq-body">
        <div class="sq-name-row">
          <div class="sq-pname" title="${esc(p.name)}">${esc(p.name)}</div>
          ${p.captain?'<span class="sq-cap-badge">C</span>':''}
        </div>
        <div class="sq-club">
          ${clubFlagHTML(p.clubCountry)}
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.club||'—')}</span>
        </div>
        <div class="sq-meta">
          <span title="বয়স">🎂 ${p.age||'?'}</span>
          <span title="Caps"><i class='fas fa-trophy'></i> ${p.caps||0}</span>
          <span title="আন্তর্জাতিক গোল"><i class='fas fa-futbol'></i> ${p.goals||0}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function renderRanking(){
  window.filterRanking();
}

window.filterRanking=function(){
  const tbody=document.getElementById('rankBody');
  if(!tbody)return;
  try{
    const q=(document.getElementById('rankSearch')?.value||'').toLowerCase();
    const conf=document.getElementById('rankConfFilter')?.value||'';
    const wcEn=new Set(Object.values(TEAMS).map(t=>t.en));
    const FIFA2WC={'IR Iran':'Iran','Türkiye':'Turkey','Korea Republic':'South Korea','Côte d\'Ivoire':'Ivory Coast','Congo DR':'DR Congo','Cabo Verde':'Cape Verde','Curaçao':'Curacao','Bosnia and Herzegovina':'Bosnia','Czechia':'Czech Rep.'};
    const list=FIFA_RANKING.filter(d=>(!q||d.n.toLowerCase().includes(q))&&(!conf||d.conf===conf));
    if(list.length===0){tbody.innerHTML='<tr><td colspan="5" class="rank-empty">কোনো ফলাফল নেই</td></tr>';return;}
    tbody.innerHTML=list.map(d=>{
      const isWC=wcEn.has(d.n)||wcEn.has(FIFA2WC[d.n]);
      const topCls=d.r<=3?' top3':'';
      const wcBadge=isWC?'<span class="rank-wc-badge">⚽ WC 2026</span>':'';
      return`<tr class="${isWC?'wc-team':''}"><td><span class="rank-num${topCls}">${d.r}</span></td><td><img class="rank-flag" src="https://flagcdn.com/28x21/${d.c}.png" loading="lazy" onerror="this.style.opacity='.3'" alt="${d.n}"></td><td class="rank-name">${d.n}</td><td class="rank-pts">${d.p.toFixed(2)}</td><td>${wcBadge}</td></tr>`;
    }).join('');
  }catch(e){
    tbody.innerHTML=`<tr><td colspan="5" style="color:#f66;padding:1rem;text-align:center">Error: ${e.message}</td></tr>`;
  }
};

function ytVideoId(url){
  if(!url)return'';
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m?m[1]:'';
}
window.openHighlights=function(matchId){
  const url=scores[matchId]?.highlights||'';
  const vid=ytVideoId(url);
  if(!vid){alert('Highlights URL সঠিক নয়।');return;}
  document.getElementById('hlFrame').src=`https://www.youtube.com/embed/${vid}?autoplay=1`;
  document.getElementById('hlModal').classList.add('open');
};
window.closeHlModal=function(){
  document.getElementById('hlFrame').src='';
  document.getElementById('hlModal').classList.remove('open');
};
</script>

<div class="hl-modal" id="hlModal" onclick="if(event.target===this)closeHlModal()">
  <div class="hl-modal-inner">
    <button class="hl-modal-close" onclick="closeHlModal()">✕</button>
    <div class="hl-modal-frame">
      <iframe id="hlFrame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>
  </div>
</div>
