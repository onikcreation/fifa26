<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 | Al Amin Onik</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#080d18;--bg2:#0c1829;--bg3:#111f35;--card:rgba(12,24,41,0.97);--card2:rgba(17,31,53,0.9);--blue:#003d7a;--blue2:#004d9a;--gold:#c9a84c;--gold-l:#e8c96a;--green:#27ae60;--red:#e74c3c;--orange:#f39c12;--text:#eef2ff;--text2:#b8c4d8;--gray:#7f8fa4;--border:rgba(201,168,76,0.18);--border2:rgba(255,255,255,0.07);--shadow:rgba(0,0,0,0.5);--hbg:rgba(0,10,30,0.97);--tbg:rgba(8,13,24,0.97);--sbg:rgba(0,0,0,0.4)}
[data-theme="light"]{--bg:#f0f4f8;--bg2:#e2eaf5;--bg3:#d5e0ef;--card:rgba(255,255,255,0.97);--card2:rgba(240,244,248,0.9);--blue:#1a5faa;--blue2:#2271c7;--gold:#a07828;--gold-l:#c09030;--green:#1a8a45;--red:#c0392b;--orange:#d68910;--text:#0d1b2e;--text2:#2c3e50;--gray:#5a7089;--border:rgba(160,120,40,0.25);--border2:rgba(0,0,0,0.1);--shadow:rgba(0,0,0,0.15);--hbg:rgba(13,27,46,0.97);--tbg:rgba(240,244,248,0.97);--sbg:rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed','Hind Siliguri',sans-serif;min-height:100vh;transition:background .3s,color .3s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 10% 0%,rgba(0,61,122,0.2) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(201,168,76,0.06) 0%,transparent 60%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:radial-gradient(ellipse 80% 40% at 10% 0%,rgba(0,61,122,0.05) 0%,transparent 60%)}

/* HEADER */
.hdr{position:relative;z-index:50;background:var(--hbg);border-bottom:2px solid var(--border);padding:0 1rem}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.8rem 0}
.hdr-logo{font-size:2rem;filter:drop-shadow(0 0 10px rgba(201,168,76,.5));flex-shrink:0}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.2rem,3vw,2rem);letter-spacing:2px;color:var(--gold-l);line-height:1}
.hdr-sub{font-size:.68rem;color:var(--gray);letter-spacing:1px;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:4px;background:rgba(0,61,122,.4);border:1px solid var(--border);border-radius:20px;padding:.25rem .6rem;font-size:.62rem;letter-spacing:1px;color:var(--gold)}
.dot{width:6px;height:6px;background:#2ecc71;border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:.3rem .5rem;cursor:pointer;font-size:1rem;color:var(--text);transition:all .2s}
.icon-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}
.admin-btn{font-size:.65rem;letter-spacing:1px;padding:.3rem .7rem;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:6px;color:var(--gray);text-decoration:none;transition:all .2s;white-space:nowrap}
.admin-btn:hover{border-color:var(--gold);color:var(--gold)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--tbg);backdrop-filter:blur(12px);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;padding:0 1rem;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:2px;color:var(--gray);background:none;border:none;border-bottom:3px solid transparent;padding:.85rem 1.1rem;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-2px;flex-shrink:0}
.nav-btn:hover{color:var(--text)}
.nav-btn.on{color:var(--gold-l);border-bottom-color:var(--gold)}

/* MAIN */
.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.2rem 1rem}
.panel{display:none}.panel.on{display:block}

/* INFO BAR */
.info-bar{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:.6rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.7rem;font-size:.75rem;color:var(--gray);flex-wrap:wrap}
.refresh-btn{margin-left:auto;font-size:.72rem;letter-spacing:1px;padding:.3rem .8rem;background:var(--blue);border:1px solid var(--border);border-radius:5px;color:#fff;cursor:pointer}
.refresh-btn:hover{background:var(--blue2)}

/* SEC TITLE */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--gold-l);margin-bottom:1rem;display:flex;align-items:center;gap:.7rem}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}

/* STATS STRIP */
.stats-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.7rem;margin-bottom:1.2rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.75rem .5rem;text-align:center}
.sc-n{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--gold-l);line-height:1}
.sc-l{font-size:.6rem;letter-spacing:1px;color:var(--gray);margin-top:2px}

/* FILTERS */
.filters{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem}
.fb{font-size:.72rem;letter-spacing:.5px;padding:.3rem .75rem;background:var(--card);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;transition:all .2s;white-space:nowrap}
.fb:hover,.fb.on{background:var(--blue);border-color:var(--gold);color:#fff}

/* MATCH CARD */
.match-list{display:flex;flex-direction:column;gap:.5rem}
.mc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:all .2s}
.mc:hover{border-color:rgba(201,168,76,.4);box-shadow:0 4px 20px var(--shadow)}
.mc-top{display:flex;align-items:stretch;min-height:76px}
.mc-meta{padding:.65rem .9rem;display:flex;flex-direction:column;justify-content:center;gap:2px;min-width:125px;border-right:1px solid var(--border2);flex-shrink:0}
.mc-num{font-size:.58rem;color:var(--gray);letter-spacing:1px}
.mc-date{font-size:.8rem;font-weight:700;color:var(--text)}
.mc-time{font-size:.76rem;color:var(--gold);font-weight:600}
.mc-grp{display:inline-block;font-size:.58rem;padding:2px 5px;background:rgba(0,61,122,.3);border:1px solid var(--border);border-radius:3px;color:var(--gold-l);letter-spacing:1px;margin-top:2px;width:fit-content}
.mc-body{flex:1;display:flex;align-items:center;padding:.65rem .9rem;gap:.5rem;min-width:0}
.mc-team{flex:1;display:flex;align-items:center;gap:.55rem;min-width:0}
.mc-team.right{flex-direction:row-reverse;text-align:right}
.mc-flag{width:38px;height:28px;object-fit:cover;border-radius:3px;box-shadow:0 1px 4px var(--shadow);flex-shrink:0}
.mc-tname{font-size:.85rem;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-ten{font-size:.62rem;color:var(--gray)}
.mc-score{display:flex;align-items:center;justify-content:center;gap:.3rem;flex-shrink:0;padding:0 .4rem}
.sb{width:34px;height:34px;background:var(--sbg);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.25rem;flex-shrink:0}
.sb.done{background:rgba(0,61,122,.25);border-color:var(--border)}
.score-vs{font-size:.62rem;color:var(--gray)}
.mc-status{font-size:.58rem;letter-spacing:1px;padding:0 .4rem;flex-shrink:0;text-align:center}
.st-d{color:var(--gold)}.st-w{color:var(--gray)}
.mc-goals{background:var(--bg3);border-top:1px solid var(--border2);padding:.45rem 1rem;display:flex;gap:2rem}
.mc-goals-side{flex:1}
.mc-goals-side.right{text-align:right}
.goal-item{font-size:.7rem;color:var(--text2);padding:1px 0}
.goal-item .gmin{color:var(--gold);font-weight:700}
.goal-item .gpen{color:var(--orange);font-size:.62rem}

/* GROUP */
.grp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:1rem}
.grp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.grp-hd{background:linear-gradient(135deg,var(--blue),rgba(0,40,100,.8));padding:.55rem .9rem;display:flex;align-items:center;gap:.55rem;border-bottom:1px solid var(--border)}
.grp-let{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold-l);line-height:1;text-shadow:0 0 15px rgba(201,168,76,.4)}
.grp-lbl{font-size:.62rem;color:var(--gray);letter-spacing:1px}
.gt{width:100%;border-collapse:collapse;font-size:.77rem}
.gt th{padding:.4rem .4rem;text-align:center;font-size:.57rem;letter-spacing:1px;color:var(--gray);background:rgba(0,0,0,.15);border-bottom:1px solid var(--border2)}
.gt th:first-child{text-align:left;padding-left:.65rem}
.gt td{padding:.42rem .4rem;text-align:center;border-bottom:1px solid var(--border2)}
.gt td:first-child{text-align:left;padding-left:.65rem}
.gt tbody tr:last-child td{border-bottom:none}
.gt tbody tr:hover{background:rgba(255,255,255,.03)}
.gt-team{display:flex;align-items:center;gap:.35rem}
.gt-flag{width:20px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0}
.gt-rank{display:inline-block;width:15px;height:15px;background:rgba(255,255,255,.07);border-radius:2px;text-align:center;line-height:15px;font-size:.58rem;color:var(--gray);margin-right:2px;flex-shrink:0}
.pts-c{font-weight:700;color:var(--gold-l);font-size:.88rem}
.gdp{color:var(--green)}.gdn{color:var(--red)}.gdz{color:var(--gray)}
.row-q{background:rgba(39,174,96,.07)!important}.row-q td:first-child{border-left:3px solid var(--green)}
.row-3{background:rgba(243,156,18,.05)!important}.row-3 td:first-child{border-left:3px solid var(--orange)}

/* ══ KNOCKOUT BRACKET ══ */
/* Desktop: full horizontal bracket */
.bracket-desktop{display:none}
.bracket-mobile{display:none}
@media(min-width:900px){.bracket-desktop{display:block}.bracket-mobile{display:none}}
@media(max-width:899px){.bracket-desktop{display:none}.bracket-mobile{display:block}}

.bk-wrap{overflow-x:auto;padding-bottom:1rem;-webkit-overflow-scrolling:touch}
.bk-table{display:flex;align-items:flex-start;gap:0;min-width:1200px}

/* Round column */
.bk-col{display:flex;flex-direction:column;flex:1;position:relative}
.bk-col-hd{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1.5px;color:var(--gold);text-align:center;padding:.45rem .3rem;background:rgba(0,61,122,.3);border:1px solid var(--border);border-radius:5px 5px 0 0;margin:0 3px .3rem}
.bk-slots{display:flex;flex-direction:column;padding:0 3px;gap:0}

/* Match slot */
.bk-match{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:.5rem;transition:border .2s;cursor:default;position:relative}
.bk-match:hover{border-color:var(--gold)}
.bk-team{display:flex;align-items:center;gap:.35rem;padding:.32rem .45rem;border-bottom:1px solid var(--border2);font-size:.7rem;min-height:26px}
.bk-team:last-of-type{border-bottom:none}
.bk-flag{width:18px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0}
.bk-tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.bk-sc{font-family:'Bebas Neue',sans-serif;font-size:.88rem;color:var(--gold-l);min-width:16px;text-align:right}
.bk-date{text-align:center;font-size:.55rem;color:var(--gray);padding:2px;background:rgba(0,0,0,.15)}
.bk-win{background:rgba(39,174,96,.12)!important;font-weight:700}

/* Spacer between matches for bracket alignment */
.bk-spacer{flex:1}

/* Final column special */
.bk-final-wrap{display:flex;flex-direction:column;align-items:center;gap:1rem;padding:0 3px}
.trophy-badge{background:linear-gradient(135deg,rgba(201,168,76,.2),rgba(201,168,76,.05));border:1px solid var(--gold);border-radius:8px;padding:.6rem 1rem;text-align:center;font-size:.7rem;color:var(--gold-l);letter-spacing:1px;font-family:'Bebas Neue',sans-serif}

/* Mobile bracket tabs */
.bk-round-tabs{display:flex;gap:.3rem;flex-wrap:nowrap;overflow-x:auto;margin-bottom:.8rem;padding-bottom:.3rem;scrollbar-width:none}
.bk-round-tabs::-webkit-scrollbar{display:none}
.bk-rtab{font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:1px;padding:.35rem .8rem;background:var(--card);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.bk-rtab.on{background:var(--blue);border-color:var(--gold);color:#fff}
.bk-round-panel{display:none}.bk-round-panel.on{display:flex;flex-direction:column;gap:.4rem}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:680px){.stats-grid{grid-template-columns:1fr}}
.stats-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.stats-card-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;color:var(--gold);padding:.65rem 1rem;background:rgba(0,61,122,.2);border-bottom:1px solid var(--border)}
.scorer-row{display:flex;align-items:center;gap:.65rem;padding:.5rem .9rem;border-bottom:1px solid var(--border2)}
.scorer-row:last-child{border-bottom:none}
.scorer-row:hover{background:rgba(255,255,255,.03)}
.sr-rank{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gray);width:22px;text-align:center;flex-shrink:0}
.sr-rank.g1{color:#FFD700}.sr-rank.g2{color:#C0C0C0}.sr-rank.g3{color:#CD7F32}
.sr-flag{width:26px;height:19px;object-fit:cover;border-radius:2px;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:.8rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-team{font-size:.62rem;color:var(--gray)}
.sr-goals{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:var(--gold-l)}
.team-row{display:flex;align-items:center;gap:.65rem;padding:.45rem .9rem;border-bottom:1px solid var(--border2)}
.team-row:last-child{border-bottom:none}
.team-row:hover{background:rgba(255,255,255,.03)}
.tr-flag{width:28px;height:21px;object-fit:cover;border-radius:2px;flex-shrink:0}
.tr-name{flex:1;font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-bar-wrap{width:70px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.tr-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:2px}
.tr-goals{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold-l);min-width:20px;text-align:right}
.stats-empty{padding:1.5rem;text-align:center;color:var(--gray);font-size:.8rem}

/* Stats team filter */
.team-filter-wrap{padding:.7rem .9rem;border-bottom:1px solid var(--border2)}
.team-select{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:.4rem .6rem;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:.82rem;outline:none;cursor:pointer}
.team-select:focus{border-color:var(--gold)}

/* Third place */
.tp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;padding:1rem}
.tp-tbl{width:100%;border-collapse:collapse;font-size:.78rem}
.tp-tbl th{padding:.4rem .5rem;text-align:center;font-size:.58rem;letter-spacing:1px;color:var(--gray);background:rgba(0,0,0,.15);border-bottom:1px solid var(--border2)}
.tp-tbl th:nth-child(2){text-align:left}
.tp-tbl td{padding:.42rem .5rem;text-align:center;border-bottom:1px solid var(--border2)}
.tp-tbl td:nth-child(2){text-align:left}
.tp-tbl tbody tr:hover{background:rgba(255,255,255,.03)}

/* Loader */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:9999;transition:opacity .4s}
.loader.gone{opacity:0;pointer-events:none}
.loader-ic{font-size:3rem;animation:fl 1s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.loader-txt{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:var(--gold);font-size:1rem}
.loader-bar{width:160px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));animation:lb 1.5s infinite}
@keyframes lb{0%{width:0}100%{width:100%}}

/* Responsive */
@media(max-width:600px){
  .mc-meta{min-width:108px;padding:.5rem .6rem}
  .mc-body{padding:.5rem .6rem;gap:.3rem}
  .mc-flag{width:30px;height:22px}
  .mc-tname{font-size:.8rem}
  .mc-ten{display:none}
  .sb{width:30px;height:30px;font-size:1.1rem}
}
@media(max-width:380px){.mc-flag{display:none}}
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-ic">🏆</div>
  <div class="loader-txt">লোড হচ্ছে...</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<header class="hdr">
  <div class="hdr-in">
    <div class="hdr-logo">🏆</div>
    <div class="hdr-text">
      <div class="hdr-title">FIFA WORLD CUP 2026</div>
      <div class="hdr-sub">২০২৬ ফিফা বিশ্বকাপ · Al Amin Onik</div>
    </div>
    <div class="hdr-right">
      <div class="live-pill"><div class="dot"></div>LIVE</div>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Dark/Light">🌙</button>
      <a href="admin.html" class="admin-btn">🔐 Admin</a>
    </div>
  </div>
</header>

<nav class="nav">
  <button class="nav-btn on"  onclick="goTab('schedule',this)">📅 ম্যাচ সূচি</button>
  <button class="nav-btn"     onclick="goTab('groups',this)">📊 Group Table</button>
  <button class="nav-btn"     onclick="goTab('knockout',this)">🏅 Knockout</button>
  <button class="nav-btn"     onclick="goTab('stats',this)">📈 Stats</button>
  <button class="nav-btn"     onclick="goTab('thirdplace',this)">🥉 3rd Places From Groups</button>
</nav>

<main class="main">
  <div class="info-bar">
    <span>🔥 Firebase</span>
    <strong id="dbSt">সংযোগ হচ্ছে...</strong>
    <span id="upAt" style="font-size:.68rem"></span>
    <button class="refresh-btn" onclick="window._reload&&window._reload()">🔄 রিফ্রেশ</button>
  </div>

  <!-- SCHEDULE -->
  <div id="p-schedule" class="panel on">
    <div class="stats-strip" id="statStrip"></div>
    <div class="sec-title">ম্যাচ সূচি</div>
    <div class="filters" id="schedFilters"></div>
    <div class="match-list" id="matchList"></div>
  </div>

  <!-- GROUPS -->
  <div id="p-groups" class="panel">
    <div class="sec-title">Group Stage Table</div>
    <div class="grp-grid" id="grpGrid"></div>
  </div>

  <!-- KNOCKOUT -->
  <div id="p-knockout" class="panel">
    <div class="sec-title">🏅 Knockout Bracket</div>

    <!-- Desktop full bracket -->
    <div class="bracket-desktop">
      <div class="bk-wrap">
        <div class="bk-table" id="bkDesktop"></div>
      </div>
    </div>

    <!-- Mobile tab bracket -->
    <div class="bracket-mobile">
      <div class="bk-round-tabs" id="bkTabs"></div>
      <div id="bkMobile"></div>
    </div>
  </div>

  <!-- STATS -->
  <div id="p-stats" class="panel">
    <div class="sec-title">📈 Stats</div>
    <div class="filters" id="statsGrpFilters"></div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <!-- THIRD PLACE -->
  <div id="p-thirdplace" class="panel">
    <div class="sec-title">🥉 3rd Places From Groups</div>
    <div id="thirdPlace"></div>
  </div>
</main>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import{FIREBASE_CONFIG}from'./firebase-config.js';
import{TEAMS,GROUPS,MATCHES,KO_ROUNDS}from'./data.js';

const app=initializeApp(FIREBASE_CONFIG);
const db=getDatabase(app);

const DAYS=['রবি','সোম','মঙ্গল','বুধ','বৃহঃ','শুক্র','শনি'];
const MON=['জানু','ফেব','মার্চ','এপ্রি','মে','জুন','জুলাই','আগ','সেপ্ট','অক্টো','নভে','ডিসে'];
function fD(d){const dt=new Date(d+'T00:00:00');return`${DAYS[dt.getDay()]}, ${dt.getDate()} ${MON[dt.getMonth()]}`;}
function fT(t){const[h,m]=t.split(':').map(Number);const ap=h<12?'AM':'PM';const h12=h===0?12:h>12?h-12:h;return`${h12}:${String(m).padStart(2,'0')} ${ap}`;}
// flagcdn.com valid sizes: 20x15,24x18,28x21,32x24,40x30,48x36,64x48,80x60
function nearestFlag(w){
  const sizes=[20,24,28,32,40,48,64,80];
  return sizes.reduce((a,b)=>Math.abs(b-w)<Math.abs(a-w)?b:a);
}
function fImg(name,w=40,h=30){
  const t=TEAMS[name];
  if(!t)return`<div style="width:${w}px;height:${h}px;background:var(--bg3);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--gray)">?</div>`;
  const fw=nearestFlag(w);const fh=Math.round(fw*0.75);
  return`<img src="https://flagcdn.com/${fw}x${fh}/${t.code}.png" style="width:${w}px;height:${h}px;object-fit:cover;border-radius:3px;box-shadow:0 1px 4px var(--shadow)" loading="lazy" onerror="this.style.display='none'" alt="${t.en}">`;
}
function enName(name){return TEAMS[name]?.en||name}

let scores={};
let schedGrp='ALL';
let statsGrp='ALL';
let statsTeam='ALL';
let activeBkTab=0;

// Firebase
onValue(ref(db,'scores'),snap=>{
  scores=snap.val()||{};
  document.getElementById('dbSt').innerHTML='<span style="color:var(--green)">✓ Firebase Connected</span>';
  document.getElementById('upAt').textContent='Updated: '+new Date().toLocaleTimeString('bn-BD');
  renderAll();hideLoader();
},()=>{
  document.getElementById('dbSt').innerHTML='<span style="color:var(--red)">✗ Connection Failed</span>';
  renderAll();hideLoader();
});
window._reload=function(){location.reload();};

function calcGroups(){
  const t={};
  for(const[g,teams]of Object.entries(GROUPS)){t[g]={};for(const tm of teams)t[g][tm]={pl:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};}
  for(const m of MATCHES){
    const sc=scores[m.id];if(!sc||sc.s1===undefined||sc.s1===null)continue;
    const tbl=t[m.grp];if(!tbl||!tbl[m.t1]||!tbl[m.t2])continue;
    const s1=Number(sc.s1),s2=Number(sc.s2);
    tbl[m.t1].pl++;tbl[m.t2].pl++;tbl[m.t1].gf+=s1;tbl[m.t1].ga+=s2;tbl[m.t2].gf+=s2;tbl[m.t2].ga+=s1;
    if(s1>s2){tbl[m.t1].w++;tbl[m.t1].pts+=3;tbl[m.t2].l++;}
    else if(s1<s2){tbl[m.t2].w++;tbl[m.t2].pts+=3;tbl[m.t1].l++;}
    else{tbl[m.t1].d++;tbl[m.t1].pts++;tbl[m.t2].d++;tbl[m.t2].pts++;}
  }
  const s={};
  for(const[g,tbl]of Object.entries(t)){s[g]=Object.entries(tbl).map(([n,v])=>({name:n,...v,gd:v.gf-v.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);}
  return s;
}

function renderAll(){
  const grps=calcGroups();
  renderStrip(grps);
  renderSchedFilters();
  renderMatches(schedGrp);
  renderGroups(grps);
  renderBracket(grps);
  renderStats(grps);
  renderThirdPlace(grps);
}

// Strip

  const pl=MATCHES.filter(m=>scores[m.id]?.s1!==undefined).length;
  const gl=MATCHES.reduce((s,m)=>s+(scores[m.id]?Number(scores[m.id].s1||0)+Number(scores[m.id].s2||0):0),0);
  document.getElementById('statStrip').innerHTML=
    `<div class="sc"><div class="sc-n">${pl}</div><div class="sc-l">খেলা হয়েছে</div></div>
     <div class="sc"><div class="sc-n">${72-pl}</div><div class="sc-l">বাকি ম্যাচ</div></div>
     <div class="sc"><div class="sc-n">${gl}</div><div class="sc-l">মোট গোল</div></div>
     <div class="sc"><div class="sc-n">${pl?(gl/pl).toFixed(1):'0.0'}</div><div class="sc-l">গড় গোল</div></div>
     <div class="sc"><div class="sc-n">12</div><div class="sc-l">গ্রুপ</div></div>
     <div class="sc"><div class="sc-n">48</div><div class="sc-l">দেশ</div></div>`;
}

// Schedule
function renderSchedFilters(){
  const gs=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('schedFilters').innerHTML=gs.map(g=>
    `<button class="fb ${schedGrp===g?'on':''}" onclick="window._sfg('${g}')">${g==='ALL'?'সকল ম্যাচ':'Group '+g}</button>`

}
window._sfg=function(g){schedGrp=g;renderSchedFilters();renderMatches(g);};

        <div class="mc-body">

          <div class="mc-score">
            <div class="sb ${done?'done':''}">${done?sc.s1:'–'}</div>

        </div>
        <div class="mc-status"><span class="${done?'st-d':'st-w'}">${done?'✓ শেষ':'⏳ বাকি'}</span></div>

        <div class="mc-goals-side">${g1.map(g=>`<div class="goal-item">⚽ ${g.name} <span class="gmin">${g.min}'</span>${g.pen?` <span class="gpen">(P)</span>`:''}</div>`).join('')}</div>
        <div class="mc-goals-side right">${g2.map(g=>`<div class="goal-item">${g.pen?`<span class="gpen">(P) </span>`:''}<span class="gmin">${g.min}'</span> ${g.name} ⚽</div>`).join('')}</div>
      </div>`:''}
    </div>`;

// Groups
function renderGroups(grps){
  document.getElementById('grpGrid').innerHTML=Object.entries(grps).map(([g,teams])=>`
    <div class="grp-card">
      <div class="grp-hd"><div class="grp-let">${g}</div><div><div style="font-size:.68rem;color:var(--gold-l)">GROUP ${g}</div><div class="grp-lbl">গ্রুপ ${g}</div></div></div>
      <table class="gt">

        <tbody>${teams.map((t,i)=>`

          </tr>`).join('')}
        </tbody>
      </table>

// ══ BRACKET AUTO-POPULATE ══
function getBest3rd(grps){
  return Object.entries(grps)
    .map(([g,teams])=>teams[2]?{...teams[2],group:g}:null)
    .filter(t=>t&&t.pl>0)
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function buildBest3rdMap(grps){
  const allThirds=getBest3rd(grps);
  const map={};
  for(const m of KO_ROUNDS[0].matches){
    ['s1','s2'].forEach(side=>{
      const slot=m[side];
      if(!slot||!slot.startsWith('3rd '))return;
      const groups=slot.replace('3rd ','').split('');
      const candidate=allThirds.find(t=>groups.includes(t.group));
      if(candidate)map[`${m.id}_${side}`]=candidate.name;
    });
  }
  return map;
}

function resolveSlot(slot,grps){
  if(!slot)return'TBD';
  if(TEAMS[slot])return slot;
  const m1=slot.match(/^([12])([A-L])$/);
  if(m1){
    const rank=parseInt(m1[1])-1;
    const grp=m1[2];
    const team=grps[grp]?.[rank];
    return(team&&team.pl>0)?team.name:slot;
  }
  return slot;
}

// Build winner map: matchId → winner team name (from Firebase scores)
function buildWinnerMap(grps,b3map){
  const winners={}; // matchId → winner name
  const allMatches=KO_ROUNDS.flatMap(r=>r.matches);

  for(const m of allMatches){
    const sc=scores[m.id]||{};
    if(sc.s1===undefined||sc.s1===null)continue;
    // Get t1, t2 names
    let t1=sc.t1||'';
    let t2=sc.t2||'';
    if(!t1){
      if(m.s1&&m.s1.startsWith('3rd '))t1=b3map[`${m.id}_s1`]||'';
      else t1=resolveSlot(m.s1,grps)||'';
      // Check if t1 is winner from previous match
      if(!t1&&winners[m.s1?.replace('W ','').toLowerCase().replace(/[^a-z0-9_]/g,'')])
        t1=winners[m.id+'_auto_t1']||'';
    }
    if(!t2){
      if(m.s2&&m.s2.startsWith('3rd '))t2=b3map[`${m.id}_s2`]||'';
      else t2=resolveSlot(m.s2,grps)||'';
    }
    // Determine winner (90 min or ET or penalties)
    const s1=Number(sc.s1),s2=Number(sc.s2);
    const et1=sc.et1!==undefined?Number(sc.et1):null;
    const et2=sc.et2!==undefined?Number(sc.et2):null;
    const pen1=sc.pen1!==undefined?Number(sc.pen1):null;
    const pen2=sc.pen2!==undefined?Number(sc.pen2):null;
    let winner='';
    if(pen1!==null&&pen2!==null){winner=pen1>pen2?t1:t2;}
    else if(et1!==null&&et2!==null){const tot1=s1+et1,tot2=s2+et2;winner=tot1>tot2?t1:t2;}
    else{winner=s1>s2?t1:s2>s1?t2:'';}
    if(winner)winners[m.id]=winner;
  }
  return winners;
}

// Resolve team name for a KO slot considering winner tracking
function resolveKOSlot(slot,grps,b3map,winnerMap){
  if(!slot)return'TBD';
  if(TEAMS[slot])return slot;
  if(slot.match(/^([12])([A-L])$/))return resolveSlot(slot,grps);
  if(slot.startsWith('3rd '))return'3rd';
  // "W R32-1" → find match id r32_1, get its winner
  const wMatch=slot.match(/^W (r\d+_\d+|r16_\d+|qf_\d+|sf_\d+|final|third)$/i);
  if(wMatch){
    const mid=wMatch[1].toLowerCase().replace(' ','_').replace('-','_');
    // map "R32-1" → "r32_1"
    const mapped=mid.replace(/^r(\d+)-(\d+)$/,'r$1_$2');
    return winnerMap[mapped]||slot;
  }
  return slot;
}

function buildMatch(m,grps={},b3map={},winnerMap={}){
  const sc=scores[m.id]||{};
  const s1raw=sc.s1;
  const done=s1raw!==undefined&&s1raw!==null;
  const et=sc.et1!==undefined;
  const pen=sc.pen1!==undefined;

  let t1=sc.t1||'';
  let t2=sc.t2||'';
  if(!t1){
    if(m.s1&&m.s1.startsWith('3rd '))t1=b3map[`${m.id}_s1`]||m.s1;
    else t1=resolveKOSlot(m.s1,grps,b3map,winnerMap)||m.s1||'TBD';
  }
  if(!t2){
    if(m.s2&&m.s2.startsWith('3rd '))t2=b3map[`${m.id}_s2`]||m.s2;
    else t2=resolveKOSlot(m.s2,grps,b3map,winnerMap)||m.s2||'TBD';
  }

  // Determine winner for highlighting
  let s1win=false,s2win=false;
  if(done){
    const n1=Number(sc.s1),n2=Number(sc.s2);
    if(pen){s1win=Number(sc.pen1)>Number(sc.pen2);s2win=!s1win;}
    else if(et){const t1tot=n1+Number(sc.et1||0),t2tot=n2+Number(sc.et2||0);s1win=t1tot>t2tot;s2win=t2tot>t1tot;}
    else{s1win=n1>n2;s2win=n2>n1;}
  }

  const f1=TEAMS[t1]?fImg(t1,18,13):'';
  const f2=TEAMS[t2]?fImg(t2,18,13):'';
  const auto1=!sc.t1&&TEAMS[t1];
  const auto2=!sc.t2&&TEAMS[t2];

  // Score display
  let scoreDisp='';
  if(done){
    scoreDisp=`${sc.s1}–${sc.s2}`;
    if(et)scoreDisp+=` (ET: ${sc.et1}–${sc.et2})`;
    if(pen)scoreDisp+=` (PSO: ${sc.pen1}–${sc.pen2})`;
  }

  return`<div class="bk-match">
    <div class="bk-team ${s1win?'bk-win':''}" style="${auto1?'opacity:.82':''}">
      ${f1}<span class="bk-tname">${t1}</span><span class="bk-sc">${done?sc.s1:''}</span>
    </div>
    <div class="bk-team ${s2win?'bk-win':''}" style="${auto2?'opacity:.82':''}">
      ${f2}<span class="bk-tname">${t2}</span><span class="bk-sc">${done?sc.s2:''}</span>
    </div>
    ${pen?`<div class="bk-date" style="color:var(--orange)">PSO: ${sc.pen1}–${sc.pen2}</div>`:
      et?`<div class="bk-date" style="color:var(--gold)">ET: ${sc.et1}–${sc.et2}</div>`:''}
    <div class="bk-date">${fD(m.date)} · ${fT(m.time)}</div>
  </div>`;
}

function renderBracket(grps={}){
  const b3map=buildBest3rdMap(grps);
  const winnerMap=buildWinnerMap(grps,b3map);

  // Desktop full bracket
  const desktopHTML=KO_ROUNDS.map(round=>{
    const isFinal=round.short==='F'||round.short==='3PL';
    return`<div class="bk-col">
      <div class="bk-col-hd">${round.name}</div>
      <div class="bk-slots">
        ${isFinal
          ?`<div class="bk-final-wrap">${round.short==='F'?'<div style="font-size:1.8rem;text-align:center;margin:.4rem 0">🏆</div>':''}${round.matches.map(m=>buildMatch(m,grps,b3map,winnerMap)).join('')}</div>`
          :round.matches.map(m=>buildMatch(m,grps,b3map,winnerMap)).join('')
        }
      </div>
    </div>`;
  }).join('');
  document.getElementById('bkDesktop').innerHTML=desktopHTML;

  // Mobile tabs
  document.getElementById('bkTabs').innerHTML=KO_ROUNDS.map((r,i)=>
    `<button class="bk-rtab ${i===activeBkTab?'on':''}" onclick="window._bktab(${i})">${r.name}</button>`
  ).join('');
  document.getElementById('bkMobile').innerHTML=KO_ROUNDS.map((round,i)=>
    `<div class="bk-round-panel ${i===activeBkTab?'on':''}">
      ${round.matches.map(m=>buildMatch(m,grps,b3map,winnerMap)).join('')}
    </div>`
  ).join('');
}
window._bktab=function(i){
  activeBkTab=i;
  document.querySelectorAll('.bk-rtab').forEach((b,idx)=>b.classList.toggle('on',idx===i));
  document.querySelectorAll('.bk-round-panel').forEach((p,idx)=>p.classList.toggle('on',idx===i));
};

// ══ STATS ══
function renderStats(grps){
  // Group filter buttons
  const gs=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('statsGrpFilters').innerHTML=gs.map(g=>
    `<button class="fb ${statsGrp===g?'on':''}" onclick="window._stg('${g}')">${g==='ALL'?'সকল':'Group '+g}</button>`
  ).join('');

  // Top scorers
  const scorerMap={};
  for(const m of MATCHES){
    const sc=scores[m.id]||{};
    for(const g of(sc.goals1||[])){const k=`${g.name}||${m.t1}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:m.t1,goals:0,grp:m.grp};scorerMap[k].goals++;}
    for(const g of(sc.goals2||[])){const k=`${g.name}||${m.t2}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:m.t2,goals:0,grp:m.grp};scorerMap[k].goals++;}
  }
  // KO scorers
  for(const round of KO_ROUNDS){for(const m of round.matches){
    const sc=scores[m.id]||{};
    const t1=sc.t1||'';const t2=sc.t2||'';
    for(const g of(sc.goals1||[])){if(t1){const k=`${g.name}||${t1}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:t1,goals:0,grp:'KO'};scorerMap[k].goals++;}}
    for(const g of(sc.goals2||[])){if(t2){const k=`${g.name}||${t2}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:t2,goals:0,grp:'KO'};scorerMap[k].goals++;}}
  }}

  let scorers=Object.values(scorerMap).sort((a,b)=>b.goals-a.goals);
  if(statsGrp!=='ALL')scorers=scorers.filter(s=>s.grp===statsGrp||GROUPS[statsGrp]?.includes(s.team));

  // Team goals
  const teamGoals={};
  for(const m of MATCHES){
    const sc=scores[m.id]||{};if(sc.s1===undefined)continue;
    const grp=m.grp;
    if(!teamGoals[m.t1])teamGoals[m.t1]={goals:0,grp};
    if(!teamGoals[m.t2])teamGoals[m.t2]={goals:0,grp};
    teamGoals[m.t1].goals+=Number(sc.s1||0);
    teamGoals[m.t2].goals+=Number(sc.s2||0);
  }
  let teamList=Object.entries(teamGoals).sort((a,b)=>b[1].goals-a[1].goals);
  if(statsGrp!=='ALL')teamList=teamList.filter(([n,v])=>GROUPS[statsGrp]?.includes(n));
  if(statsTeam!=='ALL')teamList=teamList.filter(([n])=>n===statsTeam);
  const maxG=teamList[0]?teamList[0][1].goals:1;

  // Team select dropdown options
  const allTeamNames=Object.keys(teamGoals).sort((a,b)=>enName(a).localeCompare(enName(b)));
  const teamOptions=`<option value="ALL">সকল দল</option>`+allTeamNames.map(n=>`<option value="${n}" ${statsTeam===n?'selected':''}>${enName(n)} (${n})</option>`).join('');

  document.getElementById('statsGrid').innerHTML=`
    <div class="stats-card">
      <div class="stats-card-title">⚽ সর্বোচ্চ গোলদাতা</div>
      ${scorers.length===0
        ?`<div class="stats-empty">এখনো গোলের তথ্য নেই</div>`
        :scorers.slice(0,20).map((s,i)=>`
          <div class="scorer-row">
            <div class="sr-rank ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i+1}</div>
            ${fImg(s.team,26,19)}
            <div class="sr-info"><div class="sr-name">${s.name}</div><div class="sr-team">${enName(s.team)}</div></div>
            <div class="sr-goals">${s.goals}</div>
          </div>`).join('')
      }
    </div>
    <div class="stats-card">
      <div class="stats-card-title">🏳️ দলীয় গোল ${statsGrp!=='ALL'?'· Group '+statsGrp:''}</div>
      <div class="team-filter-wrap">
        <select class="team-select" onchange="window._stt(this.value)">${teamOptions}</select>
      </div>
      ${teamList.length===0
        ?`<div class="stats-empty">এখনো গোলের তথ্য নেই</div>`
        :teamList.map(([name,v])=>`
          <div class="team-row">
            ${fImg(name,28,21)}
            <div class="tr-name">${enName(name)}</div>
            <div class="tr-bar-wrap"><div class="tr-bar" style="width:${Math.round(v.goals/maxG*100)}%"></div></div>
            <div class="tr-goals">${v.goals}</div>
          </div>`).join('')
      }
    </div>`;
}
window._stg=function(g){statsGrp=g;statsTeam='ALL';const grps=calcGroups();renderStats(grps);};
window._stt=function(t){statsTeam=t;const grps=calcGroups();renderStats(grps);};

// Third place
function renderThirdPlace(grps){
  const thirds=Object.entries(grps).map(([g,teams])=>({...teams[2],group:g}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  document.getElementById('thirdPlace').innerHTML=`
    <div class="tp-card">
      <p style="font-size:.76rem;color:var(--gray);margin-bottom:1rem;">১২টি গ্রুপের ৩য় স্থানের দলের মধ্যে সেরা ৮টি শেষ বত্রিশে যাবে। র‍্যাংকিং: পয়েন্ট → GD → GF।</p>
      <table class="tp-tbl">
        <thead><tr><th>#</th><th>দল</th><th>গ্রুপ</th><th>খে</th><th>Pts</th><th>GF</th><th>GA</th><th>GD</th><th>মর্যাদা</th></tr></thead>
        <tbody>${thirds.map((t,i)=>`
          <tr class="${i<8?'row-q':''}">
            <td>${i+1}</td>
            <td><div class="gt-team">${fImg(t.name,20,15)}<span>${t.name}</span></div></td>
            <td><span class="mc-grp">Grp ${t.group}</span></td>
            <td>${t.pl}</td><td class="pts-c">${t.pts}</td>
            <td>${t.gf}</td><td>${t.ga}</td>
            <td class="${t.gd>0?'gdp':t.gd<0?'gdn':'gdz'}">${t.gd>0?'+'+t.gd:t.gd}</td>
            <td style="font-size:.7rem;color:${i<8?'var(--green)':'var(--gray)'}">${i<8?'✓ উত্তীর্ণ':'✗ বাদ'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// Tab
window.goTab=function(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  btn.classList.add('on');
};

// Theme
window.toggleTheme=function(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('theme',dark?'light':'dark');
};
(function(){
  const t=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';
})();

function hideLoader(){
  setTimeout(()=>{const l=document.getElementById('loader');l.classList.add('gone');setTimeout(()=>l.remove(),400);},500);
}
</script>
</body>
