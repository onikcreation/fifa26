<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 | Al Amin Onik</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ══ V3 NEON FUTURISTIC THEME ══ */
:root{
  --bg:#050f10;
  --bg2:#071517;
  --bg3:#0a1e20;
  --card:rgba(12,43,45,0.85);
  --card2:rgba(10,30,32,0.9);
  --neon:#A1F000;
  --neon-l:#B8FF33;
  --neon-d:#7ab800;
  --neon-glow:rgba(161,240,0,0.25);
  --neon-glow2:rgba(161,240,0,0.08);
  --teal:#0C2B2D;
  --teal2:#0e3335;
  --green:#A1F000;
  --red:#ff4d4d;
  --orange:#ffaa00;
  --text:#ffffff;
  --text2:rgba(255,255,255,0.75);
  --gray:rgba(255,255,255,0.4);
  --border:rgba(161,240,0,0.25);
  --border2:rgba(161,240,0,0.1);
  --shadow:rgba(0,0,0,0.7);
  --hbg:#050f10;
  --tbg:rgba(5,15,16,0.96);
  --sbg:rgba(161,240,0,0.06);
  --inp:rgba(161,240,0,0.06);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed','Hind Siliguri',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 0% 0%,rgba(161,240,0,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%,rgba(12,43,45,0.8) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(161,240,0,0.03) 0%,transparent 70%);
  pointer-events:none;z-index:0}

/* HEADER */
.hdr{position:relative;z-index:50;background:var(--hbg);border-bottom:1px solid var(--border);padding:0 1rem}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.8rem 0}
.hdr-logo{font-size:2rem;filter:drop-shadow(0 0 12px var(--neon-glow));flex-shrink:0}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.2rem,3vw,2rem);letter-spacing:3px;color:var(--neon);line-height:1;text-shadow:0 0 20px var(--neon-glow)}
.hdr-sub{font-size:.68rem;color:var(--gray);letter-spacing:1px;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:4px;background:rgba(161,240,0,.1);border:1px solid var(--border2);border-radius:20px;padding:.25rem .6rem;font-size:.62rem;letter-spacing:1px;color:var(--neon)}
.dot{width:6px;height:6px;background:var(--neon);border-radius:50%;box-shadow:0 0 6px var(--neon);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:.3rem .5rem;cursor:pointer;font-size:1rem;color:var(--text);transition:all .2s}
.icon-btn:hover{border-color:var(--neon);background:var(--neon-glow2);box-shadow:0 0 8px var(--neon-glow)}
.admin-btn{font-size:.65rem;letter-spacing:1px;padding:.3rem .7rem;background:rgba(161,240,0,.08);border:1px solid var(--border2);border-radius:6px;color:var(--neon);text-decoration:none;transition:all .2s;white-space:nowrap}
.admin-btn:hover{background:rgba(161,240,0,.18);box-shadow:0 0 10px var(--neon-glow)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:var(--tbg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 1rem;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{font-family:'Bebas Neue',sans-serif;font-size:.88rem;letter-spacing:2px;color:var(--gray);background:none;border:none;border-bottom:3px solid transparent;padding:.85rem 1.1rem;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-2px;flex-shrink:0;text-decoration:none;display:inline-block}
.nav-btn:hover{color:var(--neon-l)}
.nav-btn.on{color:var(--neon);border-bottom-color:var(--neon);text-shadow:0 0 10px var(--neon-glow)}

/* MAIN */
.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.2rem 1rem}
.panel{display:none}.panel.on{display:block}

/* SEC TITLE */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--neon);margin-bottom:1rem;display:flex;align-items:center;gap:.7rem;text-shadow:0 0 12px var(--neon-glow)}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--neon),transparent)}

/* STATS STRIP */
.stats-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.7rem;margin-bottom:1.2rem}
.sc{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:.75rem .5rem;text-align:center;backdrop-filter:blur(8px);transition:all .2s}
.sc:hover{border-color:var(--border);box-shadow:0 0 12px var(--neon-glow)}
.sc-n{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--neon);line-height:1;text-shadow:0 0 10px var(--neon-glow)}
.sc-l{font-size:.6rem;letter-spacing:1px;color:var(--gray);margin-top:2px}

/* FILTERS */
.filters{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem}
.fb{font-size:.72rem;letter-spacing:.5px;padding:.3rem .75rem;background:var(--neon-glow2);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;transition:all .2s;white-space:nowrap}
.fb:hover,.fb.on{background:rgba(161,240,0,.18);border-color:var(--neon);color:var(--neon);box-shadow:0 0 8px var(--neon-glow)}

/* ══ MATCH CARD — CARD STYLE ══ */
.match-sections{display:flex;flex-direction:column;gap:1.2rem}

/* Expand/Collapse controls */
.match-controls{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap}
.ctrl-btn{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1.5px;padding:.35rem .9rem;background:rgba(161,240,0,.08);border:1px solid var(--border2);border-radius:20px;color:var(--neon);cursor:pointer;transition:all .2s}
.ctrl-btn:hover{background:rgba(161,240,0,.18);border-color:var(--neon);box-shadow:0 0 8px var(--neon-glow)}

/* Date section */
.date-section{overflow:hidden}
.date-section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;letter-spacing:2px;color:var(--neon);
  margin-bottom:.7rem;
  display:flex;align-items:center;gap:.7rem;
  padding:.55rem .9rem;
  background:rgba(161,240,0,.05);
  border-left:3px solid var(--neon);
  border-radius:0 6px 6px 0;
  cursor:pointer;
  user-select:none;
  transition:background .2s;
}
.date-section-title:hover{background:rgba(161,240,0,.1)}
.date-section-title .ds-arrow{margin-left:auto;font-size:.75rem;transition:transform .25s;display:inline-block}
.date-section-title .ds-count{font-size:.65rem;color:rgba(255,255,255,.45);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
.date-section-title .ds-done{font-size:.6rem;padding:.1rem .45rem;background:rgba(161,240,0,.12);border:1px solid var(--border2);border-radius:10px;color:var(--neon)}
.date-section-title .ds-past{font-size:.6rem;padding:.1rem .45rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.4)}
.date-section-body{
  overflow:hidden;
  transition:max-height .35s ease, opacity .25s ease;
  max-height:2000px;
  opacity:1;
}
.date-section-body.collapsed{max-height:0;opacity:0}

.match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding-bottom:.3rem}

/* Card */
.mc{background:var(--card);border:1px solid var(--border2);border-radius:14px;overflow:hidden;transition:all .2s;display:flex;flex-direction:column}
.mc:hover{border-color:var(--neon);box-shadow:0 0 20px var(--neon-glow),0 8px 28px var(--shadow);transform:translateY(-2px)}

/* Card header */
.mc-hdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;border-bottom:1px solid var(--border2)}
.mc-grp-badge{
  font-family:'Bebas Neue',sans-serif;
  font-size:.82rem;letter-spacing:1px;
  padding:.2rem .65rem;border-radius:20px;
  background:rgba(161,240,0,.1);color:var(--neon);
  border:1px solid var(--border2);
}
.mc-matchday{
  font-family:'Bebas Neue',sans-serif;
  font-size:.78rem;letter-spacing:.5px;
  color:rgba(255,255,255,.45);
}

/* Card body */
.mc-body{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1rem .75rem;gap:.5rem}
.mc-team{display:flex;flex-direction:column;align-items:center;gap:.55rem;flex:1;min-width:0}
.mc-flag-big{width:80px;height:60px;object-fit:cover;border-radius:8px;box-shadow:0 0 14px rgba(161,240,0,.12),0 3px 10px var(--shadow)}
.mc-flag-ph{width:80px;height:60px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--gray)}
.mc-tname{
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;letter-spacing:.5px;
  color:var(--text);text-align:center;line-height:1.2;max-width:110px;
}

/* Score center */
.mc-score-center{display:flex;align-items:center;gap:.4rem;flex-shrink:0;padding:0 .4rem}
.mc-vs{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.1rem;font-weight:700;
  color:rgba(161,240,0,.35);letter-spacing:3px;
}
.mc-sc{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--neon);line-height:1;min-width:26px;text-align:center;text-shadow:0 0 15px var(--neon-glow)}
.mc-sc-sep{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:rgba(161,240,0,.5);margin:0 .1rem}

/* Card footer */
.mc-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1rem;border-top:1px solid var(--border2);
  margin-top:auto;
}
.mc-footer-date{
  font-family:'Bebas Neue',sans-serif;
  font-size:.8rem;letter-spacing:.5px;
  color:rgba(255,255,255,.5);
  flex-shrink:0;
}
.mc-footer-stadium{
  font-family:'Bebas Neue',sans-serif;
  font-size:.78rem;letter-spacing:.3px;
  color:rgba(255,255,255,.45);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55%;text-align:right;
}

/* Goals */
.mc-goals{padding:.5rem 1rem;display:flex;gap:1.5rem;border-top:1px solid var(--border2);background:rgba(161,240,0,.03)}
.mc-goals-side{flex:1}
.mc-goals-side.right{text-align:right}
.goal-item{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.78rem;color:var(--text2);padding:1px 0;
}
.goal-item .gmin{color:var(--neon);font-weight:700}
.goal-item .gpen{color:var(--orange);font-size:.68rem}

@media(max-width:900px){.match-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){
  .match-grid{grid-template-columns:1fr}
  .mc-flag-big{width:64px;height:48px}
  .mc-tname{font-size:.88rem}
  .mc-sc{font-size:2rem}
  .mc-footer-date,.mc-footer-stadium{font-size:.72rem}
}

/* GROUP */
.grp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:1rem}
.grp-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.grp-hd{background:linear-gradient(135deg,rgba(161,240,0,.12),rgba(5,15,16,.95));padding:.55rem .9rem;display:flex;align-items:center;gap:.55rem;border-bottom:1px solid var(--border)}
.grp-let{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--neon);line-height:1;text-shadow:0 0 15px rgba(201,168,76,.4)}
.grp-lbl{font-size:.62rem;color:var(--gray);letter-spacing:1px}
.gt{width:100%;border-collapse:collapse;font-size:.77rem}
.gt th{padding:.4rem .4rem;text-align:center;font-size:.57rem;letter-spacing:1px;color:var(--gray);background:rgba(0,0,0,.3);border-bottom:1px solid var(--border2)}
.gt th:first-child{text-align:left;padding-left:.65rem}
.gt td{padding:.42rem .4rem;text-align:center;border-bottom:1px solid var(--border2)}
.gt td:first-child{text-align:left;padding-left:.65rem}
.gt tbody tr:last-child td{border-bottom:none}
.gt tbody tr:hover{background:rgba(255,255,255,.03)}
.gt-team{display:flex;align-items:center;gap:.35rem}
.gt-flag{width:20px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0}
.gt-rank{display:inline-block;width:15px;height:15px;background:rgba(255,255,255,.07);border-radius:2px;text-align:center;line-height:15px;font-size:.58rem;color:var(--gray);margin-right:2px;flex-shrink:0}
.pts-c{font-weight:700;color:var(--neon);font-size:.88rem}
.gdp{color:var(--neon)}.gdn{color:var(--red)}.gdz{color:var(--gray)}
.row-q{background:rgba(161,240,0,.05)!important}.row-q td:first-child{border-left:3px solid var(--neon)}
.row-3{background:rgba(161,240,0,.02)!important}.row-3 td:first-child{border-left:3px solid rgba(161,240,0,.5)}

/* ══ KNOCKOUT BRACKET — SYMMETRIC ══ */
.bracket-desktop{display:none}
.bracket-mobile{display:none}
@media(min-width:860px){.bracket-desktop{display:block}.bracket-mobile{display:none}}
@media(max-width:859px){.bracket-desktop{display:none}.bracket-mobile{display:block}}

.sym-bracket{
  display:grid;
  grid-template-columns:repeat(4,1fr) 170px repeat(4,1fr);
  gap:0;
  min-width:1050px;
}
.sym-col{display:flex;flex-direction:column;padding:0 2px;min-height:600px}
.sym-col-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:.68rem;letter-spacing:1.5px;
  color:var(--neon);text-align:center;
  padding:.4rem 0 .6rem;
}
.sym-spacer{flex:1;min-height:4px}

/* Match card */
.sym-match{
  background:var(--card);border:1px solid var(--border2);
  border-radius:7px;overflow:hidden;margin:2px 0;transition:border .15s;
}
.sym-match:hover{border-color:var(--neon)}
.sym-match.has-result{border-color:rgba(161,240,0,.3)}
.sym-team{
  display:flex;align-items:center;gap:5px;
  padding:5px 7px;border-bottom:1px solid var(--border2);
  min-height:28px;font-size:.72rem;
}
.sym-team:last-of-type{border-bottom:none}
.sym-flag{width:20px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0}
.sym-tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.sym-tname.tbd{color:var(--gray);font-style:italic;font-size:.65rem}
.sym-score{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:var(--neon);min-width:16px;text-align:right}
.sym-team.win{background:rgba(161,240,0,.1)}
.sym-team.win .sym-tname{font-weight:700}
.sym-team.win .sym-score{color:var(--neon)}
.sym-extra{text-align:center;font-size:.58rem;color:var(--orange);padding:2px;border-top:1px solid var(--border2)}
.sym-date{text-align:center;font-size:.55rem;color:var(--gray);padding:2px;background:rgba(161,240,0,.03)}

/* Center column */
.sym-center{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 4px;gap:8px;
}
.sym-final-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:.72rem;letter-spacing:2px;
  color:var(--neon);text-align:center;
}
.sym-champion{
  border:1px solid var(--border);border-radius:10px;
  background:rgba(161,240,0,.07);
  padding:10px 8px;text-align:center;width:100%;
}
.sym-champ-flag{
  width:44px;height:33px;object-fit:cover;
  border-radius:4px;margin:0 auto 5px;display:block;
}
.sym-champ-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:.95rem;letter-spacing:1px;color:var(--neon);
}
.sym-3rd-label{font-size:.6rem;letter-spacing:1px;color:var(--gray);text-align:center}

/* Mobile tabs */
.bk-round-tabs{display:flex;gap:.3rem;flex-wrap:nowrap;overflow-x:auto;margin-bottom:.8rem;padding-bottom:.3rem;scrollbar-width:none}
.bk-round-tabs::-webkit-scrollbar{display:none}
.bk-rtab{font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:1px;padding:.35rem .8rem;background:var(--card);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.bk-rtab.on{background:rgba(161,240,0,.15);border-color:var(--neon);color:#fff}
.bk-round-panel{display:none}.bk-round-panel.on{display:flex;flex-direction:column;gap:.4rem}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:680px){.stats-grid{grid-template-columns:1fr}}
.stats-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.stats-card-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;color:var(--neon);padding:.65rem 1rem;background:rgba(161,240,0,.05);border-bottom:1px solid var(--border)}
.scorer-row{display:flex;align-items:center;gap:.65rem;padding:.5rem .9rem;border-bottom:1px solid var(--border2)}
.scorer-row:last-child{border-bottom:none}
.scorer-row:hover{background:rgba(255,255,255,.03)}
.sr-rank{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gray);width:22px;text-align:center;flex-shrink:0}
.sr-rank.g1{color:var(--neon)}.sr-rank.g2{color:rgba(255,255,255,.6)}.sr-rank.g3{color:rgba(161,240,0,.6)}
.sr-flag{width:26px;height:19px;object-fit:cover;border-radius:2px;flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:.8rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-team{font-size:.62rem;color:var(--gray)}
.sr-goals{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:var(--neon)}
.team-row{display:flex;align-items:center;gap:.65rem;padding:.45rem .9rem;border-bottom:1px solid var(--border2)}
.team-row:last-child{border-bottom:none}
.team-row:hover{background:rgba(255,255,255,.03)}
.tr-flag{width:28px;height:21px;object-fit:cover;border-radius:2px;flex-shrink:0}
.tr-name{flex:1;font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-bar-wrap{width:70px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.tr-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:2px}
.tr-goals{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--neon);min-width:20px;text-align:right}
.stats-empty{padding:1.5rem;text-align:center;color:var(--gray);font-size:.8rem}

/* Stats team filter */
/* Match history */
.mh-header{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1.5px;color:var(--neon);padding:.5rem .9rem;background:rgba(161,240,0,.05);border-bottom:1px solid var(--border2)}
.mh-row{display:flex;align-items:center;gap:.5rem;padding:.42rem .9rem;border-bottom:1px solid var(--border2);font-size:.75rem}
.mh-row:last-child{border-bottom:none}
.mh-row:hover{background:rgba(255,255,255,.03)}
.mh-date{font-size:.65rem;color:var(--gray);flex-shrink:0;min-width:65px}
.mh-opp{flex:1;display:flex;align-items:center;gap:.35rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mh-score{font-family:'Bebas Neue',sans-serif;font-size:.9rem;flex-shrink:0;min-width:50px;text-align:right}

/* Third place */
.tp-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;overflow:hidden;padding:1rem}
.tp-tbl{width:100%;border-collapse:collapse;font-size:.78rem}
.tp-tbl th{padding:.4rem .5rem;text-align:center;font-size:.58rem;letter-spacing:1px;color:var(--gray);background:rgba(0,0,0,.3);border-bottom:1px solid var(--border2)}
.tp-tbl th:nth-child(2){text-align:left}
.tp-tbl td{padding:.42rem .5rem;text-align:center;border-bottom:1px solid var(--border2)}
.tp-tbl td:nth-child(2){text-align:left}
.tp-tbl tbody tr:hover{background:rgba(255,255,255,.03)}

/* Loader */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:9999;transition:opacity .4s}
.loader.gone{opacity:0;pointer-events:none}
.loader-ic{font-size:3rem;animation:fl 1s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.loader-txt{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;color:var(--neon);font-size:1rem}
.loader-bar{width:200px;height:2px;background:rgba(161,240,0,.15);border-radius:2px;overflow:hidden}
.loader-fill{height:100%;background:var(--neon);animation:lb 1.5s infinite;box-shadow:0 0 8px var(--neon)}
@keyframes lb{0%{width:0;margin-left:0}50%{width:60%}100%{width:0;margin-left:100%}}

/* Responsive */
@media(max-width:600px){
  .mc-meta{min-width:108px;padding:.5rem .6rem}
  .mc-body{padding:.5rem .6rem;gap:.3rem}
  .mc-flag{width:30px;height:22px}
  .mc-tname{font-size:.8rem}
  .mc-ten{display:none}
  .sb{width:30px;height:30px;font-size:1.1rem}
}
@media(max-width:380px){.mc-flag{display:none}}
/* ══ SQUADS PAGE ══ */
.sq-controls{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem}
.sq-top-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem;flex-wrap:wrap}
.sq-team-scroll{display:flex;gap:.35rem;flex-wrap:wrap;padding-bottom:.3rem}
.sq-team-btn{display:inline-flex;align-items:center;gap:.35rem;font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1px;padding:.3rem .7rem;background:var(--neon-glow2);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;white-space:nowrap;transition:all .2s}
.sq-team-btn:hover{border-color:var(--border);color:var(--text)}
.sq-team-btn.on{background:rgba(161,240,0,.15);border-color:var(--neon);color:var(--neon);box-shadow:0 0 8px var(--neon-glow)}
.sq-team-btn img{width:20px;height:15px;object-fit:cover;border-radius:2px}
.sq-pos-btns{display:flex;gap:.3rem;flex-shrink:0}
.sq-pos-btn{font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:1px;padding:.3rem .65rem;background:var(--neon-glow2);border:1px solid var(--border2);border-radius:5px;color:var(--gray);cursor:pointer;transition:all .2s}
.sq-pos-btn.on{background:rgba(161,240,0,.15);border-color:var(--neon);color:var(--neon)}

/* Squad header card */
.sq-header{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:1.1rem 1.2rem;margin-bottom:1rem;display:flex;align-items:center;gap:1rem;backdrop-filter:blur(8px)}
.sq-header-flag{width:80px;height:60px;object-fit:cover;border-radius:8px;box-shadow:0 0 14px rgba(161,240,0,.12)}
.sq-header-info{flex:1}
.sq-header-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--neon);text-shadow:0 0 12px var(--neon-glow)}
.sq-header-sub{font-size:.75rem;color:var(--gray);margin-top:2px}
.sq-header-coach{font-size:.8rem;color:var(--text2);margin-top:.4rem}
.sq-header-stats{display:flex;gap:1rem;margin-top:.5rem}
.sq-stat{text-align:center}
.sq-stat-n{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--neon)}
.sq-stat-l{font-size:.58rem;color:var(--gray);letter-spacing:.5px}

/* Player grid */
.sq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.7rem}
.sq-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;overflow:hidden;transition:all .2s;display:flex;align-items:stretch}
.sq-card:hover{border-color:var(--neon);box-shadow:0 0 14px var(--neon-glow)}
.sq-card.captain{border-color:rgba(161,240,0,.4)}
.sq-no{width:38px;background:rgba(161,240,0,.07);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--neon);flex-shrink:0;border-right:1px solid var(--border2)}
.sq-pos-badge{font-family:'Bebas Neue',sans-serif;font-size:.6rem;letter-spacing:1px;padding:.15rem .35rem;border-radius:3px}
.sq-pos-badge.GK{background:rgba(255,170,0,.15);color:#ffaa00;border:1px solid rgba(255,170,0,.3)}
.sq-pos-badge.DF{background:rgba(161,240,0,.12);color:var(--neon);border:1px solid var(--border2)}
.sq-pos-badge.MF{background:rgba(0,170,255,.12);color:#00aaff;border:1px solid rgba(0,170,255,.25)}
.sq-pos-badge.FW{background:rgba(255,77,77,.12);color:#ff4d4d;border:1px solid rgba(255,77,77,.25)}
.sq-body{flex:1;padding:.55rem .7rem;min-width:0}
.sq-name-row{display:flex;align-items:center;gap:.4rem;margin-bottom:.25rem}
.sq-pname{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.5px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sq-cap-badge{font-size:.55rem;padding:.1rem .35rem;background:rgba(161,240,0,.18);border:1px solid var(--neon);border-radius:3px;color:var(--neon);flex-shrink:0}
.sq-club{font-size:.68rem;color:var(--text2);display:flex;align-items:center;gap:.3rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sq-club img{width:16px;height:12px;object-fit:cover;border-radius:1px;flex-shrink:0}
.sq-meta{display:flex;gap:.5rem;margin-top:.3rem;font-size:.62rem;color:var(--gray)}
.sq-meta span{display:flex;align-items:center;gap:2px}

/* Loading skeleton */
.sq-loading{text-align:center;padding:3rem;color:var(--gray);font-size:.85rem}
.sq-empty{text-align:center;padding:2rem;color:var(--gray);font-size:.8rem}
@media(max-width:600px){.sq-grid{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.sq-grid{grid-template-columns:1fr}}
</style>
</head>

<main class="main">

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import{FIREBASE_CONFIG}from'./firebase-config.js';
import{TEAMS,GROUPS,MATCHES,KO_ROUNDS}from'./data.js';

const app=initializeApp(FIREBASE_CONFIG);
const db=getDatabase(app);

const DAYS=['রবি','সোম','মঙ্গল','বুধ','বৃহঃ','শুক্র','শনি'];
const MON=['জানু','ফেব','মার্চ','এপ্রি','মে','জুন','জুলাই','আগ','সেপ্ট','অক্টো','নভে','ডিসে'];
function fD(d){const dt=new Date(d+'T00:00:00');return`${DAYS[dt.getDay()]}, ${dt.getDate()} ${MON[dt.getMonth()]}`;}
function fT(t){
  const[h,m]=t.split(':').map(Number);
  const tz=window._siteTZ||6;
  const diffHours=tz-6;
  let adjH=(h+diffHours+24)%24;
  const ap=adjH<12?'AM':'PM';
  const h12=adjH===0?12:adjH>12?adjH-12:adjH;
  const tzLabel=tz>=0?`GMT+${tz}`:`GMT${tz}`;
  return`${h12}:${String(m).padStart(2,'0')} ${ap} <span style="font-size:.55rem;opacity:.6">${tzLabel}</span>`;
}
// XSS escape
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
// flagcdn.com valid sizes: 20x15,24x18,28x21,32x24,40x30,48x36,64x48,80x60
function nearestFlag(w){
  const sizes=[20,24,28,32,40,48,64,80];
  return sizes.reduce((a,b)=>Math.abs(b-w)<Math.abs(a-w)?b:a);
}
function fImg(name,w=40,h=30){
  const t=TEAMS[name];
  if(!t)return`<div style="width:${w}px;height:${h}px;background:var(--bg3);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--gray)">?</div>`;
  const fw=nearestFlag(w);const fh=Math.round(fw*0.75);
  return`<img src="https://flagcdn.com/${fw}x${fh}/${t.code}.png" style="width:${w}px;height:${h}px;object-fit:cover;border-radius:3px;box-shadow:0 1px 4px var(--shadow)" loading="lazy" onerror="this.style.display='none'" alt="${t.en}">`;
}
// Extract rank from Bengali name like "১৫. মেক্সিকো" → rank=15
function getRank(name){
  const m=name.match(/^([\d০-৯]+)\./);
  if(!m)return'';
  // Convert Bengali digits to Arabic
  const bn='০১২৩৪৫৬৭৮৯';
  return m[1].split('').map(c=>{const i=bn.indexOf(c);return i>=0?i:c;}).join('');
}
function enName(name){return TEAMS[name]?.en||name}
// Name with rank prefix: "15. Mexico"
function enNameRanked(name){
  const rank=getRank(name);
  const en=TEAMS[name]?.en||name;
  return rank?`${rank}. ${en}`:en;
}

let scores={};
let schedGrp='ALL';
let statsGrp='ALL';
let statsTeam='ALL';
let activeBkTab=0;
window._siteTZ=6; // default GMT+6, overridden by settings

// Settings helpers (same as admin)
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function lightenHex(hex,pct){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+Math.round(pct*2.55));g=Math.min(255,g+Math.round(pct*2.55));b=Math.min(255,b+Math.round(pct*2.55));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}
const FONT_MAP_PUB={barlow:"'Barlow Condensed',sans-serif",hind:"'Hind Siliguri',sans-serif",roboto:"'Roboto Condensed',sans-serif",oswald:"'Oswald',sans-serif",exo:"'Exo 2',sans-serif"};
const FONT_URLS_PUB={roboto:'https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&display=swap',oswald:'https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap',exo:'https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap'};

// Main site nav labels
const NAV_LABELS={
  bn:{schedule:'📅 ম্যাচ সূচি',groups:'📊 Group Table',thirdplace:'🥉 Best 3rd Places From Groups',knockout:'🏅 Knockout',stats:'📈 Stats',squads:'🧑‍⚽ Squads'},
  en:{schedule:'📅 Schedule',groups:'📊 Groups',thirdplace:'🥉 Best 3rd Places From Groups',knockout:'🏅 Knockout',stats:'📈 Stats',squads:'🧑‍⚽ Squads'}
};

function applySettingsPub(s){
  if(!s)return;
  const r=document.documentElement.style;
  if(s.colors){
    const{bg,accent,text}=s.colors;
    if(bg){r.setProperty('--bg',bg);r.setProperty('--bg2',lightenHex(bg,3));r.setProperty('--bg3',lightenHex(bg,7));}
    if(accent){
      r.setProperty('--neon',accent);
      r.setProperty('--neon-l',lightenHex(accent,15));
      r.setProperty('--neon-glow',hexToRgba(accent,0.25));
      r.setProperty('--neon-glow2',hexToRgba(accent,0.08));
      r.setProperty('--border',hexToRgba(accent,0.25));
      r.setProperty('--border2',hexToRgba(accent,0.1));
      r.setProperty('--inp',hexToRgba(accent,0.06));
    }
    if(text)r.setProperty('--text',text);
  }
  if(s.font){
    const fUrl=FONT_URLS_PUB[s.font];
    if(fUrl&&!document.getElementById('dynFont-'+s.font)){
      const l=document.createElement('link');l.id='dynFont-'+s.font;l.rel='stylesheet';l.href=fUrl;document.head.appendChild(l);
    }
    document.body.style.fontFamily=FONT_MAP_PUB[s.font]||FONT_MAP_PUB.barlow;
  }
  if(s.tz)window._siteTZ=parseFloat(s.tz)||6;
  // Language — nav buttons by data attribute
  if(s.lang){
    window._siteLang=s.lang;
    const L=NAV_LABELS[s.lang]||NAV_LABELS.bn;
    const navBtns=document.querySelectorAll('.nav-btn');
    const keys=['schedule','groups','thirdplace','knockout','stats','squads'];
    navBtns.forEach((b,i)=>{if(keys[i]&&L[keys[i]])b.textContent=L[keys[i]];});
  }
}

// Load settings: localStorage first, then Firebase
(function(){
  const local=localStorage.getItem('siteSettings');
  if(local){try{applySettingsPub(JSON.parse(local));}catch(e){}}
})();
onValue(ref(db,'settings'),snap=>{
  const s=snap.val();
  if(s){applySettingsPub(s);localStorage.setItem('siteSettings',JSON.stringify(s));}
},{onlyOnce:true});

// Firebase scores
onValue(ref(db,'scores'),snap=>{
  scores=snap.val()||{};
  document.getElementById('dbSt').innerHTML='<span style="color:var(--neon)">✓ Live</span>';
  renderAll();hideLoader();
},()=>{
  document.getElementById('dbSt').innerHTML='<span style="color:var(--red)">✗ Offline</span>';
  renderAll();hideLoader();
});
window._reload=function(){location.reload();};

function calcGroups(){
  const t={};
  for(const[g,teams]of Object.entries(GROUPS)){t[g]={};for(const tm of teams)t[g][tm]={pl:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};}
  for(const m of MATCHES){
    const sc=scores[m.id];if(!sc||sc.s1===undefined||sc.s1===null)continue;
    const tbl=t[m.grp];if(!tbl||!tbl[m.t1]||!tbl[m.t2])continue;
    const s1=Number(sc.s1),s2=Number(sc.s2);
    tbl[m.t1].pl++;tbl[m.t2].pl++;tbl[m.t1].gf+=s1;tbl[m.t1].ga+=s2;tbl[m.t2].gf+=s2;tbl[m.t2].ga+=s1;
    if(s1>s2){tbl[m.t1].w++;tbl[m.t1].pts+=3;tbl[m.t2].l++;}
    else if(s1<s2){tbl[m.t2].w++;tbl[m.t2].pts+=3;tbl[m.t1].l++;}
    else{tbl[m.t1].d++;tbl[m.t1].pts++;tbl[m.t2].d++;tbl[m.t2].pts++;}
  }
  const s={};
  for(const[g,tbl]of Object.entries(t)){s[g]=Object.entries(tbl).map(([n,v])=>({name:n,...v,gd:v.gf-v.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);}
  return s;
}

function renderAll(){
  const grps=calcGroups();
  renderStrip(grps);
  renderSchedFilters();
  renderMatches(schedGrp);
  renderGroups(grps);
  renderBracket(grps);
  renderStats(grps);
  renderThirdPlace(grps);
}

// Strip
function renderStrip(){
  const koMatches=KO_ROUNDS.flatMap(r=>r.matches);
  const grpDone=MATCHES.filter(m=>scores[m.id]?.s1!==undefined).length;
  const koDone=koMatches.filter(m=>scores[m.id]?.s1!==undefined).length;
  const pl=grpDone+koDone;
  const total=MATCHES.length+koMatches.length; // 72+32=104
  const gl=MATCHES.reduce((s,m)=>s+(scores[m.id]?Number(scores[m.id].s1||0)+Number(scores[m.id].s2||0):0),0)
          +koMatches.reduce((s,m)=>s+(scores[m.id]?Number(scores[m.id].s1||0)+Number(scores[m.id].s2||0):0),0);
  document.getElementById('statStrip').innerHTML=
    `<div class="sc"><div class="sc-n">${pl}</div><div class="sc-l">খেলা হয়েছে</div></div>
     <div class="sc"><div class="sc-n">${total-pl}</div><div class="sc-l">বাকি ম্যাচ</div></div>
     <div class="sc"><div class="sc-n">${total}</div><div class="sc-l">মোট ম্যাচ</div></div>
     <div class="sc"><div class="sc-n">${gl}</div><div class="sc-l">মোট গোল</div></div>
     <div class="sc"><div class="sc-n">${pl?(gl/pl).toFixed(1):'0.0'}</div><div class="sc-l">গড় গোল</div></div>
     <div class="sc"><div class="sc-n">48</div><div class="sc-l">দেশ</div></div>`;
}

// Schedule
function renderSchedFilters(){
  const gs=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('schedFilters').innerHTML=gs.map(g=>
    `<button class="fb ${schedGrp===g?'on':''}" onclick="window._sfg('${g}')">${g==='ALL'?'সকল ম্যাচ':'Group '+g}</button>`
  ).join('');
}
window._sfg=function(g){schedGrp=g;renderSchedFilters();renderMatches(g);};

function renderMatches(grp){
  const list=grp==='ALL'?MATCHES:MATCHES.filter(m=>m.grp===grp);

  function bigFlag(name){
    const t=TEAMS[name];
    if(!t)return`<div class="mc-flag-ph">?</div>`;
    return`<img class="mc-flag-big" src="https://flagcdn.com/80x60/${t.code}.png" loading="lazy" onerror="this.style.display='none'" alt="${t.en}">`;
  }

  function cardHTML(m){
    const sc=scores[m.id]||{};
    const done=sc.s1!==undefined&&sc.s1!==null;
    const g1=sc.goals1||[],g2=sc.goals2||[];
    const hasGoals=g1.length>0||g2.length>0;
    const [yr,mo,dy]=m.date.split('-');
    return`<div class="mc">
      <div class="mc-hdr">
        <span class="mc-grp-badge">Group ${m.grp}</span>
        <span class="mc-matchday">Match #${m.id} · MD${m.md||1}</span>
      </div>
      <div class="mc-body">
        <div class="mc-team">
          ${bigFlag(m.t1)}
          <div class="mc-tname">${enNameRanked(m.t1)}</div>
        </div>
        <div class="mc-score-center">
          ${done
            ?`<span class="mc-sc">${sc.s1}</span><span class="mc-sc-sep">-</span><span class="mc-sc">${sc.s2}</span>`
            :`<span class="mc-vs">VS</span>`
          }
        </div>
        <div class="mc-team">
          ${bigFlag(m.t2)}
          <div class="mc-tname">${enNameRanked(m.t2)}</div>
        </div>
      </div>
      ${hasGoals?`<div class="mc-goals">
        <div class="mc-goals-side">${g1.map(g=>`<div class="goal-item">⚽ ${esc(g.name)} <span class="gmin">${esc(g.min)}'</span>${g.pen?` <span class="gpen">(P)</span>`:''}</div>`).join('')}</div>
        <div class="mc-goals-side right">${g2.map(g=>`<div class="goal-item">${g.pen?`<span class="gpen">(P) </span>`:''}<span class="gmin">${esc(g.min)}'</span> ${esc(g.name)} ⚽</div>`).join('')}</div>
      </div>`:''}
      <div class="mc-footer">
        <span class="mc-footer-date">⏰ ${fT(m.time)}</span>
        <span class="mc-footer-stadium">🏟 ${m.stadium||''}</span>
      </div>
    </div>`;
  }

  // Group by date
  const byDate={};
  for(const m of list){
    if(!byDate[m.date])byDate[m.date]=[];
    byDate[m.date].push(m);
  }
  const sortedDates=Object.keys(byDate).sort();
  const DAYS=['রবি','সোম','মঙ্গল','বুধ','বৃহঃ','শুক্র','শনি'];
  const MON_BN=['জানু','ফেব','মার্চ','এপ্রি','মে','জুন','জুলাই','আগ','সেপ্ট','অক্টো','নভে','ডিসে'];

  function dateTitle(d){
    const dt=new Date(d+'T00:00:00');
    return`${DAYS[dt.getDay()]}, ${dt.getDate()} ${MON_BN[dt.getMonth()]} ${dt.getFullYear()}`;
  }

  // Determine today's date string
  const now=new Date();
  const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // Check if all matches in a date are finished
  function isDatePast(date){return date<todayStr;}
  function isDateAllDone(date){
    return byDate[date].every(m=>scores[m.id]?.s1!==undefined);
  }
  function getDoneCount(date){
    return byDate[date].filter(m=>scores[m.id]?.s1!==undefined).length;
  }

  document.getElementById('matchList').innerHTML=sortedDates.map(date=>{
    const past=isDatePast(date);
    const allDone=isDateAllDone(date);
    const doneCount=getDoneCount(date);
    const total=byDate[date].length;
    // Auto-collapse past dates where all matches done
    const collapsed=past&&allDone;
    const isToday=date===todayStr;

    const statusBadge=allDone
      ?`<span class="ds-done">✓ ${doneCount}/${total} শেষ</span>`
      :doneCount>0
        ?`<span class="ds-done">${doneCount}/${total} শেষ</span>`
        :`<span class="ds-past">${total}টি ম্যাচ</span>`;

    const todayBadge=isToday?`<span style="background:rgba(161,240,0,.2);border:1px solid var(--neon);border-radius:10px;font-size:.6rem;padding:.1rem .5rem;color:var(--neon);font-family:'Barlow Condensed',sans-serif">আজ</span>`:'';

    return`<div class="date-section" data-date="${date}">
      <div class="date-section-title" onclick="toggleSection(this)">
        <span style="font-size:.85rem">📅</span>
        <span>${dateTitle(date)}</span>
        ${todayBadge}
        ${statusBadge}
        <span class="ds-arrow" style="${collapsed?'transform:rotate(-90deg)':''}">▼</span>
      </div>
      <div class="date-section-body ${collapsed?'collapsed':''}">
        <div class="match-grid">${byDate[date].map(m=>cardHTML(m)).join('')}</div>
      </div>
    </div>`;
  }).join('');

  // Update expand info
  const total=sortedDates.length;
  const collapsed=document.querySelectorAll('.date-section-body.collapsed').length;
  const info=document.getElementById('expandInfo');
  if(info)info.textContent=`${total-collapsed}টি খোলা · ${collapsed}টি বন্ধ`;
}

// Toggle individual section
window.toggleSection=function(titleEl){
  const body=titleEl.nextElementSibling;
  const arrow=titleEl.querySelector('.ds-arrow');
  const isCollapsed=body.classList.contains('collapsed');
  body.classList.toggle('collapsed',!isCollapsed);
  if(arrow)arrow.style.transform=isCollapsed?'':'rotate(-90deg)';
  // Update info
  const total=document.querySelectorAll('.date-section-body').length;
  const collapsed=document.querySelectorAll('.date-section-body.collapsed').length;
  const info=document.getElementById('expandInfo');
  if(info)info.textContent=`${total-collapsed}টি খোলা · ${collapsed}টি বন্ধ`;
};

// Expand All
window.expandAll=function(){
  document.querySelectorAll('.date-section-body').forEach(b=>b.classList.remove('collapsed'));
  document.querySelectorAll('.ds-arrow').forEach(a=>a.style.transform='');
  const total=document.querySelectorAll('.date-section-body').length;

};

// Collapse All
window.collapseAll=function(){
  document.querySelectorAll('.date-section-body').forEach(b=>b.classList.add('collapsed'));

};

// ══ BRACKET AUTO-POPULATE ══
function getBest3rd(grps){
  return Object.entries(grps)
    .map(([g,teams])=>teams[2]?{...teams[2],group:g}:null)
    .filter(t=>t&&t.pl>0)
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

function buildBest3rdMap(grps){
  // Rank all 12 third-place teams
  const allThirds=Object.entries(grps)
    .map(([g,teams])=>teams[2]?{...teams[2],group:g}:null)
    .filter(t=>t&&t.pl>0)
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);

  const map={};
  const used=new Set(); // each team assigned to exactly ONE slot

  // Process slots in order — assign best available unused team per slot
  for(const m of KO_ROUNDS[0].matches){
    ['s1','s2'].forEach(side=>{
      const slot=m[side];
      if(!slot||!slot.startsWith('3rd '))return;
      const allowedGroups=slot.replace('3rd ','').split('');
      // Find best unused team from allowed groups
      const candidate=allThirds.find(t=>
        allowedGroups.includes(t.group)&&!used.has(t.name)
      );
      if(candidate){
        map[`${m.id}_${side}`]=candidate.name;
        used.add(candidate.name);
      }
    });
  }
  return map;
}

function resolveSlot(slot,grps){
  if(!slot)return'TBD';
  if(TEAMS[slot])return slot;
  const m1=slot.match(/^([12])([A-L])$/);
  if(m1){
    const rank=parseInt(m1[1])-1;
    const grp=m1[2];
    const team=grps[grp]?.[rank];
    return(team&&team.pl>0)?team.name:slot;
  }
  return slot;
}

function normalizeWinKey(raw){
  // "R32-1"→"r32_1", "R16-2"→"r16_2", "QF-1"→"qf_1"
  return raw.trim().toLowerCase().replace(/\s+/g,'').replace(/-/g,'_');
}

function buildWinnerMap(grps,b3map){
  const winners={};
  const losers={};
  const allMatches=KO_ROUNDS.flatMap(r=>r.matches);
  for(const m of allMatches){
    const sc=scores[m.id]||{};
    if(sc.s1===undefined||sc.s1===null)continue;
    let t1=sc.t1||'';let t2=sc.t2||'';
    if(!t1){
      if(m.s1?.startsWith('3rd '))t1=b3map[`${m.id}_s1`]||'';
      else{
        const rs=resolveSlot(m.s1,grps);
        if(rs!==m.s1)t1=rs;
        else{
          const wm=m.s1?.match(/^W\s+(.+)$/i);if(wm)t1=winners[normalizeWinKey(wm[1])]||'';
          if(!t1){const lm=m.s1?.match(/^L\s+(.+)$/i);if(lm)t1=losers[normalizeWinKey(lm[1])]||'';}
        }
      }
    }
    if(!t2){
      if(m.s2?.startsWith('3rd '))t2=b3map[`${m.id}_s2`]||'';
      else{
        const rs=resolveSlot(m.s2,grps);
        if(rs!==m.s2)t2=rs;
        else{
          const wm=m.s2?.match(/^W\s+(.+)$/i);if(wm)t2=winners[normalizeWinKey(wm[1])]||'';
          if(!t2){const lm=m.s2?.match(/^L\s+(.+)$/i);if(lm)t2=losers[normalizeWinKey(lm[1])]||'';}
        }
      }
    }
    const s1=Number(sc.s1),s2=Number(sc.s2);
    const et1=sc.et1!==undefined?Number(sc.et1):null,et2=sc.et2!==undefined?Number(sc.et2):null;
    const pen1=sc.pen1!==undefined?Number(sc.pen1):null,pen2=sc.pen2!==undefined?Number(sc.pen2):null;
    let winner='',loser='';
    if(pen1!==null&&pen2!==null){winner=pen1>pen2?t1:t2;loser=pen1>pen2?t2:t1;}
    else if(et1!==null&&et2!==null){const w=(s1+et1)>(s2+et2);winner=w?t1:t2;loser=w?t2:t1;}
    else{winner=s1>s2?t1:s2>s1?t2:'';loser=s1>s2?t2:s2>s1?t1:'';}
    if(winner)winners[m.id]=winner;
    if(loser)losers[m.id]=loser;
  }
  return{winners,losers};
}

function resolveKOSlot(slot,grps,b3map,wmap){
  if(!slot)return'TBD';
  if(TEAMS[slot])return slot;
  if(slot.match(/^([12])([A-L])$/))return resolveSlot(slot,grps);
  if(slot.startsWith('3rd '))return slot;
  const wm=slot.match(/^W\s+(.+)$/i);
  if(wm)return(wmap.winners||{})[normalizeWinKey(wm[1])]||slot;
  const lm=slot.match(/^L\s+(.+)$/i);
  if(lm)return(wmap.losers||{})[normalizeWinKey(lm[1])]||slot;
  return slot;
}

function buildMatch(m,grps={},b3map={},winnerMap={}){
  const sc=scores[m.id]||{};
  const s1raw=sc.s1;
  const done=s1raw!==undefined&&s1raw!==null;
  const et=sc.et1!==undefined;
  const pen=sc.pen1!==undefined;

  let t1=sc.t1||'';
  let t2=sc.t2||'';
  if(!t1){
    if(m.s1&&m.s1.startsWith('3rd '))t1=b3map[`${m.id}_s1`]||m.s1;
    else t1=resolveKOSlot(m.s1,grps,b3map,winnerMap)||m.s1||'TBD';
  }
  if(!t2){
    if(m.s2&&m.s2.startsWith('3rd '))t2=b3map[`${m.id}_s2`]||m.s2;
    else t2=resolveKOSlot(m.s2,grps,b3map,winnerMap)||m.s2||'TBD';
  }

  // Determine winner for highlighting
  let s1win=false,s2win=false;
  if(done){
    const n1=Number(sc.s1),n2=Number(sc.s2);
    if(pen){s1win=Number(sc.pen1)>Number(sc.pen2);s2win=!s1win;}
    else if(et){const t1tot=n1+Number(sc.et1||0),t2tot=n2+Number(sc.et2||0);s1win=t1tot>t2tot;s2win=t2tot>t1tot;}
    else{s1win=n1>n2;s2win=n2>n1;}
  }

  const f1=TEAMS[t1]?fImg(t1,18,13):'';
  const f2=TEAMS[t2]?fImg(t2,18,13):'';
  const auto1=!sc.t1&&TEAMS[t1];
  const auto2=!sc.t2&&TEAMS[t2];

  // Score display
  let scoreDisp='';
  if(done){
    scoreDisp=`${sc.s1}–${sc.s2}`;
    if(et)scoreDisp+=` (ET: ${sc.et1}–${sc.et2})`;
    if(pen)scoreDisp+=` (PSO: ${sc.pen1}–${sc.pen2})`;
  }

  return`<div class="bk-match">
    <div class="bk-team ${s1win?'bk-win':''}" style="${auto1?'opacity:.82':''}">
      ${f1}<span class="bk-tname">${t1}</span><span class="bk-sc">${done?sc.s1:''}</span>
    </div>
    <div class="bk-team ${s2win?'bk-win':''}" style="${auto2?'opacity:.82':''}">
      ${f2}<span class="bk-tname">${t2}</span><span class="bk-sc">${done?sc.s2:''}</span>
    </div>
    ${pen?`<div class="bk-date" style="color:var(--orange)">PSO: ${sc.pen1}–${sc.pen2}</div>`:
      et?`<div class="bk-date" style="color:var(--gold)">ET: ${sc.et1}–${sc.et2}</div>`:''}
    <div class="bk-date">${fD(m.date)} · ${fT(m.time)}</div>
  </div>`;
}

function renderBracket(grps={}){
  const b3map=buildBest3rdMap(grps);
  const wmap=buildWinnerMap(grps,b3map);

  function getTeam(m,side){
    const sc=scores[m.id]||{};
    let t=sc[side==='s1'?'t1':'t2']||'';
    if(!t){
      const slot=m[side];
      if(slot?.startsWith('3rd '))t=b3map[`${m.id}_${side}`]||slot;
      else t=resolveKOSlot(slot,grps,b3map,wmap)||slot||'TBD';
    }
    return t;
  }
  function getWinner(m){
    const sc=scores[m.id]||{};
    if(sc.s1===undefined||sc.s1===null)return'';
    const t1=getTeam(m,'s1'),t2=getTeam(m,'s2');
    const s1=Number(sc.s1),s2=Number(sc.s2);
    const pen1=sc.pen1!==undefined?Number(sc.pen1):null,pen2=sc.pen2!==undefined?Number(sc.pen2):null;
    const et1=sc.et1!==undefined?Number(sc.et1):null,et2=sc.et2!==undefined?Number(sc.et2):null;
    if(pen1!==null&&pen2!==null)return pen1>pen2?t1:t2;
    if(et1!==null&&et2!==null)return(s1+et1)>(s2+et2)?t1:t2;
    return s1>s2?t1:s2>s1?t2:'';
  }
  function symFlag(name){
    const t=TEAMS[name];if(!t)return'';
    return`<img class="sym-flag" src="https://flagcdn.com/24x18/${t.code}.png" loading="lazy" onerror="this.style.display='none'">`;
  }
  function isTBDish(t){return!t||t==='TBD'||t.startsWith('W ')||t.startsWith('L ')||t.startsWith('3rd ');}
  function symMatch(m,compact=false){
    if(!m)return'';
    const sc=scores[m.id]||{};
    const done=sc.s1!==undefined&&sc.s1!==null;
    const t1=getTeam(m,'s1'),t2=getTeam(m,'s2');
    const w=done?getWinner(m):'';
    const s1=done?sc.s1:'',s2=done?sc.s2:'';
    const hasET=sc.et1!==undefined,hasPen=sc.pen1!==undefined;
    const auto1=!(scores[m.id]||{}).t1&&TEAMS[t1];
    const auto2=!(scores[m.id]||{}).t2&&TEAMS[t2];
    return`<div class="sym-match ${done?'has-result':''}">
      <div class="sym-team ${w&&w===t1?'win':''}" style="${auto1?'opacity:.82':''}">
        ${symFlag(t1)}<span class="sym-tname ${isTBDish(t1)?'tbd':''}">${t1}</span>
        <span class="sym-score">${s1}</span>
      </div>
      <div class="sym-team ${w&&w===t2?'win':''}" style="${auto2?'opacity:.82':''}">
        ${symFlag(t2)}<span class="sym-tname ${isTBDish(t2)?'tbd':''}">${t2}</span>
        <span class="sym-score">${s2}</span>
      </div>
      ${hasPen?`<div class="sym-extra">PSO: ${sc.pen1}–${sc.pen2}</div>`:hasET?`<div class="sym-extra">ET: ${sc.et1}–${sc.et2}</div>`:''}
      <div class="sym-date">${m.num?`#${m.num} · `:''}${compact?'':`${fD(m.date)} · `}${fT(m.time)}</div>
    </div>`;
  }
  // Column builder — evenly distribute spacers
  function symCol(title,matches,topFlex,midFlex){
    let h=`<div class="sym-col"><div class="sym-col-title">${title}</div>`;
    h+=`<div class="sym-spacer" style="flex:${topFlex}"></div>`;
    for(let i=0;i<matches.length;i++){
      h+=symMatch(matches[i]);
      if(i<matches.length-1)h+=`<div class="sym-spacer" style="flex:${midFlex}"></div>`;
    }
    h+=`<div class="sym-spacer" style="flex:${topFlex}"></div>`;
    h+=`</div>`;return h;
  }

  const R32=KO_ROUNDS[0].matches;
  const R16=KO_ROUNDS[1].matches;
  const QF=KO_ROUNDS[2].matches;
  const SF=KO_ROUNDS[3].matches;
  const THIRD=KO_ROUNDS[4].matches[0];
  const FINAL=KO_ROUNDS[5].matches[0];

  const champion=getWinner(FINAL)||'';
  const champCode=TEAMS[champion]?.code||'';
  const champFlagURL=champCode?`https://flagcdn.com/48x36/${champCode}.png`:'';

  // spacer math: R32=8matches,R16=4,QF=2,SF=1
  // top/bottom spacer = midFlex/2 for visual centering
  let html='';
  html+=symCol('শেষ বত্রিশ',R32.slice(0,8),1,2);
  html+=symCol('শেষ ষোলো',R16.slice(0,4),3,6);
  html+=symCol('কোয়ার্টার',QF.slice(0,2),7,14);
  html+=symCol('সেমি ফাইনাল',[SF[0]],15,0);

  html+=`<div class="sym-center">
    <div class="sym-final-label">🏆 ফাইনাল</div>
    <div class="sym-champion">
      ${champFlagURL?`<img class="sym-champ-flag" src="${champFlagURL}" loading="lazy" onerror="this.style.display='none'">`
        :`<div style="width:44px;height:33px;background:rgba(201,168,76,.15);border-radius:4px;margin:0 auto 5px"></div>`}
      <div class="sym-champ-name">${champion||'—'}</div>
    </div>
    <div style="width:100%">${symMatch(FINAL,true)}</div>
    <div class="sym-3rd-label">🥉 তৃতীয় স্থান</div>
    <div style="width:100%">${symMatch(THIRD,true)}</div>
  </div>`;

  html+=symCol('সেমি ফাইনাল',[SF[1]],15,0);
  html+=symCol('কোয়ার্টার',QF.slice(2,4),7,14);
  html+=symCol('শেষ ষোলো',R16.slice(4,8),3,6);
  html+=symCol('শেষ বত্রিশ',R32.slice(8,16),1,2);

  document.getElementById('symDesktop').innerHTML=html;

  // Mobile
  const mRounds=[
    {name:'শেষ বত্রিশ',matches:R32},
    {name:'শেষ ষোলো',matches:R16},
    {name:'কোয়ার্টার',matches:QF},
    {name:'সেমি',matches:SF},
    {name:'🏆 ফাইনাল',matches:[FINAL,THIRD]},
  ];
  document.getElementById('bkTabs').innerHTML=mRounds.map((r,i)=>
    `<button class="bk-rtab ${i===activeBkTab?'on':''}" onclick="window._bktab(${i})">${r.name}</button>`
  ).join('');
  document.getElementById('bkMobile').innerHTML=mRounds.map((round,i)=>
    `<div class="bk-round-panel ${i===activeBkTab?'on':''}">
      ${round.matches.map(m=>symMatch(m)).join('')}
    </div>`
  ).join('');
}
window._bktab=function(i){
  activeBkTab=i;
  document.querySelectorAll('.bk-rtab').forEach((b,idx)=>b.classList.toggle('on',idx===i));
  document.querySelectorAll('.bk-round-panel').forEach((p,idx)=>p.classList.toggle('on',idx===i));
};

// ══ STATS ══
function renderStats(grps){
  // ── Group filter ──
  const gs=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('statsGrpFilters').innerHTML=gs.map(g=>
    `<button class="fb ${statsGrp===g?'on':''}" onclick="window._stg('${g}')">${g==='ALL'?'সকল':'Group '+g}</button>`
  ).join('');

  // ── Team filter ──
  const teamPool=statsGrp==='ALL'?Object.keys(TEAMS):GROUPS[statsGrp]||[];
  const sortedTeams=[...teamPool].sort((a,b)=>(parseInt(getRank(a))||999)-(parseInt(getRank(b))||999));
  document.getElementById('statsTeamFilters').innerHTML=
    `<button class="fb ${statsTeam==='ALL'?'on':''}" onclick="window._stt('ALL')">সকল দল</button>`
    +sortedTeams.map(n=>{
      const code=TEAMS[n]?.code||'';
      const en=TEAMS[n]?.en||n;
      const rank=getRank(n);
      return`<button class="fb ${statsTeam===n?'on':''}" onclick="window._stt('${n.replace(/'/g,"\\'")}')">
        ${code?`<img src="https://flagcdn.com/20x15/${code}.png" style="width:18px;height:13px;object-fit:cover;border-radius:2px;vertical-align:middle;margin-right:3px" loading="lazy">`:''}
        <span style="font-size:.6rem;opacity:.6;margin-right:2px">${rank}</span>${en}
      </button>`;
    }).join('');

  // ── Collect all match data ──
  const allMatches=[...MATCHES,...KO_ROUNDS.flatMap(r=>r.matches)];

  // ── Card data ──
  const cardMap={}; // name||team → {yellow,red}
  for(const m of allMatches){
    const sc=scores[m.id]||{};
    const t1=m.t1||(sc.t1||''), t2=m.t2||(sc.t2||'');
    for(const c of(sc.cards1||[])){
      const k=`${c.name}||${t1}`;
      if(!cardMap[k])cardMap[k]={name:c.name,team:t1,yellow:0,red:0};
      if(c.type==='yellow'||c.type==='yr')cardMap[k].yellow++;
      if(c.type==='red'||c.type==='yr')cardMap[k].red++;
    }
    for(const c of(sc.cards2||[])){
      const k=`${c.name}||${t2}`;
      if(!cardMap[k])cardMap[k]={name:c.name,team:t2,yellow:0,red:0};
      if(c.type==='yellow'||c.type==='yr')cardMap[k].yellow++;
      if(c.type==='red'||c.type==='yr')cardMap[k].red++;
    }
  }

  // ── Top scorers ──
  const scorerMap={};
  for(const m of MATCHES){
    const sc=scores[m.id]||{};
    for(const g of(sc.goals1||[])){const k=`${g.name}||${m.t1}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:m.t1,goals:0};scorerMap[k].goals++;}
    for(const g of(sc.goals2||[])){const k=`${g.name}||${m.t2}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:m.t2,goals:0};scorerMap[k].goals++;}
  }
  for(const round of KO_ROUNDS){for(const m of round.matches){
    const sc=scores[m.id]||{};
    const t1=sc.t1||'',t2=sc.t2||'';
    for(const g of(sc.goals1||[])){if(t1){const k=`${g.name}||${t1}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:t1,goals:0};scorerMap[k].goals++;}}
    for(const g of(sc.goals2||[])){if(t2){const k=`${g.name}||${t2}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:t2,goals:0};scorerMap[k].goals++;}}
  }}
  let scorers=Object.values(scorerMap).sort((a,b)=>b.goals-a.goals);

  // ── Team goals ──
  const teamGoals={};
  for(const m of MATCHES){
    const sc=scores[m.id]||{};if(sc.s1===undefined)continue;
    if(!teamGoals[m.t1])teamGoals[m.t1]={goals:0};
    if(!teamGoals[m.t2])teamGoals[m.t2]={goals:0};
    teamGoals[m.t1].goals+=Number(sc.s1||0);
    teamGoals[m.t2].goals+=Number(sc.s2||0);
  }

  // ── Filter by team/group ──
  if(statsTeam!=='ALL'){
    scorers=scorers.filter(s=>s.team===statsTeam);
  } else if(statsGrp!=='ALL'){
    scorers=scorers.filter(s=>GROUPS[statsGrp]?.includes(s.team));
  }
  let teamList=Object.entries(teamGoals).sort((a,b)=>b[1].goals-a[1].goals);
  if(statsTeam!=='ALL') teamList=teamList.filter(([n])=>n===statsTeam);
  else if(statsGrp!=='ALL') teamList=teamList.filter(([n])=>GROUPS[statsGrp]?.includes(n));
  const maxG=teamList[0]?teamList[0][1].goals:1;

  let cardList=Object.values(cardMap).sort((a,b)=>b.red-a.red||b.yellow-a.yellow);
  if(statsTeam!=='ALL') cardList=cardList.filter(c=>c.team===statsTeam);
  else if(statsGrp!=='ALL') cardList=cardList.filter(c=>GROUPS[statsGrp]?.includes(c.team));

  const titleSuffix=statsTeam!=='ALL'?`· ${enNameRanked(statsTeam)}`:statsGrp!=='ALL'?`· Group ${statsGrp}`:'';

  // ── Match history (only when a specific team is selected) ──
  let matchHistoryHTML='';
  if(statsTeam!=='ALL'){
    const played=[],upcoming=[];
    for(const m of MATCHES){
      if(m.t1!==statsTeam&&m.t2!==statsTeam)continue;
      const sc=scores[m.id]||{};
      const done=sc.s1!==undefined&&sc.s1!==null;
      const isHome=m.t1===statsTeam;
      const opp=isHome?m.t2:m.t1;
      const oppCode=TEAMS[opp]?.code||'';
      const myScore=done?(isHome?sc.s1:sc.s2):'';
      const opScore=done?(isHome?sc.s2:sc.s1):'';
      let result='';
      if(done){
        const ms=Number(myScore),os=Number(opScore);
        result=ms>os?'W':ms<os?'L':'D';
      }
      const row={m,opp,oppCode,myScore,opScore,result,done};
      if(done)played.push(row);else upcoming.push(row);
    }
    // KO matches — resolveKOSlot + b3map দিয়ে actual team বের করি
    const grps2=calcGroups();
    const b3map2=buildBest3rdMap(grps2);
    const wmap2=buildWinnerMap(grps2,b3map2);

    for(const round of KO_ROUNDS){
      for(const m of round.matches){
        const sc=scores[m.id]||{};

        // Resolve t1 and t2
        function resolveTeam(slot,side){
          if(!slot)return'';
          // Firebase stored team name
          const stored=sc[side==='s1'?'t1':'t2'];
          if(stored&&TEAMS[stored])return stored;
          // 1st/2nd place slot
          if(slot.match(/^([12])([A-L])$/))return resolveSlot(slot,grps2)||'';
          // 3rd place — use b3map with match id + side key
          if(slot.startsWith('3rd ')){
            return b3map2[`${m.id}_${side}`]||slot;
          }
          // Winner/Loser of previous match
          const wm=slot.match(/^W\s+(.+)$/i);
          if(wm)return(wmap2.winners||{})[normalizeWinKey(wm[1])]||'';
          const lm=slot.match(/^L\s+(.+)$/i);
          if(lm)return(wmap2.losers||{})[normalizeWinKey(lm[1])]||'';
          return'';
        }

        const t1=resolveTeam(m.s1,'s1');
        const t2=resolveTeam(m.s2,'s2');

        const teamInMatch=(t1===statsTeam)||(t2===statsTeam);
        if(!teamInMatch)continue;

        const done=sc.s1!==undefined&&sc.s1!==null;
        const isHome=t1===statsTeam;
        const opp=isHome?t2:t1;
        const oppSlot=isHome?m.s2:m.s1;
        const oppSide=isHome?'s2':'s1';
        const oppCode=TEAMS[opp]?.code||'';
        const myScore=done?(isHome?sc.s1:sc.s2):'';
        const opScore=done?(isHome?sc.s2:sc.s1):'';
        let result='';
        if(done){const ms=Number(myScore),os=Number(opScore);result=ms>os?'W':ms<os?'L':'D';}

        // Display-friendly opponent
        let oppDisplay,oppDisplayCode=oppCode;
        if(opp&&TEAMS[opp]){
          oppDisplay=enNameRanked(opp);
          oppDisplayCode=TEAMS[opp].code||'';
        } else if(oppSlot?.startsWith('3rd ')){
          const resolved=b3map2[`${m.id}_${oppSide}`];
          if(resolved&&TEAMS[resolved]){
            oppDisplay=enNameRanked(resolved);
            oppDisplayCode=TEAMS[resolved].code||'';
          } else {
            oppDisplay=`Best 3rd (${oppSlot.replace('3rd ','')})`;
          }
        } else if(oppSlot?.startsWith('W ')||oppSlot?.startsWith('L ')){
          oppDisplay=opp?enNameRanked(opp):`TBD`;
        } else {
          oppDisplay=opp||'TBD';
        }

        const row={m,opp:oppDisplay,oppCode:oppDisplayCode,myScore,opScore,result,done,round:round.name};
        if(done)played.push(row);else upcoming.push(row);
      }
    }

    const resultColor={W:'#A1F000',D:'#ffaa00',L:'#ff4d4d'};
    const matchRow=(row,isDone)=>`
      <div class="mh-row">
        <div class="mh-date">${fD(row.m.date)}</div>
        <div class="mh-opp">
          ${row.oppCode?`<img src="https://flagcdn.com/20x15/${row.oppCode}.png" style="width:18px;height:13px;object-fit:cover;border-radius:2px" loading="lazy">`:''}
          <span>${row.opp}</span>
          ${row.round?`<span style="font-size:.6rem;opacity:.5;margin-left:3px">(${row.round})</span>`:''}
        </div>
        ${isDone
          ?`<div class="mh-score" style="color:${resultColor[row.result]||'#fff'}">${row.result} ${row.myScore}–${row.opScore}</div>`
          :`<div class="mh-score" style="color:var(--gray)">বাকি</div>`
        }
      </div>`;

    matchHistoryHTML=`
      <div class="stats-card" style="grid-column:1/-1">
        <div class="stats-card-title">📋 ম্যাচ ইতিহাস · ${enNameRanked(statsTeam)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
          <div>
            <div class="mh-header">✅ খেলা হয়েছে (${played.length})</div>
            ${played.length?played.map(r=>matchRow(r,true)).join(''):`<div class="stats-empty">এখনো কোনো ম্যাচ খেলা হয়নি</div>`}
          </div>
          <div style="border-left:1px solid var(--border2)">
            <div class="mh-header">⏳ বাকি আছে (${upcoming.length})</div>
            ${upcoming.length?upcoming.map(r=>matchRow(r,false)).join(''):`<div class="stats-empty">সব ম্যাচ খেলা হয়ে গেছে</div>`}
          </div>
        </div>
      </div>`;
  }

  document.getElementById('statsGrid').innerHTML=`
    ${matchHistoryHTML}
    <div class="stats-card">
      <div class="stats-card-title">⚽ সর্বোচ্চ গোলদাতা ${titleSuffix}</div>
      ${scorers.length===0?`<div class="stats-empty">এখনো গোলের তথ্য নেই</div>`
        :scorers.slice(0,20).map((s,i)=>`
          <div class="scorer-row">
            <div class="sr-rank ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i+1}</div>
            ${fImg(s.team,26,19)}
            <div class="sr-info"><div class="sr-name">${esc(s.name)}</div><div class="sr-team">${enNameRanked(s.team)}</div></div>
            <div class="sr-goals">${s.goals}</div>
          </div>`).join('')}
    </div>
    <div class="stats-card">
      <div class="stats-card-title">🏳️ দলীয় গোল ${titleSuffix}</div>
      ${teamList.length===0?`<div class="stats-empty">এখনো গোলের তথ্য নেই</div>`
        :teamList.map(([name,v])=>`
          <div class="team-row">
            ${fImg(name,28,21)}
            <div class="tr-name">${enNameRanked(name)}</div>
            <div class="tr-bar-wrap"><div class="tr-bar" style="width:${Math.round(v.goals/maxG*100)}%"></div></div>
            <div class="tr-goals">${v.goals}</div>
          </div>`).join('')}
    </div>
    <div class="stats-card">
      <div class="stats-card-title">🟨🟥 কার্ড ${titleSuffix}</div>
      ${cardList.length===0?`<div class="stats-empty">এখনো কার্ডের তথ্য নেই</div>`
        :cardList.map(c=>`
          <div class="scorer-row">
            ${fImg(c.team,26,19)}
            <div class="sr-info"><div class="sr-name">${esc(c.name)}</div><div class="sr-team">${enNameRanked(c.team)}</div></div>
            <div style="display:flex;gap:.4rem;flex-shrink:0">
              ${c.yellow?`<span style="background:rgba(255,200,0,.15);border:1px solid rgba(255,200,0,.4);border-radius:4px;padding:.1rem .45rem;font-size:.78rem;color:#ffc800">🟨 ${c.yellow}</span>`:''}
              ${c.red?`<span style="background:rgba(255,50,50,.15);border:1px solid rgba(255,50,50,.4);border-radius:4px;padding:.1rem .45rem;font-size:.78rem;color:#ff5050">🟥 ${c.red}</span>`:''}
            </div>
          </div>`).join('')}
    </div>`;
}
window._stg=function(g){statsGrp=g;statsTeam='ALL';const grps=calcGroups();renderStats(grps);};
window._stt=function(t){statsTeam=t;const grps=calcGroups();renderStats(grps);};

// Third place
function renderThirdPlace(grps){
  const thirds=Object.entries(grps).map(([g,teams])=>({...teams[2],group:g}))
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  document.getElementById('thirdPlace').innerHTML=`
    <div class="tp-card">
      <p style="font-size:.76rem;color:var(--gray);margin-bottom:1rem;">১২টি গ্রুপের ৩য় স্থানের দলের মধ্যে সেরা ৮টি শেষ বত্রিশে যাবে। র‍্যাংকিং: পয়েন্ট → GD → GF।</p>
      <table class="tp-tbl">
        <thead><tr><th>#</th><th>দল</th><th>গ্রুপ</th><th>খে</th><th>Pts</th><th>GF</th><th>GA</th><th>GD</th><th>মর্যাদা</th></tr></thead>
        <tbody>${thirds.map((t,i)=>`
          <tr class="${i<8?'row-q':''}">
            <td>${i+1}</td>
            <td><div class="gt-team">${fImg(t.name,20,15)}<span>${t.name}</span></div></td>
            <td><span class="mc-grp">Grp ${t.group}</span></td>
            <td>${t.pl}</td><td class="pts-c">${t.pts}</td>
            <td>${t.gf}</td><td>${t.ga}</td>
            <td class="${t.gd>0?'gdp':t.gd<0?'gdn':'gdz'}">${t.gd>0?'+'+t.gd:t.gd}</td>
            <td style="font-size:.7rem;color:${i<8?'var(--green)':'var(--gray)'}">${i<8?'✓ উত্তীর্ণ':'✗ বাদ'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// Tab
const VALID_TABS=['schedule','groups','thirdplace','knockout','stats','squads'];

window.goTab=function(id,el){
  if(!VALID_TABS.includes(id))id='schedule';
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  // Mark active nav link
  document.querySelectorAll('.nav-btn').forEach(b=>{
    if(b.getAttribute('href')==='#'+id||b===el)b.classList.add('on');
  });
  // Update hash without scroll
  history.replaceState(null,'','#'+id);
  if(id==='squads'&&!sqLoaded)loadSquads();
};

// On page load — read hash and activate correct tab
(function initHash(){
  const hash=(location.hash||'#schedule').replace('#','');
  const id=VALID_TABS.includes(hash)?hash:'schedule';
  const link=document.querySelector(`.nav-btn[href="#${id}"]`);
  if(id!=='schedule'&&link){
    // Delay until renderAll is done
    setTimeout(()=>{
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
      document.getElementById('p-'+id)?.classList.add('on');
      link.classList.add('on');
      if(id==='squads'&&!sqLoaded)loadSquads();
    },200);
  }
})();

function clubFlagHTML(clubCountry){
  if(!clubCountry)return'';
  const code=getCountryCode(clubCountry);
  if(!code)return`<span style="font-size:.6rem;opacity:.5">${esc(clubCountry)}</span>`;
  return`<img src="https://flagcdn.com/20x15/${code}.png" style="width:16px;height:12px;object-fit:cover;border-radius:1px" loading="lazy" title="${esc(clubCountry)}" onerror="this.style.display='none'">`;
}

// Firebase key → original TEAMS key (underscore back to dot)
function fbKeyToTeamKey(fbKey){
  // Firebase-এ "১৫_ মেক্সিকো" → TEAMS-এ "১৫. মেক্সিকো"
  return fbKey.replace(/_/g,'.');
}
// TEAMS key → Firebase key
function teamKeyToFbKey(teamKey){
  return teamKey.replace(/[.#$[\]]/g,'_');
}

function loadSquads(){
  document.getElementById('sqGrid').innerHTML=`<div class="sq-loading" style="grid-column:1/-1">⏳ লোড হচ্ছে...</div>`;
  onValue(ref(db,'squads'),snap=>{
    sqData=snap.val()||{};
    sqLoaded=true;
    buildSqTeamBtns();
    // Auto-select first team by rank
    const sorted=Object.keys(sqData).sort((a,b)=>{
      const ra=parseInt(getRank(fbKeyToTeamKey(a)))||999;
      const rb=parseInt(getRank(fbKeyToTeamKey(b)))||999;
      return ra-rb;
    });
    if(sorted.length>0){sqTeam=sorted[0];renderSquad();}
    else document.getElementById('sqGrid').innerHTML=`<div class="sq-empty" style="grid-column:1/-1">Firebase-এ squad data নেই</div>`;
  },{onlyOnce:true});
}

function buildSqTeamBtns(){
  // Sort by FIFA rank using original team key
  const sorted=Object.keys(sqData).sort((a,b)=>{
    const ra=parseInt(getRank(fbKeyToTeamKey(a)))||999;
    const rb=parseInt(getRank(fbKeyToTeamKey(b)))||999;
    return ra-rb;
  });
  const container=document.getElementById('sqTeamBtns');
  container.innerHTML=sorted.map(fbKey=>{
    const teamKey=fbKeyToTeamKey(fbKey);
    const t=TEAMS[teamKey];
    const code=t?.code||'';
    const rank=getRank(teamKey);
    const en=t?.en||sqData[fbKey]?.coach||fbKey; // fallback
    const flagHtml=code?`<img src="https://flagcdn.com/20x15/${code}.png" loading="lazy" onerror="this.style.display='none'">`:'';
    return`<button class="sq-team-btn ${sqTeam===fbKey?'on':''}" onclick="setSqTeam('${fbKey.replace(/'/g,"\\'")}')" data-key="${esc(fbKey)}">
      ${flagHtml}
      <span style="font-size:.6rem;opacity:.55">${rank}.</span>
      ${esc(en)}
    </button>`;
  }).join('');
}

window.setSqTeam=function(fbKey){
  sqTeam=fbKey;sqPos='ALL';
  document.querySelectorAll('.sq-team-btn').forEach(b=>b.classList.toggle('on',b.dataset.key===fbKey));
  document.querySelectorAll('.sq-pos-btn').forEach((b,i)=>b.classList.toggle('on',i===0));
  renderSquad();
};

window.setSqPos=function(pos,btn){
  sqPos=pos;
  document.querySelectorAll('.sq-pos-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderSquad();
};

function renderSquad(){
  if(!sqTeam||!sqData[sqTeam])return;
  const data=sqData[sqTeam];
  const teamKey=fbKeyToTeamKey(sqTeam);
  const t=TEAMS[teamKey];
  const code=t?.code||'';
  const en=t?.en||teamKey;
  const rank=getRank(teamKey);

  // Header stats
  const players=data.players||[];
  const totalCaps=players.reduce((s,p)=>s+(p.caps||0),0);
  const totalGoals=players.reduce((s,p)=>s+(p.goals||0),0);
  const avgAge=players.length?(players.reduce((s,p)=>s+(p.age||0),0)/players.length).toFixed(1):'—';
  const captain=players.find(p=>p.captain);

  document.getElementById('sqHeader').innerHTML=`
    <div class="sq-header">
      ${code?`<img class="sq-header-flag" src="https://flagcdn.com/80x60/${code}.png" loading="lazy" onerror="this.style.display='none'">`:''}
      <div class="sq-header-info">
        <div class="sq-header-name">${rank?rank+'.':''} ${esc(en)}</div>
        <div class="sq-header-sub">Group ${data.group||'?'}</div>
        <div class="sq-header-coach">👔 Coach: ${esc(data.coach||'—')}</div>
        <div class="sq-header-stats">
          <div class="sq-stat"><div class="sq-stat-n">${players.length}</div><div class="sq-stat-l">Players</div></div>
          <div class="sq-stat"><div class="sq-stat-n">${totalCaps}</div><div class="sq-stat-l">Caps</div></div>
          <div class="sq-stat"><div class="sq-stat-n">${totalGoals}</div><div class="sq-stat-l">Goals</div></div>
          <div class="sq-stat"><div class="sq-stat-n">${avgAge}</div><div class="sq-stat-l">Avg Age</div></div>
          ${captain?`<div class="sq-stat"><div class="sq-stat-n" style="font-size:.75rem;color:var(--neon)">© Captain</div><div class="sq-stat-l">${esc(captain.name)}</div></div>`:''}
        </div>
      </div>
    </div>`;

  // Filter by position
  const filtered=sqPos==='ALL'?players:players.filter(p=>p.pos===sqPos);

  if(filtered.length===0){
    document.getElementById('sqGrid').innerHTML=`<div class="sq-empty" style="grid-column:1/-1">এই পজিশনে কোনো খেলোয়াড় নেই</div>`;
    return;
  }

  document.getElementById('sqGrid').innerHTML=filtered.map(p=>`
    <div class="sq-card ${p.captain?'captain':''}">
      <div class="sq-no">
        <div style="text-align:center">
          <div>${p.no||'—'}</div>
          <div class="sq-pos-badge ${p.pos||''}">${p.pos||''}</div>
        </div>
      </div>
      <div class="sq-body">
        <div class="sq-name-row">
          <div class="sq-pname" title="${esc(p.name)}">${esc(p.name)}</div>
          ${p.captain?'<span class="sq-cap-badge">C</span>':''}
        </div>
        <div class="sq-club">
          ${clubFlagHTML(p.clubCountry)}
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.club||'—')}</span>
        </div>
        <div class="sq-meta">
          <span title="বয়স">🎂 ${p.age||'?'}</span>
          <span title="Caps">🏆 ${p.caps||0}</span>
          <span title="আন্তর্জাতিক গোল">⚽ ${p.goals||0}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// Theme
window.toggleTheme=function(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('theme',dark?'light':'dark');
};
(function(){
  const t=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';
})();

function hideLoader(){
  setTimeout(()=>{const l=document.getElementById('loader');l.classList.add('gone');setTimeout(()=>l.remove(),400);},500);
}
</script>
</body>
</html>
