<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 | Al Amin Onik</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='14' fill='%23050f10'/><polygon points='50,4 52,10 58,10 53,14 55,20 50,16 45,20 47,14 42,10 48,10' fill='%23A1F000'/><path d='M27,24h46l-4,34a23,23 0 0,1-38,0z' stroke='%23A1F000' stroke-width='4' fill='%23A1F00018' stroke-linejoin='round'/><path d='M27,30q-13,0-13,14q0,14 13,10' stroke='%23A1F000' stroke-width='4' fill='none' stroke-linecap='round'/><path d='M73,30q13,0 13,14q0,14-13,10' stroke='%23A1F000' stroke-width='4' fill='none' stroke-linecap='round'/><line x1='50' y1='58' x2='50' y2='70' stroke='%23A1F000' stroke-width='5' stroke-linecap='round'/><rect x='34' y='70' width='32' height='8' rx='4' fill='%23A1F000'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
<style>
/* ══ CRIMSON GOLD THEME ══ */
:root{
  --bg:#0a0a0a;
  --bg2:#141414;
  --bg3:#1a1a1a;
  --card:rgba(20,20,20,0.95);
  --card2:rgba(26,26,26,0.9);
  --neon:#D4AF37;
  --neon-l:#e8c84d;
  --neon-d:#b8952a;
  --neon-glow:rgba(139,21,56,0.35);
  --neon-glow2:rgba(212,175,55,0.08);
  --teal:#1a1a1a;
  --teal2:#202020;
  --green:#27ae60;
  --red:#ff4d4d;
  --orange:#ffaa00;
  --text:#ffffff;
  --text2:rgba(255,255,255,0.75);
  --gray:#a0a0a0;
  --border:rgba(212,175,55,0.25);
  --border2:rgba(255,255,255,0.08);
  --shadow:rgba(0,0,0,0.85);
  --hbg:#0a0a0a;
  --tbg:rgba(10,10,10,0.95);
  --sbg:rgba(212,175,55,0.06);
  --inp:rgba(212,175,55,0.06);
  --body-grad1:rgba(139,21,56,0.14);
  --body-grad2:rgba(212,175,55,0.05);
  --body-grad3:rgba(139,21,56,0.06);
  --body-dot:rgba(212,175,55,0.04);
  --maroon:#8B1538;
  --maroon-dark:#6B0F2B;
  --gradient-primary:linear-gradient(135deg,#8B1538 0%,#D4AF37 100%);
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"Google Sans",'Hind Siliguri',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at -5% -5%,var(--body-grad1) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 105% 105%,var(--body-grad2) 0%,transparent 55%),
    radial-gradient(ellipse 35% 30% at 50% 50%,var(--body-grad3) 0%,transparent 65%);
  pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,var(--body-dot) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;z-index:0}

/* HEADER */
.hdr{position:relative;z-index:50;background:rgba(10,10,10,0.95);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(212,175,55,0.15);padding:0 1rem}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.8rem 0}
.hdr-logo{font-size:2rem;filter:drop-shadow(0 0 12px rgba(139,21,56,0.5));flex-shrink:0}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-family:"Google Sans",sans-serif;font-size:clamp(1.2rem,3vw,2rem);letter-spacing:3px;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hdr-sub{font-size:.68rem;color:var(--gray);letter-spacing:1px;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.live-pill{display:flex;align-items:center;gap:4px;background:rgba(139,21,56,0.15);border:1px solid rgba(212,175,55,0.25);border-radius:20px;padding:.25rem .6rem;font-size:.62rem;letter-spacing:1px;color:var(--neon)}
.dot{width:6px;height:6px;background:var(--maroon);border-radius:50%;box-shadow:0 0 6px var(--maroon);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:.3rem .5rem;cursor:pointer;font-size:1rem;color:var(--text);transition:all .2s}
.icon-btn:hover{border-color:var(--neon);background:rgba(212,175,55,0.08);box-shadow:0 0 8px rgba(212,175,55,0.2)}
.admin-btn{font-size:.65rem;letter-spacing:1px;padding:.3rem .7rem;background:rgba(139,21,56,0.15);border:1px solid rgba(212,175,55,0.25);border-radius:6px;color:var(--neon);text-decoration:none;transition:all .2s;white-space:nowrap}
.admin-btn:hover{background:rgba(139,21,56,0.3);box-shadow:0 0 10px rgba(139,21,56,0.4)}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.95);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;overflow-x:auto;padding:0 1rem}
.nav::-webkit-scrollbar{display:none}
.nav-btn{font-family:"Google Sans",sans-serif;font-size:.88rem;letter-spacing:2px;color:var(--gray);background:none;border:none;border-bottom:3px solid transparent;padding:.85rem 1.1rem;cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-2px;flex-shrink:0;text-decoration:none;display:inline-block}
.nav-btn:hover{color:var(--text)}
.nav-btn.on{color:var(--neon);border-bottom:3px solid;border-image:var(--gradient-primary) 1}

/* MAIN */
.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.2rem 1rem}
.panel{display:none}.panel.on{display:block}

/* SEC TITLE */
.sec-title{font-family:"Google Sans",sans-serif;font-size:1.5rem;letter-spacing:3px;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem;display:flex;align-items:center;gap:.7rem}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--maroon),var(--neon),transparent)}

/* STATS STRIP */
.stats-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.7rem;margin-bottom:1.2rem}
.sc{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:.85rem .5rem;text-align:center;transition:all .25s;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gradient-primary)}
.sc:hover{border-color:rgba(212,175,55,0.3);box-shadow:0 0 20px rgba(139,21,56,0.2),0 4px 18px var(--shadow);transform:translateY(-2px)}
.sc-n{font-family:"Google Sans",sans-serif;font-size:2.1rem;color:var(--neon);line-height:1;text-shadow:0 0 16px rgba(212,175,55,0.3)}
.sc-l{font-size:.6rem;letter-spacing:1px;color:var(--gray);margin-top:2px}

/* FILTERS */
.filters{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1rem}
.fb{font-size:.72rem;letter-spacing:.5px;padding:.3rem .75rem;background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;transition:all .2s;white-space:nowrap}
.fb:hover,.fb.on{background:rgba(212,175,55,0.12);border-color:var(--neon);color:var(--neon);box-shadow:0 0 10px rgba(212,175,55,0.15)}

/* ══ MATCH CARD — CRIMSON GOLD ══ */
.match-sections{display:flex;flex-direction:column;gap:1.2rem}
.match-controls{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap}
.ctrl-btn{font-family:"Google Sans",sans-serif;font-size:.78rem;letter-spacing:1.5px;padding:.35rem .9rem;background:rgba(139,21,56,0.1);border:1px solid rgba(212,175,55,0.2);border-radius:20px;color:var(--neon);cursor:pointer;transition:all .2s}
.ctrl-btn:hover{background:rgba(139,21,56,0.22);border-color:var(--neon);box-shadow:0 0 8px rgba(139,21,56,0.3)}
.date-section{overflow:hidden}
.date-section-title{font-family:"Google Sans",sans-serif;font-size:1rem;letter-spacing:2px;color:var(--neon);margin-bottom:.7rem;display:flex;align-items:center;gap:.7rem;padding:.55rem .9rem;background:rgba(139,21,56,0.08);border-left:3px solid var(--maroon);border-radius:0 6px 6px 0;cursor:pointer;-webkit-user-select:none;user-select:none;transition:all .2s}
.date-section-title:hover{background:rgba(139,21,56,0.14)}
.date-section-title .ds-arrow{margin-left:auto;font-size:.75rem;transition:transform .25s;display:inline-block}
.date-section-title .ds-done{font-size:.6rem;padding:.1rem .45rem;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.25);border-radius:10px;color:var(--neon)}
.date-section-title .ds-past{font-size:.6rem;padding:.1rem .45rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.4)}
.date-section-body{overflow:hidden;transition:max-height .35s ease,opacity .25s ease;max-height:2000px;opacity:1}
.date-section-body.collapsed{max-height:0;opacity:0}
.match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;padding-bottom:.3rem}
/* Card */
.mc{background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;transition:all .3s;display:flex;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.5);position:relative}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gradient-primary);z-index:1}
.mc:hover{border-color:rgba(212,175,55,0.3);box-shadow:0 0 35px rgba(139,21,56,0.35),0 20px 40px rgba(0,0,0,.6);transform:scale(1.01)}
/* Header — maroon gradient */
.mc-hdr{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;background:linear-gradient(135deg,rgba(139,21,56,0.45) 0%,rgba(20,20,20,0.98) 65%,rgba(26,26,26,0.98) 100%);border-bottom:1px solid rgba(255,255,255,0.06)}
.mc-grp-badge{font-family:"Google Sans",sans-serif;font-size:.78rem;letter-spacing:1px;padding:.22rem .7rem;border-radius:20px;background:var(--maroon);color:#ffffff;font-weight:700}
.mc-matchday{font-family:"Google Sans",sans-serif;font-size:.78rem;letter-spacing:.5px;color:rgba(255,255,255,.7)}
/* Body — 3 column grid */
.mc-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:1.1rem .8rem .8rem;gap:.5rem}
.mc-team{display:flex;flex-direction:column;align-items:center;gap:.5rem;min-width:0}
.mc-flag-big{width:72px;height:54px;object-fit:cover;display:block;border-radius:4px}
.mc-flag-ph{width:72px;height:54px;background:var(--bg3);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--gray)}
.mc-tname{font-family:"Google Sans",sans-serif;font-size:1rem;letter-spacing:.5px;color:var(--text);text-align:center;line-height:1.2;max-width:110px}
/* Score */
.mc-score-center{display:flex;align-items:center;justify-content:center;padding:0 .5rem}
.mc-vs{font-family:"Google Sans",sans-serif;font-size:1.1rem;color:rgba(212,175,55,0.35);letter-spacing:3px}
.mc-sc{font-family:"Google Sans",sans-serif;font-size:2.7rem;line-height:1;background:var(--gradient-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mc-sc-sep{font-family:"Google Sans",sans-serif;font-size:2rem;color:rgba(212,175,55,0.5);margin:0 .1rem}
/* Footer */
.mc-footer{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;background:rgba(0,0,0,.3);border-top:1px solid rgba(255,255,255,0.06);margin-top:auto}
.mc-footer-date{font-family:"Google Sans",sans-serif;font-size:.82rem;letter-spacing:.3px;color:var(--neon)}
.mc-footer-stadium{font-family:"Google Sans",sans-serif;font-size:.8rem;letter-spacing:.3px;color:rgba(255,255,255,.7);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55%;text-align:right}
/* Goals */
.mc-goals{padding:.5rem 1rem;display:flex;gap:1.5rem;border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,.2)}
.mc-goals-side{flex:1}
.mc-goals-side.right{text-align:right}
.goal-item{font-family:"Google Sans",sans-serif;font-size:.78rem;color:rgba(255,255,255,.65);padding:1px 0}
.goal-item .gmin{color:var(--neon);font-weight:700}
.goal-item .gpen{color:var(--orange);font-size:.68rem}

@media(max-width:900px){.match-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){
  .match-grid{grid-template-columns:1fr}
  .mc-flag-big{width:64px;height:48px}
  .mc-tname{font-size:.88rem}
  .mc-sc{font-size:2rem}
  .mc-footer-date,.mc-footer-stadium{font-size:.72rem}
}

/* GROUP */
.grp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1rem}
.gt-wrap{overflow-x:visible}
.grp-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;overflow:hidden;position:relative}
.grp-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gradient-primary)}
.grp-hd{background:linear-gradient(135deg,rgba(139,21,56,0.3),rgba(20,20,20,0.98));padding:.55rem .9rem;display:flex;align-items:center;gap:.55rem;border-bottom:1px solid rgba(255,255,255,0.06)}
.grp-let{font-family:"Google Sans",sans-serif;font-size:1.6rem;color:var(--neon);line-height:1}
.grp-lbl{font-size:.62rem;color:var(--gray);letter-spacing:1px}
.gt{width:100%;border-collapse:collapse;font-size:.77rem}
.gt th{padding:.4rem .4rem;text-align:center;font-size:.57rem;letter-spacing:1px;color:rgba(255,255,255,0.85);background:var(--maroon);border-bottom:1px solid rgba(255,255,255,0.08)}
.gt th:first-child{text-align:left;padding-left:.65rem}
.gt td{padding:.42rem .4rem;text-align:center;border-bottom:1px solid var(--border2)}
.gt td:first-child{text-align:left;padding-left:.65rem}
.gt tbody tr:last-child td{border-bottom:none}
.gt tbody tr:hover{background:rgba(255,255,255,.03)}
.gt-team{display:flex;align-items:center;gap:.35rem}
.gt-flag{width:20px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0}
.gt-rank{display:inline-block;width:15px;height:15px;background:rgba(255,255,255,.07);border-radius:2px;text-align:center;line-height:15px;font-size:.58rem;color:var(--gray);margin-right:2px;flex-shrink:0}
.pts-c{font-weight:700;color:var(--neon);font-size:.88rem}
.gdp{color:var(--neon)}.gdn{color:var(--red)}.gdz{color:var(--gray)}
.row-q{background:rgba(139,21,56,0.06)!important}.row-q td:first-child{border-left:3px solid var(--maroon)}
.row-3{background:rgba(212,175,55,0.03)!important}.row-3 td:first-child{border-left:3px solid rgba(212,175,55,0.4)}

/* ══ KNOCKOUT BRACKET — SYMMETRIC ══ */
.bracket-desktop{display:none}
.bracket-mobile{display:none}
@media(min-width:860px){.bracket-desktop{display:block}.bracket-mobile{display:none}}
@media(max-width:859px){.bracket-desktop{display:none}.bracket-mobile{display:block}}

.sym-bracket{
  display:grid;
  grid-template-columns:repeat(4,1fr) 170px repeat(4,1fr);
  gap:0;
  min-width:1050px;
}
.sym-col{display:flex;flex-direction:column;padding:0 5px;min-height:600px}
.sym-col-title{font-family:"Google Sans",sans-serif;font-size:.68rem;letter-spacing:1.5px;color:#ffffff;text-align:center;padding:.4rem .5rem .6rem;position:relative;z-index:1}
.sym-col-title::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.40);border-radius:5px;z-index:-1}
.sym-spacer{flex:1;min-height:4px}

/* Match card — mc-style */
.sym-match{background:#141414;border:1px solid rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;margin:3px 0;transition:all .2s;position:relative;box-shadow:0 2px 14px rgba(0,0,0,.5)}
.sym-match::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gradient-primary);z-index:1}
.sym-match:hover{border-color:rgba(212,175,55,0.3);box-shadow:0 0 20px rgba(139,21,56,0.28);transform:translateY(-1px)}
.sym-match.has-result{border-color:rgba(139,21,56,0.45)}
.sym-match-num{font-family:"Google Sans",sans-serif;font-size:.6rem;letter-spacing:1px;color:var(--neon);background:linear-gradient(135deg,rgba(139,21,56,.5) 0%,rgba(20,20,20,.98) 100%);border-bottom:1px solid rgba(212,175,55,.12);padding:3px 7px;display:flex;justify-content:space-between;align-items:center}
.sym-team{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.05);min-height:28px;font-size:.72rem}
.sym-team:last-of-type{border-bottom:none}
.sym-flag{width:20px;height:15px;object-fit:cover;border-radius:2px;flex-shrink:0}
.sym-tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.sym-tname.tbd{color:var(--gray);font-style:italic;font-size:.65rem}
.sym-score{font-family:"Google Sans",sans-serif;font-size:.95rem;color:rgba(255,255,255,.4);min-width:16px;text-align:right}
.sym-team.win{background:rgba(139,21,56,.1)}
.sym-team.win .sym-tname{font-weight:700;color:#fff}
.sym-team.win .sym-score{color:var(--neon)}
.sym-extra{text-align:center;font-size:.58rem;color:var(--orange);padding:2px 7px;border-top:1px solid var(--border2)}
.sym-date{text-align:center;font-size:.58rem;color:rgba(255,255,255,.5);padding:3px 7px;background:rgba(0,0,0,.25);border-top:1px solid rgba(255,255,255,.05);font-family:"Google Sans",sans-serif;letter-spacing:.5px}
.sym-stadium{text-align:center;font-size:.55rem;color:rgba(255,255,255,.4);padding:2px 7px 4px;font-family:"Google Sans",sans-serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;margin:0 auto}
/* Connector lines */
.smr{position:relative}
.sym-col:not(.sym-col-r) .smr::after{content:'';position:absolute;right:-5px;top:50%;width:5px;height:1px;background:rgba(212,175,55,.55)}
.sym-col-r .smr::after{content:'';position:absolute;left:-5px;top:50%;width:5px;height:1px;background:rgba(212,175,55,.55)}
.sym-con{position:relative}
.sym-col:not(.sym-col-r) .sym-con::after{content:'';position:absolute;right:-5px;top:0;bottom:0;width:1px;background:rgba(212,175,55,.55)}
.sym-col-r .sym-con::after{content:'';position:absolute;left:-5px;top:0;bottom:0;width:1px;background:rgba(212,175,55,.55)}

/* Center column */
.sym-center{
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:0 4px;gap:6px;
}
.sym-final-label{
  font-family:"Google Sans",sans-serif;
  font-size:.72rem;letter-spacing:2px;
  color:var(--neon);text-align:center;
}
.sym-champion{
  border:1px solid rgba(212,175,55,0.3);border-radius:10px;
  background:rgba(139,21,56,0.12);
  padding:10px 8px;text-align:center;width:100%;
}
.sym-champ-flag{
  width:44px;height:33px;object-fit:cover;
  border-radius:4px;margin:0 auto 5px;display:block;
}
.sym-champ-name{
  font-family:"Google Sans",sans-serif;
  font-size:.95rem;letter-spacing:1px;color:var(--neon);
}
/* 3rd place pushed to bottom */
.sym-3rd-wrap{margin-top:auto;width:100%;padding-top:8px;border-top:1px solid var(--border2)}
.sym-3rd-label{font-size:.6rem;letter-spacing:1px;color:rgba(255,255,255,.45);text-align:center;margin-bottom:4px}

/* Mobile tabs */
.bk-round-tabs{display:flex;gap:.3rem;flex-wrap:nowrap;overflow-x:auto;margin-bottom:.8rem;padding-bottom:.3rem;scrollbar-width:none}
.bk-round-tabs::-webkit-scrollbar{display:none}
.bk-rtab{font-family:"Google Sans",sans-serif;font-size:.75rem;letter-spacing:1px;padding:.35rem .8rem;background:var(--card);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.bk-rtab.on{background:rgba(139,21,56,0.25);border-color:var(--neon);color:#fff}
.bk-round-panel{display:none}.bk-round-panel.on{display:flex;flex-direction:column;gap:.4rem}

/* Stats */

function fD(d){
  const S=window._S;
  const dt=new Date(d+'T00:00:00');
  return`${S.days[dt.getDay()]}, ${dt.getDate()} ${S.months[dt.getMonth()]}`;
}
function fT(t){
  const[h,m]=t.split(':').map(Number);
  const tz=window._siteTZ||6;
  const diffHours=tz-6;
  let adjH=(h+diffHours+24)%24;
  const ap=adjH<12?'AM':'PM';
  const h12=adjH===0?12:adjH>12?adjH-12:adjH;
  const tzLabel=tz>=0?`GMT+${tz}`:`GMT${tz}`;
  return`${h12}:${String(m).padStart(2,'0')} ${ap} <span style="font-size:.55rem;opacity:.6">${tzLabel}</span>`;
}
// XSS escape
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
// flagcdn.com valid sizes: 20x15,24x18,28x21,32x24,40x30,48x36,64x48,80x60
function nearestFlag(w){
  const sizes=[20,24,28,32,40,48,64,80];
  return sizes.reduce((a,b)=>Math.abs(b-w)<Math.abs(a-w)?b:a);
}
function fImg(name,w=40,h=30){
  const t=TEAMS[name];
  if(!t)return`<div style="width:${w}px;height:${h}px;background:var(--bg3);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--gray)">?</div>`;
  const fw=nearestFlag(w);const fh=Math.round(fw*0.75);
  return`<img src="https://flagcdn.com/${fw}x${fh}/${t.code}.png" style="width:${w}px;height:${h}px;object-fit:cover;border-radius:3px;box-shadow:0 1px 4px var(--shadow)" loading="lazy" onerror="this.style.display='none'" alt="${t.en}">`;
}
// Extract rank from Bengali name like "১৫. মেক্সিকো" → rank=15
function getRank(name){
  const m=name.match(/^([\d০-৯]+)\./);
  if(!m)return'';
  // Convert Bengali digits to Arabic
  const bn='০১২৩৪৫৬৭৮৯';
  return m[1].split('').map(c=>{const i=bn.indexOf(c);return i>=0?i:c;}).join('');
}
// Language-aware team name (no rank)
function tName(name){
  if(!TEAMS[name])return name;
  if(window._S===STRINGS.en)return TEAMS[name].en;
  return name.replace(/^[\d০-৯]+\.\s*/,'');
}
// Language-aware team name with rank prefix: "15. Mexico" or "১৫. মেক্সিকো"
function tNameRanked(name){
  const rank=getRank(name);
  const n=tName(name);
  return rank?`${rank}. ${n}`:n;
}
// Display name: language-aware if known team, else raw (TBD/slot strings)
function displayName(name){return TEAMS[name]?tNameRanked(name):name;}

function lightenHex(hex,pct){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.min(255,r+Math.round(pct*2.55));g=Math.min(255,g+Math.round(pct*2.55));b=Math.min(255,b+Math.round(pct*2.55));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}
function darkenHex(hex,pct){let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);r=Math.max(0,r-Math.round(pct*2.55));g=Math.max(0,g-Math.round(pct*2.55));b=Math.max(0,b-Math.round(pct*2.55));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}

function calcGroups(){
  const t={};
  for(const[g,teams]of Object.entries(GROUPS)){t[g]={};for(const tm of teams)t[g][tm]={pl:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,fp:0};}
  for(const m of MATCHES){
    const sc=scores[m.id];if(!sc||sc.s1===undefined||sc.s1===null)continue;
    const tbl=t[m.grp];if(!tbl||!tbl[m.t1]||!tbl[m.t2])continue;
    const s1=Number(sc.s1),s2=Number(sc.s2);
    tbl[m.t1].pl++;tbl[m.t2].pl++;tbl[m.t1].gf+=s1;tbl[m.t1].ga+=s2;tbl[m.t2].gf+=s2;tbl[m.t2].ga+=s1;
    if(s1>s2){tbl[m.t1].w++;tbl[m.t1].pts+=3;tbl[m.t2].l++;}
    else if(s1<s2){tbl[m.t2].w++;tbl[m.t2].pts+=3;tbl[m.t1].l++;}
    else{tbl[m.t1].d++;tbl[m.t1].pts++;tbl[m.t2].d++;tbl[m.t2].pts++;}
    // Fair play: yellow=-1, yr=-3, red=-4, yellow+red=-5
    for(const[cards,team]of[[sc.cards1||[],m.t1],[sc.cards2||[],m.t2]]){
      if(!tbl[team])continue;
      let y=0,yr=0,r=0;
      for(const c of cards){if(c.type==='yellow')y++;else if(c.type==='yr')yr++;else if(c.type==='red')r++;}
      // yellow+red in same match = -5 (yr already covers double booking)
      tbl[team].fp+=y*(-1)+yr*(-3)+r*(-4);
    }
  }
  const s={};
  for(const[g,tbl]of Object.entries(t)){s[g]=Object.entries(tbl).map(([n,v])=>({name:n,...v,gd:v.gf-v.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.fp-b.fp);}
  return s;
}

// ══ BRACKET AUTO-POPULATE ══
function b3Sort(a,b){
  return b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.fp-b.fp||
    parseInt(getRank(a.name)||999)-parseInt(getRank(b.name)||999);
}

function getBest3rd(grps){
  return Object.entries(grps)
    .map(([g,teams])=>teams[2]?{...teams[2],group:g}:null)
    .filter(t=>t&&t.pl>0)
    .sort(b3Sort);
}

function buildBest3rdMap(grps){
  // Sort all 12 third-place teams: pts→gd→gf→fp→FIFA ranking
  const allThirds=Object.entries(grps)
    .map(([g,teams])=>teams[2]?{...teams[2],group:g}:null)
    .filter(t=>t&&t.pl>0)
    .sort(b3Sort);

  // Best 8 qualify
  const best8=allThirds.slice(0,8);
  const qualifiedGroups=new Set(best8.map(t=>t.group));

  // Collect 3rd-place slots with their eligible qualifying groups
  const slots=[];
  for(const m of KO_ROUNDS[0].matches){
    for(const side of['s1','s2']){
      const slot=m[side];
      if(!slot||!slot.startsWith('3rd '))continue;
      const eligible=slot.replace('3rd ','').split('').filter(g=>qualifiedGroups.has(g));
      slots.push({key:`${m.id}_${side}`,eligible});
    }
  }

  // Most-constrained-first bipartite matching
  slots.sort((a,b)=>a.eligible.length-b.eligible.length);
  const map={};
  const usedGroups=new Set();
  for(const s of slots){
    const available=s.eligible.filter(g=>!usedGroups.has(g));
    if(!available.length)continue;
    const bestTeam=best8.find(t=>available.includes(t.group));
    if(bestTeam){map[s.key]=bestTeam.name;usedGroups.add(bestTeam.group);}
  }
  return map;
}

function resolveSlot(slot,grps){
  if(!slot)return'TBD';
  if(TEAMS[slot])return slot;
  const m1=slot.match(/^([12])([A-L])$/);
  if(m1){
    const rank=parseInt(m1[1])-1;
    const grp=m1[2];
    const team=grps[grp]?.[rank];
    return(team&&team.pl>0)?team.name:slot;
  }
  return slot;
}

function normalizeWinKey(raw){
  // "R32-1"→"r32_1", "R16-2"→"r16_2", "QF-1"→"qf_1"
  return raw.trim().toLowerCase().replace(/\s+/g,'').replace(/-/g,'_');
}
const KO_ID_NUM=(()=>{const m={};KO_ROUNDS.forEach(r=>r.matches.forEach(mm=>m[mm.id]=mm.num));return m;})();
function friendlySlot(slot){
  if(!slot)return'';
  if(TEAMS[slot])return displayName(slot);
  const wm=slot.match(/^W\s+(.+)$/i);
  if(wm){const id=normalizeWinKey(wm[1]);const n=KO_ID_NUM[id];return n?`W #${n}`:slot;}
  const lm=slot.match(/^L\s+(.+)$/i);
  if(lm){const id=normalizeWinKey(lm[1]);const n=KO_ID_NUM[id];return n?`L #${n}`:slot;}
  return slot;
}
function unrollBracket(){
  const allKO={};
  KO_ROUNDS.forEach(r=>r.matches.forEach(m=>{allKO[m.id]=m;}));
  function prev(m){
    if(!m)return[null,null];
    const s1m=m.s1?.match(/^W\s+(.+)$/i),s2m=m.s2?.match(/^W\s+(.+)$/i);
    return[s1m?allKO[normalizeWinKey(s1m[1])]||null:null,s2m?allKO[normalizeWinKey(s2m[1])]||null:null];
  }
  const fin=allKO['final'];
  const[sf1,sf2]=prev(fin);
  const[lqf1,lqf2]=prev(sf1);const[rqf1,rqf2]=prev(sf2);
  const lR16=[...prev(lqf1),...prev(lqf2)].filter(Boolean);
  const rR16=[...prev(rqf1),...prev(rqf2)].filter(Boolean);
  const lR32=lR16.flatMap(r=>prev(r)).filter(Boolean);
  const rR32=rR16.flatMap(r=>prev(r)).filter(Boolean);
  return{lR32,lR16,rR16,rR32};
}

function buildWinnerMap(grps,b3map){
  const winners={};
  const losers={};
  const allMatches=KO_ROUNDS.flatMap(r=>r.matches);
  for(const m of allMatches){
    const sc=scores[m.id]||{};
    if(sc.s1===undefined||sc.s1===null)continue;
    let t1=sc.t1||'';let t2=sc.t2||'';
    if(!t1){
      if(m.s1?.startsWith('3rd '))t1=b3map[`${m.id}_s1`]||'';
      else{
        const rs=resolveSlot(m.s1,grps);
        if(rs!==m.s1)t1=rs;
        else{
          const wm=m.s1?.match(/^W\s+(.+)$/i);if(wm)t1=winners[normalizeWinKey(wm[1])]||'';
          if(!t1){const lm=m.s1?.match(/^L\s+(.+)$/i);if(lm)t1=losers[normalizeWinKey(lm[1])]||'';}
        }
      }
    }
    if(!t2){
      if(m.s2?.startsWith('3rd '))t2=b3map[`${m.id}_s2`]||'';
      else{
        const rs=resolveSlot(m.s2,grps);
        if(rs!==m.s2)t2=rs;
        else{
          const wm=m.s2?.match(/^W\s+(.+)$/i);if(wm)t2=winners[normalizeWinKey(wm[1])]||'';
          if(!t2){const lm=m.s2?.match(/^L\s+(.+)$/i);if(lm)t2=losers[normalizeWinKey(lm[1])]||'';}
        }
      }
    }
    const s1=Number(sc.s1),s2=Number(sc.s2);
    const et1=sc.et1!==undefined?Number(sc.et1):null,et2=sc.et2!==undefined?Number(sc.et2):null;
    const pen1=sc.pen1!==undefined?Number(sc.pen1):null,pen2=sc.pen2!==undefined?Number(sc.pen2):null;
    let winner='',loser='';
    if(pen1!==null&&pen2!==null){winner=pen1>pen2?t1:t2;loser=pen1>pen2?t2:t1;}
    else if(et1!==null&&et2!==null){const w=(s1+et1)>(s2+et2);winner=w?t1:t2;loser=w?t2:t1;}
    else{winner=s1>s2?t1:s2>s1?t2:'';loser=s1>s2?t2:s2>s1?t1:'';}
    if(winner)winners[m.id]=winner;
    if(loser)losers[m.id]=loser;
  }
  return{winners,losers};
}

function resolveKOSlot(slot,grps,b3map,wmap){
  if(!slot)return'TBD';
  if(TEAMS[slot])return slot;
  if(slot.match(/^([12])([A-L])$/))return resolveSlot(slot,grps);
  if(slot.startsWith('3rd '))return slot;
  const wm=slot.match(/^W\s+(.+)$/i);
  if(wm)return(wmap.winners||{})[normalizeWinKey(wm[1])]||slot;
  const lm=slot.match(/^L\s+(.+)$/i);
  if(lm)return(wmap.losers||{})[normalizeWinKey(lm[1])]||slot;
  return slot;
}

function buildMatch(m,grps={},b3map={},winnerMap={}){
  const sc=scores[m.id]||{};
  const s1raw=sc.s1;
  const done=s1raw!==undefined&&s1raw!==null;
  const et=sc.et1!==undefined;
  const pen=sc.pen1!==undefined;

  let t1=sc.t1||'';
  let t2=sc.t2||'';
  if(!t1){
    if(m.s1&&m.s1.startsWith('3rd '))t1=b3map[`${m.id}_s1`]||m.s1;
    else t1=resolveKOSlot(m.s1,grps,b3map,winnerMap)||m.s1||'TBD';
  }
  if(!t2){
    if(m.s2&&m.s2.startsWith('3rd '))t2=b3map[`${m.id}_s2`]||m.s2;
    else t2=resolveKOSlot(m.s2,grps,b3map,winnerMap)||m.s2||'TBD';
  }

  // Determine winner for highlighting
  let s1win=false,s2win=false;
  if(done){
    const n1=Number(sc.s1),n2=Number(sc.s2);
    if(pen){s1win=Number(sc.pen1)>Number(sc.pen2);s2win=!s1win;}
    else if(et){const t1tot=n1+Number(sc.et1||0),t2tot=n2+Number(sc.et2||0);s1win=t1tot>t2tot;s2win=t2tot>t1tot;}
    else{s1win=n1>n2;s2win=n2>n1;}
  }

  const f1=TEAMS[t1]?fImg(t1,18,13):'';
  const f2=TEAMS[t2]?fImg(t2,18,13):'';
  const auto1=!sc.t1&&TEAMS[t1];
  const auto2=!sc.t2&&TEAMS[t2];

  // Score display
  let scoreDisp='';
  if(done){
    scoreDisp=`${sc.s1}–${sc.s2}`;
    if(et)scoreDisp+=` (ET: ${sc.et1}–${sc.et2})`;
    if(pen)scoreDisp+=` (PSO: ${sc.pen1}–${sc.pen2})`;
  }

  return`<div class="bk-match">
    <div class="bk-team ${s1win?'bk-win':''}" style="${auto1?'opacity:.82':''}">
      ${f1}<span class="bk-tname">${isTBDish(t1)?friendlySlot(t1):displayName(t1)}</span><span class="bk-sc">${done?sc.s1:''}</span>
    </div>
    <div class="bk-team ${s2win?'bk-win':''}" style="${auto2?'opacity:.82':''}">
      ${f2}<span class="bk-tname">${isTBDish(t2)?friendlySlot(t2):displayName(t2)}</span><span class="bk-sc">${done?sc.s2:''}</span>
    </div>
    ${pen?`<div class="bk-date" style="color:var(--orange)">PSO: ${sc.pen1}–${sc.pen2}</div>`:
      et?`<div class="bk-date" style="color:var(--gold)">ET: ${sc.et1}–${sc.et2}</div>`:''}
    <div class="bk-date">${fD(m.date)} · ${fT(m.time)}</div>
  </div>`;
}

function renderBracket(grps={}){
  const b3map=buildBest3rdMap(grps);
  const wmap=buildWinnerMap(grps,b3map);

  function getTeam(m,side){
    const sc=scores[m.id]||{};
    let t=sc[side==='s1'?'t1':'t2']||'';
    if(!t){
      const slot=m[side];
      if(slot?.startsWith('3rd '))t=b3map[`${m.id}_${side}`]||slot;
      else t=resolveKOSlot(slot,grps,b3map,wmap)||slot||'TBD';
    }
    return t;
  }
  function getWinner(m){
    const sc=scores[m.id]||{};
    if(sc.s1===undefined||sc.s1===null)return'';
    const t1=getTeam(m,'s1'),t2=getTeam(m,'s2');
    const s1=Number(sc.s1),s2=Number(sc.s2);
    const pen1=sc.pen1!==undefined?Number(sc.pen1):null,pen2=sc.pen2!==undefined?Number(sc.pen2):null;
    const et1=sc.et1!==undefined?Number(sc.et1):null,et2=sc.et2!==undefined?Number(sc.et2):null;
    if(pen1!==null&&pen2!==null)return pen1>pen2?t1:t2;
    if(et1!==null&&et2!==null)return(s1+et1)>(s2+et2)?t1:t2;
    return s1>s2?t1:s2>s1?t2:'';
  }
  function symFlag(name){
    const t=TEAMS[name];if(!t)return'';
    return`<img class="sym-flag" src="https://flagcdn.com/24x18/${t.code}.png" loading="lazy" onerror="this.style.display='none'">`;
  }
  function isTBDish(t){return!t||t==='TBD'||t.startsWith('W ')||t.startsWith('L ')||t.startsWith('3rd ');}
  function symMatch(m,compact=false){
    if(!m)return'';
    const sc=scores[m.id]||{};
    const done=sc.s1!==undefined&&sc.s1!==null;
    const t1=getTeam(m,'s1'),t2=getTeam(m,'s2');
    const w=done?getWinner(m):'';
    const s1=done?sc.s1:'',s2=done?sc.s2:'';
    const hasET=sc.et1!==undefined,hasPen=sc.pen1!==undefined;
    const auto1=!(scores[m.id]||{}).t1&&TEAMS[t1];
    const auto2=!(scores[m.id]||{}).t2&&TEAMS[t2];
    return`<div class="sym-match ${done?'has-result':''}">
      <div class="sym-match-num">
        <span>${koNum(m)?`#${koNum(m)}`:''}</span>
        <span style="font-size:.55rem;color:rgba(255,255,255,.45)">${!compact&&m.date?fD(m.date):''}</span>
      </div>
      <div class="sym-team ${w&&w===t1?'win':''}" style="${auto1?'opacity:.82':''}">
        ${symFlag(t1)}<span class="sym-tname ${isTBDish(t1)?'tbd':''}">${isTBDish(t1)?friendlySlot(t1):displayName(t1)}</span>
        <span class="sym-score">${s1}</span>
      </div>
      <div class="sym-team ${w&&w===t2?'win':''}" style="${auto2?'opacity:.82':''}">
        ${symFlag(t2)}<span class="sym-tname ${isTBDish(t2)?'tbd':''}">${isTBDish(t2)?friendlySlot(t2):displayName(t2)}</span>
        <span class="sym-score">${s2}</span>
      </div>
      ${hasPen?`<div class="sym-extra">PSO: ${sc.pen1}–${sc.pen2}</div>`:hasET?`<div class="sym-extra">ET: ${sc.et1}–${sc.et2}</div>`:''}
      <div class="sym-date">${fT(m.time)}</div>
      ${m.stadium?`<div class="sym-stadium"><i class='fas fa-landmark'></i> ${m.stadium}</div>`:''}
    </div>`;
  }
  // Column builder — evenly distribute spacers
  function symCol(title,matches,topFlex,midFlex,isRight=false){
    let h=`<div class="sym-col${isRight?' sym-col-r':''}"><div class="sym-col-title">${title}</div>`;
    h+=`<div class="sym-spacer" style="flex:${topFlex}"></div>`;
    for(let i=0;i<matches.length;i++){
      h+=`<div class="smr">${symMatch(matches[i])}</div>`;
      if(i<matches.length-1)h+=`<div class="sym-spacer${i%2===0?' sym-con':''}" style="flex:${midFlex}"></div>`;
    }
    h+=`<div class="sym-spacer" style="flex:${topFlex}"></div>`;
    h+=`</div>`;return h;
  }

  const QF=KO_ROUNDS[2].matches;
  const SF=KO_ROUNDS[3].matches;
  const THIRD=KO_ROUNDS[4].matches[0];
  const FINAL=KO_ROUNDS[5].matches[0];
  const{lR32,lR16,rR16,rR32}=unrollBracket();

  const champion=getWinner(FINAL)||'';
  const champCode=TEAMS[champion]?.code||'';
  const champFlagURL=champCode?`https://flagcdn.com/48x36/${champCode}.png`:'';

  // spacer math: R32=8matches,R16=4,QF=2,SF=1
  // top/bottom spacer = midFlex/2 for visual centering
  const S=window._S;
  let html='';
  html+=symCol(S.r32,lR32,1,2,false);
  html+=symCol(S.r16,lR16,3,6,false);
  html+=symCol(S.qf,QF.slice(0,2),7,14,false);
  html+=symCol(S.sf,[SF[0]],15,0,false);

  html+=`<div class="sym-center">
    <div class="sym-final-label"><i class='fas fa-trophy'></i> ${S.final}</div>
    <div class="sym-champion">
      ${champFlagURL?`<img class="sym-champ-flag" src="${champFlagURL}" loading="lazy" onerror="this.style.display='none'">`
        :`<div style="width:44px;height:33px;background:rgba(201,168,76,.15);border-radius:4px;margin:0 auto 5px"></div>`}
      <div class="sym-champ-name">${champion?displayName(champion):'—'}</div>
    </div>
    <div style="width:100%">${symMatch(FINAL,true)}</div>
    <div class="sym-3rd-wrap">
      <div class="sym-3rd-label"><i class='fas fa-award'></i> ${S.third}</div>
      <div style="width:100%">${symMatch(THIRD,true)}</div>
    </div>
  </div>`;

  html+=symCol(S.sf,[SF[1]],15,0,true);
  html+=symCol(S.qf,QF.slice(2,4),7,14,true);
  html+=symCol(S.r16,rR16,3,6,true);
  html+=symCol(S.r32,rR32,1,2,true);

  document.getElementById('symDesktop').innerHTML=html;

  // Mobile
  const mRounds=[
    {name:S.r32,matches:R32},
    {name:S.r16,matches:R16},
    {name:S.qf,matches:QF},
    {name:S.sfShort,matches:SF},
    {name:`<i class='fas fa-trophy'></i> ${S.final}`,matches:[FINAL,THIRD]},
  ];
  document.getElementById('bkTabs').innerHTML=mRounds.map((r,i)=>
    `<button class="bk-rtab ${i===activeBkTab?'on':''}" onclick="window._bktab(${i})">${r.name}</button>`
  ).join('');
  document.getElementById('bkMobile').innerHTML=mRounds.map((round,i)=>
    `<div class="bk-round-panel ${i===activeBkTab?'on':''}">
      ${round.matches.map(m=>symMatch(m)).join('')}
    </div>`
  ).join('');
}
window._bktab=function(i){
  activeBkTab=i;
  document.querySelectorAll('.bk-rtab').forEach((b,idx)=>b.classList.toggle('on',idx===i));
  document.querySelectorAll('.bk-round-panel').forEach((p,idx)=>p.classList.toggle('on',idx===i));
};

function renderStats(grps){
  // ── Group filter ──
  const S=window._S;
  const gs=['ALL','A','B','C','D','E','F','G','H','I','J','K','L'];
  document.getElementById('statsGrpFilters').innerHTML=gs.map(g=>
    `<button class="fb ${statsGrp===g?'on':''}" onclick="window._stg('${g}')">${g==='ALL'?S.allGroups:'Group '+g}</button>`
  ).join('');

  // ── Team filter ──
  const teamPool=statsGrp==='ALL'?Object.keys(TEAMS):GROUPS[statsGrp]||[];
  const sortedTeams=[...teamPool].sort((a,b)=>(parseInt(getRank(a))||999)-(parseInt(getRank(b))||999));
  document.getElementById('statsTeamFilters').innerHTML=
    `<button class="fb ${statsTeam==='ALL'?'on':''}" onclick="window._stt('ALL')">${S.allTeams}</button>`
    +sortedTeams.map(n=>{
      const code=TEAMS[n]?.code||'';
      return`<button class="fb ${statsTeam===n?'on':''}" onclick="window._stt('${n.replace(/'/g,"\\'")}')">
        ${code?`<img src="https://flagcdn.com/20x15/${code}.png" style="width:18px;height:13px;object-fit:cover;border-radius:2px;vertical-align:middle;margin-right:3px" loading="lazy">`:''}
        ${tNameRanked(n)}
      </button>`;
    }).join('');

  // ── Collect all match data ──
  const allMatches=[...MATCHES,...KO_ROUNDS.flatMap(r=>r.matches)];

  // ── Card data ──
  const cardMap={}; // name||team → {yellow,red}
  for(const m of allMatches){
    const sc=scores[m.id]||{};
    const t1=m.t1||(sc.t1||''), t2=m.t2||(sc.t2||'');
    for(const c of(sc.cards1||[])){
      const k=`${c.name}||${t1}`;
      if(!cardMap[k])cardMap[k]={name:c.name,team:t1,yellow:0,red:0};
      if(c.type==='yellow'||c.type==='yr')cardMap[k].yellow++;
      if(c.type==='red'||c.type==='yr')cardMap[k].red++;
    }
    for(const c of(sc.cards2||[])){
      const k=`${c.name}||${t2}`;
      if(!cardMap[k])cardMap[k]={name:c.name,team:t2,yellow:0,red:0};
      if(c.type==='yellow'||c.type==='yr')cardMap[k].yellow++;
      if(c.type==='red'||c.type==='yr')cardMap[k].red++;
    }
  }

  // ── Top scorers ──
  const scorerMap={};
  for(const m of MATCHES){
    const sc=scores[m.id]||{};
    for(const g of(sc.goals1||[])){const k=`${g.name}||${m.t1}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:m.t1,goals:0};scorerMap[k].goals++;}
    for(const g of(sc.goals2||[])){const k=`${g.name}||${m.t2}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:m.t2,goals:0};scorerMap[k].goals++;}
  }
  for(const round of KO_ROUNDS){for(const m of round.matches){
    const sc=scores[m.id]||{};
    const t1=sc.t1||'',t2=sc.t2||'';
    for(const g of(sc.goals1||[])){if(t1){const k=`${g.name}||${t1}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:t1,goals:0};scorerMap[k].goals++;}}
    for(const g of(sc.goals2||[])){if(t2){const k=`${g.name}||${t2}`;if(!scorerMap[k])scorerMap[k]={name:g.name,team:t2,goals:0};scorerMap[k].goals++;}}
  }}
  let scorers=Object.values(scorerMap).sort((a,b)=>b.goals-a.goals);

  // ── Team goals ──
  const teamGoals={};
  for(const m of MATCHES){
    const sc=scores[m.id]||{};if(sc.s1===undefined)continue;
    if(!teamGoals[m.t1])teamGoals[m.t1]={goals:0};
    if(!teamGoals[m.t2])teamGoals[m.t2]={goals:0};
    teamGoals[m.t1].goals+=Number(sc.s1||0);
    teamGoals[m.t2].goals+=Number(sc.s2||0);
  }

  // ── Filter by team/group ──
  if(statsTeam!=='ALL'){
    scorers=scorers.filter(s=>s.team===statsTeam);
  } else if(statsGrp!=='ALL'){
    scorers=scorers.filter(s=>GROUPS[statsGrp]?.includes(s.team));
  }
  let teamList=Object.entries(teamGoals).sort((a,b)=>b[1].goals-a[1].goals);
  if(statsTeam!=='ALL') teamList=teamList.filter(([n])=>n===statsTeam);
  else if(statsGrp!=='ALL') teamList=teamList.filter(([n])=>GROUPS[statsGrp]?.includes(n));
  const maxG=teamList[0]?teamList[0][1].goals:1;

  let cardList=Object.values(cardMap).sort((a,b)=>b.red-a.red||b.yellow-a.yellow);
  if(statsTeam!=='ALL') cardList=cardList.filter(c=>c.team===statsTeam);
  else if(statsGrp!=='ALL') cardList=cardList.filter(c=>GROUPS[statsGrp]?.includes(c.team));

  const titleSuffix=statsTeam!=='ALL'?`· ${tNameRanked(statsTeam)}`:statsGrp!=='ALL'?`· Group ${statsGrp}`:'';

  // ── Match history (only when a specific team is selected) ──
  let matchHistoryHTML='';
  if(statsTeam!=='ALL'){
    const played=[],upcoming=[];
    for(const m of MATCHES){
      if(m.t1!==statsTeam&&m.t2!==statsTeam)continue;
      const sc=scores[m.id]||{};
      const done=sc.s1!==undefined&&sc.s1!==null;
      const isHome=m.t1===statsTeam;
      const opp=isHome?m.t2:m.t1;
      const oppCode=TEAMS[opp]?.code||'';
      const myScore=done?(isHome?sc.s1:sc.s2):'';
      const opScore=done?(isHome?sc.s2:sc.s1):'';
      let result='';
      if(done){
        const ms=Number(myScore),os=Number(opScore);
        result=ms>os?'W':ms<os?'L':'D';
      }
      const row={m,opp,oppCode,myScore,opScore,result,done};
      if(done)played.push(row);else upcoming.push(row);
    }
    // KO matches — resolveKOSlot + b3map দিয়ে actual team বের করি
    const grps2=calcGroups();
    const b3map2=buildBest3rdMap(grps2);
    const wmap2=buildWinnerMap(grps2,b3map2);

    for(const round of KO_ROUNDS){
      for(const m of round.matches){
        const sc=scores[m.id]||{};

        // Resolve t1 and t2
        function resolveTeam(slot,side){
          if(!slot)return'';
          // Firebase stored team name
          const stored=sc[side==='s1'?'t1':'t2'];
          if(stored&&TEAMS[stored])return stored;
          // 1st/2nd place slot
          if(slot.match(/^([12])([A-L])$/))return resolveSlot(slot,grps2)||'';
          // 3rd place — use b3map with match id + side key
          if(slot.startsWith('3rd ')){
            return b3map2[`${m.id}_${side}`]||slot;
          }
          // Winner/Loser of previous match
          const wm=slot.match(/^W\s+(.+)$/i);
          if(wm)return(wmap2.winners||{})[normalizeWinKey(wm[1])]||'';
          const lm=slot.match(/^L\s+(.+)$/i);
          if(lm)return(wmap2.losers||{})[normalizeWinKey(lm[1])]||'';
          return'';
        }

        const t1=resolveTeam(m.s1,'s1');
        const t2=resolveTeam(m.s2,'s2');

        const teamInMatch=(t1===statsTeam)||(t2===statsTeam);
        if(!teamInMatch)continue;

        const done=sc.s1!==undefined&&sc.s1!==null;
        const isHome=t1===statsTeam;
        const opp=isHome?t2:t1;
        const oppSlot=isHome?m.s2:m.s1;
        const oppSide=isHome?'s2':'s1';
        const oppCode=TEAMS[opp]?.code||'';
        const myScore=done?(isHome?sc.s1:sc.s2):'';
        const opScore=done?(isHome?sc.s2:sc.s1):'';
        let result='';
        if(done){const ms=Number(myScore),os=Number(opScore);result=ms>os?'W':ms<os?'L':'D';}

        // Display-friendly opponent
        let oppDisplay,oppDisplayCode=oppCode;
        if(opp&&TEAMS[opp]){
          oppDisplay=tNameRanked(opp);
          oppDisplayCode=TEAMS[opp].code||'';
        } else if(oppSlot?.startsWith('3rd ')){
          const resolved=b3map2[`${m.id}_${oppSide}`];
          if(resolved&&TEAMS[resolved]){
            oppDisplay=tNameRanked(resolved);
            oppDisplayCode=TEAMS[resolved].code||'';
          } else {
            oppDisplay=`Best 3rd (${oppSlot.replace('3rd ','')})`;
          }
        } else if(oppSlot?.startsWith('W ')||oppSlot?.startsWith('L ')){
          oppDisplay=opp?tNameRanked(opp):`TBD`;
        } else {
          oppDisplay=opp||'TBD';
        }

  const hash=(location.hash||'#schedule').replace('#','');

// Firebase key → original TEAMS key (underscore back to dot)
function fbKeyToTeamKey(fbKey){
  // Firebase-এ "১৫_ মেক্সিকো" → TEAMS-এ "১৫. মেক্সিকো"
  return fbKey.replace(/_/g,'.');
}
// TEAMS key → Firebase key
function teamKeyToFbKey(teamKey){
  return teamKey.replace(/[.#$[\]]/g,'_');
}

function loadSquads(){
  document.getElementById('sqGrid').innerHTML=`<div class="sq-loading" style="grid-column:1/-1"><i class='fas fa-spinner fa-spin'></i> ${(window._S).sqLoading}</div>`;
  onValue(ref(db,'squads'),snap=>{
    sqData=snap.val()||{};
    sqLoaded=true;

    // Sort and pick first team
    const sorted=Object.keys(sqData).sort((a,b)=>{
      const ra=parseInt(getRank(fbKeyToTeamKey(a)))||999;
      const rb=parseInt(getRank(fbKeyToTeamKey(b)))||999;
      return ra-rb;
    });

    // Set first team as active BEFORE building buttons
    if(sorted.length>0)sqTeam=sorted[0];

    buildSqTeamBtns();

    if(sqTeam){
      // Show position filter
      const posRow=document.getElementById('sqPosRow');
      if(posRow)posRow.style.display='';
      renderSquad();
    } else {
      document.getElementById('sqGrid').innerHTML=`<div class="sq-empty" style="grid-column:1/-1">${(window._S).sqNoData}</div>`;
    }
  },{onlyOnce:true});
}

function buildSqTeamBtns(){
  const sorted=Object.keys(sqData).sort((a,b)=>{
    const ra=parseInt(getRank(fbKeyToTeamKey(a)))||999;
    const rb=parseInt(getRank(fbKeyToTeamKey(b)))||999;
    return ra-rb;
  });
  const container=document.getElementById('sqTeamBtns');
  container.innerHTML=sorted.map(fbKey=>{
    const teamKey=fbKeyToTeamKey(fbKey);
    const t=TEAMS[teamKey];
    const code=t?.code||'';
    const rank=getRank(teamKey);
    const flagHtml=code?`<img src="https://flagcdn.com/20x15/${code}.png" loading="lazy" onerror="this.style.display='none'">`:'';
    return`<button class="sq-team-btn ${sqTeam===fbKey?'on':''}" onclick="setSqTeam('${fbKey.replace(/'/g,"\\'")}')" data-key="${esc(fbKey)}">
      ${flagHtml}
      ${esc(tNameRanked(teamKey)||fbKey)}
    </button>`;
  }).join('');
}

window.setSqTeam=function(fbKey){
  sqTeam=fbKey;sqPos='ALL';
  // Update team buttons
  document.querySelectorAll('.sq-team-btn').forEach(b=>b.classList.toggle('on',b.dataset.key===fbKey));
  // Reset position buttons
  document.querySelectorAll('.sq-pos-btn').forEach((b,i)=>b.classList.toggle('on',i===0));
  // Show position filter row
  const posRow=document.getElementById('sqPosRow');
  if(posRow)posRow.style.display='';
  renderSquad();
};

  sqPos=pos;

function renderSquad(){
  if(!sqTeam||!sqData[sqTeam])return;
  const data=sqData[sqTeam];
  const teamKey=fbKeyToTeamKey(sqTeam);
  const t=TEAMS[teamKey];
  const code=t?.code||'';
  const rank=getRank(teamKey);

  // Header stats
  const players=data.players||[];
  const totalCaps=players.reduce((s,p)=>s+(p.caps||0),0);
  const totalGoals=players.reduce((s,p)=>s+(p.goals||0),0);
  const avgAge=players.length?(players.reduce((s,p)=>s+(p.age||0),0)/players.length).toFixed(1):'—';
  const captain=players.find(p=>p.captain);
  // Most capped & top scorer
  const mostCapped=[...players].sort((a,b)=>(b.caps||0)-(a.caps||0))[0];
  const topScorer=[...players].sort((a,b)=>(b.goals||0)-(a.goals||0))[0];

  const SQ=window._S;
  document.getElementById('sqHeader').innerHTML=`
    <div class="sq-header">
      <div class="sq-header-body">
        <div class="sq-header-left">
          ${code?`<img class="sq-header-flag" src="https://flagcdn.com/96x72/${code}.png" loading="lazy" onerror="this.style.display='none'">`:''}
          <div class="sq-header-info">
            <div class="sq-header-name">${tNameRanked(teamKey)}</div>
            <div class="sq-header-sub">GROUP ${data.group||'?'}</div>
          </div>
        </div>
        <div class="sq-header-right">
          <div class="sq-stat-box"><div class="sq-stat-n">${players.length}</div><div class="sq-stat-l">${SQ.sqPlayers}</div></div>
          <div class="sq-stat-box"><div class="sq-stat-n">${avgAge}</div><div class="sq-stat-l">${SQ.sqAge}</div></div>
          ${data.coach?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqCoach||'COACH'}</div><div class="sq-extra-row"><i class='fas fa-user-tie'></i><span>${esc(data.coach)}</span></div></div>`:''}
          ${captain?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqCaptain||'CAPTAIN'}</div><div class="sq-extra-row"><i class='fas fa-shield-halved'></i><span>${esc(captain.name)}</span> · #${captain.no||''} · ${captain.pos||''}</div></div>`:''}
          ${mostCapped&&mostCapped.caps?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqMostCapped}</div><div class="sq-extra-row"><i class='fas fa-trophy'></i><span>${esc(mostCapped.name)}</span> · ${mostCapped.caps} caps · ${mostCapped.pos||''}</div></div>`:''}
          ${topScorer&&topScorer.goals?`<div class="sq-extra-box"><div class="sq-extra-label">${SQ.sqTopScorer}</div><div class="sq-extra-row"><i class='fas fa-futbol'></i><span>${esc(topScorer.name)}</span> · ${topScorer.goals} ${SQ.sqGoalSuffix} · ${topScorer.pos||''}</div></div>`:''}
        </div>
      </div>
    </div>`;

  // Filter by position
  const filtered=sqPos==='ALL'?players:players.filter(p=>p.pos===sqPos);

  if(filtered.length===0){
    document.getElementById('sqGrid').innerHTML=`<div class="sq-empty" style="grid-column:1/-1">${(window._S).sqNoPos}</div>`;
    return;
  }

  document.getElementById('sqGrid').innerHTML=filtered.map(p=>`
    <div class="sq-card ${p.captain?'captain':''}">
      <div class="sq-no">
        <div style="text-align:center">
          <div>${p.no||'—'}</div>
          <div class="sq-pos-badge ${p.pos||''}">${p.pos||''}</div>
        </div>
      </div>
      <div class="sq-body">
        <div class="sq-name-row">
          <div class="sq-pname" title="${esc(p.name)}">${esc(p.name)}</div>
          ${p.captain?'<span class="sq-cap-badge">C</span>':''}
        </div>
        <div class="sq-club">
          ${clubFlagHTML(p.clubCountry)}
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.club||'—')}</span>
        </div>
        <div class="sq-meta">
          <span title="বয়স">🎂 ${p.age||'?'}</span>
          <span title="Caps"><i class='fas fa-trophy'></i> ${p.caps||0}</span>
          <span title="আন্তর্জাতিক গোল"><i class='fas fa-futbol'></i> ${p.goals||0}</span>
        </div>
      </div>
    </div>
  `).join('');
}

// Theme
window.toggleTheme=function(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('themeBtn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('theme',dark?'light':'dark');
};
(function(){
  const t=localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'🌙':'☀️';
})();

function hideLoader(){
  setTimeout(()=>{const l=document.getElementById('loader');l.classList.add('gone');setTimeout(()=>l.remove(),400);},500);
}
</script>
</body>
</html>
