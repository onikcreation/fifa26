<!DOCTYPE html>
<html lang="bn" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | FIFA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#080d18;--bg2:#0c1829;--bg3:#111f35;--card:rgba(12,24,41,0.97);--blue:#003d7a;--blue2:#004d9a;--gold:#c9a84c;--gold-l:#e8c96a;--green:#27ae60;--red:#e74c3c;--orange:#f39c12;--text:#eef2ff;--text2:#b8c4d8;--gray:#7f8fa4;--border:rgba(201,168,76,0.18);--border2:rgba(255,255,255,0.07);--shadow:rgba(0,0,0,0.5);--inp:rgba(0,0,0,0.35)}
[data-theme="light"]{--bg:#f0f4f8;--bg2:#e2eaf5;--bg3:#d5e0ef;--card:rgba(255,255,255,0.97);--blue:#1a5faa;--blue2:#2271c7;--gold:#a07828;--gold-l:#c09030;--green:#1a8a45;--red:#c0392b;--orange:#d68910;--text:#0d1b2e;--text2:#2c3e50;--gray:#5a7089;--border:rgba(160,120,40,0.25);--border2:rgba(0,0,0,0.1);--shadow:rgba(0,0,0,0.15);--inp:rgba(0,0,0,0.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh}

.login-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:200;background:var(--bg)}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:min(340px,90vw);text-align:center;box-shadow:0 20px 60px var(--shadow)}
.login-ic{font-size:3rem;margin-bottom:.8rem}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:var(--gold-l);margin-bottom:.3rem}
.login-sub{font-size:.72rem;color:var(--gray);letter-spacing:1px;margin-bottom:1.5rem}
.pw-in{width:100%;padding:.85rem;background:var(--inp);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:1rem;letter-spacing:4px;text-align:center;outline:none;transition:border .2s;margin-bottom:.8rem}
.pw-in:focus{border-color:var(--gold)}
.login-btn{width:100%;padding:.85rem;background:linear-gradient(135deg,var(--blue),#002860);border:1px solid var(--border);border-radius:8px;color:var(--gold-l);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;cursor:pointer}
.login-err{color:var(--red);font-size:.75rem;margin-top:.6rem;display:none}
.login-err.show{display:block}

.admin-wrap{display:none}.admin-wrap.show{display:block}
.hdr{background:linear-gradient(180deg,rgba(0,10,30,.98),rgba(0,10,30,.7));border-bottom:1px solid var(--border);padding:0 1rem}
.hdr-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:1rem;padding:.75rem 0}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--gold-l)}
.hdr-sub{font-size:.62rem;color:var(--gray);letter-spacing:1px;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.fb-badge{padding:.22rem .6rem;border-radius:5px;font-size:.6rem;letter-spacing:1px}
.btn-sm{font-size:.66rem;letter-spacing:1px;padding:.28rem .65rem;border-radius:5px;cursor:pointer;transition:all .2s;border:1px solid var(--border2)}
.btn-view{background:rgba(201,168,76,.1);color:var(--gold);text-decoration:none}
.btn-logout{background:rgba(231,76,60,.1);color:var(--red)}
.btn-theme{background:none;color:var(--text);cursor:pointer}

.main{max-width:1200px;margin:0 auto;padding:1rem}

/* TABS */
.admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1rem}
.admin-tab{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;padding:.7rem 1.2rem;background:none;border:none;border-bottom:3px solid transparent;color:var(--gray);cursor:pointer;margin-bottom:-2px;transition:all .2s}
.admin-tab.on{color:var(--gold-l);border-bottom-color:var(--gold)}
.admin-panel{display:none}.admin-panel.on{display:block}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.65rem 1.1rem;border-radius:8px;font-size:.8rem;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:rgba(39,174,96,.92);border:1px solid var(--green);color:#fff}
.toast.err{background:rgba(231,76,60,.92);border:1px solid var(--red);color:#fff}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.55rem;margin-bottom:1rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:.65rem;text-align:center}
.sc-n{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold-l);line-height:1}
.sc-l{font-size:.57rem;letter-spacing:1px;color:var(--gray);margin-top:2px}

/* SEC */
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--gold-l);margin-bottom:.8rem;display:flex;align-items:center;gap:.6rem}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}

/* FILTERS */
.filters{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.7rem}
.fb{font-size:.68rem;letter-spacing:.5px;padding:.25rem .65rem;background:var(--card);border:1px solid var(--border2);border-radius:20px;color:var(--gray);cursor:pointer;transition:all .2s}
.fb:hover,.fb.on{background:var(--blue);border-color:var(--gold);color:#fff}

/* BULK SAVE */
.bulk{display:flex;gap:.6rem;margin-bottom:.8rem;align-items:center;flex-wrap:wrap;background:rgba(39,174,96,.07);border:1px solid rgba(39,174,96,.2);border-radius:8px;padding:.7rem 1rem}
.bulk-info{font-size:.75rem;color:var(--text2);flex:1}
.bulk-info span{color:var(--gold-l);font-weight:700}
.bbtn{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:1px;padding:.45rem 1.1rem;border-radius:7px;cursor:pointer;transition:all .2s}
.bbtn-save{background:linear-gradient(135deg,var(--green),#1e8449);border:1px solid rgba(39,174,96,.5);color:#fff}
.bbtn-save:hover{opacity:.9}
.bbtn-save:disabled{opacity:.5;pointer-events:none}
.bbtn-clear{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.4);color:var(--red)}
.save-progress{font-size:.72rem;color:var(--gray);min-width:120px}

/* ══ ADMIN MATCH CARDS ══ */
.adm-match-sections{display:flex;flex-direction:column;gap:1.5rem;margin-bottom:1.2rem}
.adm-date-title{
  font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;
  color:var(--gold-l);margin-bottom:.7rem;
  display:flex;align-items:center;gap:.5rem;
  padding:.4rem .75rem;background:rgba(0,61,122,.2);
  border-left:3px solid var(--gold);border-radius:0 5px 5px 0;
}
.adm-match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem}
@media(max-width:900px){.adm-match-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.adm-match-grid{grid-template-columns:1fr}}
.amc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border .15s}
.amc:hover{border-color:rgba(201,168,76,.35)}
.amc.changed-card{border-color:rgba(243,156,18,.5)!important}
.amc-hdr{display:flex;justify-content:space-between;align-items:center;padding:.42rem .7rem;border-bottom:1px solid var(--border2);background:rgba(0,0,0,.1)}
.amc-grp{font-size:.57rem;font-weight:700;letter-spacing:1px;padding:.15rem .4rem;border-radius:12px;background:rgba(201,168,76,.15);color:var(--gold-l);border:1px solid rgba(201,168,76,.25)}
.amc-meta{font-size:.57rem;color:var(--gray)}
.amc-body{padding:.6rem .7rem}
.amc-teams{display:flex;align-items:center;gap:.4rem;margin-bottom:.55rem}
.amc-team{flex:1;display:flex;align-items:center;gap:.35rem;min-width:0}
.amc-team.right{flex-direction:row-reverse;text-align:right}
.amc-flag{width:22px;height:16px;object-fit:cover;border-radius:2px;flex-shrink:0}
.amc-tname{font-size:.7rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.amc-scores{display:flex;align-items:center;justify-content:center;gap:.3rem;flex-shrink:0}
.asc{width:34px;height:28px;background:var(--inp);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:.95rem;text-align:center;outline:none;transition:border .15s}
.asc:focus{border-color:var(--gold)}
.asc.filled{border-color:rgba(39,174,96,.5);background:rgba(39,174,96,.07)}
.asc.changed{border-color:rgba(243,156,18,.6);background:rgba(243,156,18,.07)}
.asc-sep{font-size:.65rem;color:var(--gray);font-weight:700}
.amc-footer{display:flex;align-items:center;gap:.4rem;padding:.4rem .7rem;border-top:1px solid var(--border2);background:rgba(0,0,0,.06)}
.amc-stadium{font-size:.57rem;color:var(--gray);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.amc-actions{display:flex;gap:.3rem;flex-shrink:0}
.sv-btn{font-size:.65rem;letter-spacing:.5px;padding:.23rem .55rem;background:var(--blue);border:1px solid var(--border);border-radius:5px;color:#fff;cursor:pointer;transition:all .2s}
.sv-btn:hover{background:var(--blue2)}
.sv-btn.saving{background:rgba(243,156,18,.2);border-color:var(--orange);color:var(--orange);pointer-events:none}
.sv-btn.saved{background:rgba(39,174,96,.15);border-color:var(--green);color:var(--green);pointer-events:none}
.cl-btn{font-size:.62rem;padding:.23rem .4rem;background:rgba(231,76,60,.07);border:1px solid rgba(231,76,60,.22);border-radius:4px;color:var(--red);cursor:pointer}
.goal-btn{font-size:.62rem;padding:.23rem .48rem;background:rgba(201,168,76,.1);border:1px solid var(--border);border-radius:4px;color:var(--gold);cursor:pointer}
.goal-btn:hover{background:rgba(201,168,76,.2)}
.changed-dot{display:inline-block;width:5px;height:5px;background:var(--orange);border-radius:50%;margin-left:3px;vertical-align:middle}

/* GOAL MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-bg.hide{display:none}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;width:min(600px,100%);max-height:90vh;overflow-y:auto;padding:1.5rem}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:var(--gold-l);margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--gray);font-size:1.2rem;cursor:pointer}
.modal-close:hover{color:var(--red)}
.modal-teams{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:500px){.modal-teams{grid-template-columns:1fr}}
.modal-team-title{font-size:.72rem;letter-spacing:1px;color:var(--gold);margin-bottom:.5rem;font-weight:700;display:flex;align-items:center;gap:.4rem}
.goal-entry{display:flex;gap:.35rem;align-items:center;margin-bottom:.35rem;flex-wrap:wrap}
.gn-in{flex:1;min-width:80px;background:var(--inp);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-size:.76rem;padding:.32rem .45rem;outline:none;transition:border .2s}
.gn-in:focus{border-color:var(--gold)}
.gm-in{width:46px;background:var(--inp);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-size:.76rem;padding:.32rem .35rem;text-align:center;outline:none}
.gm-in:focus{border-color:var(--gold)}
.pen-cb{width:13px;height:13px;cursor:pointer;accent-color:var(--orange)}
.pen-lbl{font-size:.65rem;color:var(--orange)}
.add-goal-btn{font-size:.68rem;padding:.28rem .55rem;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.3);border-radius:5px;color:var(--green);cursor:pointer;margin-top:.25rem}
.rm-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:.9rem;padding:0 .15rem;line-height:1}
.modal-save{width:100%;margin-top:1rem;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;padding:.55rem;background:linear-gradient(135deg,var(--green),#1e8449);border:1px solid rgba(39,174,96,.5);border-radius:8px;color:#fff;cursor:pointer}

/* KO CARDS */
.ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.75rem}
.ko-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ko-hd{background:rgba(0,61,122,.22);padding:.4rem .8rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.ko-rname{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1.5px;color:var(--gold)}
.ko-mid{font-size:.57rem;color:var(--gray)}
.ko-body{padding:.65rem}
.ko-date{font-size:.58rem;color:var(--gray);margin-bottom:.45rem}
.ko-tr{display:flex;align-items:center;gap:.35rem;margin-bottom:.35rem}
.ko-ti{flex:1;background:var(--inp);border:1px solid var(--border2);border-radius:5px;padding:.32rem .45rem;color:var(--text);font-size:.74rem;outline:none}
.ko-ti:focus{border-color:var(--gold)}
.ko-si{width:34px;height:27px;background:var(--inp);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:.9rem;text-align:center;outline:none}
.ko-si:focus{border-color:var(--gold)}
.ko-actions{display:flex;gap:.35rem;margin-top:.35rem}
.ko-sv{flex:1;font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1px;padding:.35rem;background:var(--blue);border:1px solid var(--border);border-radius:5px;color:#fff;cursor:pointer}
.ko-sv:hover{background:var(--blue2)}
.ko-goal-btn{font-size:.68rem;padding:.3rem .6rem;background:rgba(201,168,76,.1);border:1px solid var(--border);border-radius:5px;color:var(--gold);cursor:pointer;white-space:nowrap}
.ko-goal-btn:hover{background:rgba(201,168,76,.2)}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-ic">🔐</div>
    <div class="login-title">ADMIN LOGIN</div>
    <div class="login-sub">FIFA WORLD CUP 2026 · Al Amin Onik</div>
    <input class="pw-in" type="password" id="pwIn" placeholder="••••••••" onkeydown="if(event.key==='Enter')window.tryLogin()">
    <button class="login-btn" onclick="window.tryLogin()">LOGIN →</button>
    <div class="login-err" id="loginErr">❌ ভুল Password!</div>
  </div>
</div>

<div class="admin-wrap" id="adminWrap">
  <div class="hdr">
    <div class="hdr-in">
      <div><div class="hdr-title">⚙️ ADMIN PANEL</div><div class="hdr-sub">FIFA World Cup 2026 Score Manager</div></div>
      <div class="hdr-right">
        <span class="fb-badge" id="fbSt" style="background:rgba(0,61,122,.3);border:1px solid var(--border);color:var(--gray)">Firebase...</span>
        <button class="btn-sm btn-theme" onclick="toggleTheme()">🌙</button>
        <a href="index.html" class="btn-sm btn-view">🏠 সাইট</a>
        <button class="btn-sm btn-logout" onclick="window.doLogout()">🚪 Logout</button>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="stats-row" id="statsRow"></div>

    <!-- ADMIN TABS -->
    <div class="admin-tabs">
      <button class="admin-tab on" onclick="switchAdminTab('group',this)">📊 Group Stage</button>
      <button class="admin-tab" onclick="switchAdminTab('knockout',this)">🏅 Knockout</button>
    </div>

    <!-- GROUP STAGE PANEL -->
    <div id="ap-group" class="admin-panel on">
      <!-- BULK SAVE -->
      <div class="bulk">
        <div class="bulk-info">পরিবর্তিত: <span id="changedCount">0</span>টি ম্যাচ। একসাথে সব সেভ করতে "সব Save করো" চাপো।</div>
        <span class="save-progress" id="saveProgress"></span>
        <button class="bbtn bbtn-clear" onclick="window.confirmClear()">🗑️ Clear All</button>
        <button class="bbtn bbtn-save" id="bulkSaveBtn" onclick="window.batchSave()" disabled>💾 সব Save করো</button>
      </div>

      <div class="sec-title">গ্রুপ পর্যায় স্কোর</div>
      <div class="filters" id="gFilters"></div>
      <div class="adm-match-sections" id="mTbody"></div>
    </div>

    <!-- KNOCKOUT PANEL -->
    <div id="ap-knockout" class="admin-panel">
      <div class="sec-title">Knockout Round স্কোর</div>
      <div class="ko-grid" id="koGrid"></div>
    </div>
  </div>
</div>

<!-- GOAL MODAL -->
<div class="modal-bg hide" id="goalModal">
  <div class="modal">
    <div class="modal-title">
      <span>⚽ গোল বিস্তারিত — <span id="modalTitle"></span></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-teams" id="modalBody"></div>
    <button class="modal-save" onclick="saveGoals()">💾 গোল তথ্য সেভ করো</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,update,onValue,remove}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import{FIREBASE_CONFIG,ADMIN_PASSWORD}from'./firebase-config.js';
import{TEAMS,GROUPS,MATCHES,KO_ROUNDS}from'./data.js';

const app=initializeApp(FIREBASE_CONFIG);
const db=getDatabase(app);

const DAYS=['রবি','সোম','মঙ্গল','বুধ','বৃহঃ','শুক্র','শনি'];
const MON=['জানু','ফেব','মার্চ','এপ্রি','মে','জুন','জুলাই','আগ','সেপ্ট','অক্টো','নভে','ডিসে'];
function fD(d){const dt=new Date(d+'T00:00:00');return`${DAYS[dt.getDay()]}, ${dt.getDate()} ${MON[dt.getMonth()]}`;}
function fT(t){const[h,m]=t.split(':').map(Number);const ap=h<12?'AM':'PM';const h12=h===0?12:h>12?h-12:h;return`${h12}:${String(m).padStart(2,'0')} ${ap}`;}
function flag(name){const t=TEAMS[name];if(!t)return'';return`<img class="flag-sm" src="https://flagcdn.com/32x24/${t.code}.png" loading="lazy" onerror="this.style.display='none'">`;}

let dbSc={};
let activeGrp='ALL';
let modalMatchId=null;
let modalIsKO=false;
// Track changed rows
const pendingChanges=new Set();

// ── AUTH ──
window.tryLogin=function(){
  if(document.getElementById('pwIn').value===ADMIN_PASSWORD){
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').classList.add('show');
    sessionStorage.setItem('fa','1');
    initAdmin();
  }else{
    const e=document.getElementById('loginErr');e.classList.add('show');
    document.getElementById('pwIn').value='';
    setTimeout(()=>e.classList.remove('show'),3000);
  }
};
window.doLogout=function(){sessionStorage.removeItem('fa');location.reload();};
if(sessionStorage.getItem('fa')==='1'){
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminWrap').classList.add('show');
  initAdmin();
}

function initAdmin(){
  onValue(ref(db,'scores'),snap=>{
    dbSc=snap.val()||{};
    document.getElementById('fbSt').innerHTML='✓ Firebase';
    document.getElementById('fbSt').style.cssText='background:rgba(39,174,96,.15);border:1px solid var(--green);color:var(--green);padding:.22rem .6rem;border-radius:5px;font-size:.6rem;letter-spacing:1px';
    renderStats();
    renderTable(activeGrp);
    renderKO();
    // Re-mark pending after DB update (don't clear user's unsaved input)
  });
  renderGFilters();
}

function renderStats(){
  const pl=MATCHES.filter(m=>dbSc[m.id]?.s1!==undefined).length;
  const gl=MATCHES.reduce((s,m)=>s+(dbSc[m.id]?Number(dbSc[m.id].s1||0)+Number(dbSc[m.id].s2||0):0),0);
  document.getElementById('statsRow').innerHTML=
    `<div class="sc"><div class="sc-n">${pl}</div><div class="sc-l">স্কোর দেওয়া</div></div>
     <div class="sc"><div class="sc-n">${72-pl}</div><div class="sc-l">বাকি</div></div>
     <div class="sc"><div class="sc-n">${gl}</div><div class="sc-l">মোট গোল</div></div>
     <div class="sc"><div class="sc-n">72</div><div class="sc-l">মোট ম্যাচ</div></div>`;
}

window.switchAdminTab=function(id,btn){
  document.querySelectorAll('.admin-panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.admin-tab').forEach(b=>b.classList.remove('on'));

// ── BATCH SAVE (fixes the main bug) ──
window.batchSave=async function(){
  const btn=document.getElementById('bulkSaveBtn');
  const prog=document.getElementById('saveProgress');
  btn.disabled=true;
  const ids=[...pendingChanges];
  let done=0,errs=0;
  prog.textContent=`0/${ids.length} সেভ হচ্ছে...`;

  // Build multi-path update object for atomic write
  const updates={};
  for(const id of ids){
    const s1=document.getElementById('s1_'+id)?.value;
    const s2=document.getElementById('s2_'+id)?.value;
    if(s1===''||s2===''||s1===undefined||s2===undefined){errs++;continue;}
    const existing=dbSc[id]||{};
    updates[`scores/${id}`]={...existing,s1:Number(s1),s2:Number(s2)};
    done++;
  }

  try{
    // Single atomic write for all pending changes
    await update(ref(db),updates);
    pendingChanges.clear();
    updateChangedCount();
    prog.textContent='';
    toast(`✓ ${done}টি ম্যাচ একসাথে সেভ হয়েছে${errs?` (${errs}টি স্কিপ)`:''}`, 'ok');
    document.querySelectorAll('.asc.changed').forEach(el=>el.classList.remove('changed'));
    document.querySelectorAll('.changed-dot').forEach(el=>el.remove());
    document.querySelectorAll('.amc.changed-card').forEach(el=>el.classList.remove('changed-card'));
  }catch(e){
    prog.textContent='';
    btn.disabled=false;
    toast('সেভ ব্যর্থ হয়েছে! আবার চেষ্টা করো।','err');
  }
};

// ── Auto-populate helpers (same logic as index.html) ──
function calcGroupsAdmin(){
  const t={};
  for(const[g,teams]of Object.entries(GROUPS)){t[g]={};for(const tm of teams)t[g][tm]={pl:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};}
  for(const m of MATCHES){
    const sc=dbSc[m.id];if(!sc||sc.s1===undefined)continue;
    const tbl=t[m.grp];if(!tbl||!tbl[m.t1]||!tbl[m.t2])continue;
    const s1=Number(sc.s1),s2=Number(sc.s2);
    tbl[m.t1].pl++;tbl[m.t2].pl++;tbl[m.t1].gf+=s1;tbl[m.t1].ga+=s2;tbl[m.t2].gf+=s2;tbl[m.t2].ga+=s1;
    if(s1>s2){tbl[m.t1].w++;tbl[m.t1].pts+=3;tbl[m.t2].l++;}
    else if(s1<s2){tbl[m.t2].w++;tbl[m.t2].pts+=3;tbl[m.t1].l++;}
    else{tbl[m.t1].d++;tbl[m.t1].pts++;tbl[m.t2].d++;tbl[m.t2].pts++;}
  }
  const s={};
  for(const[g,tbl]of Object.entries(t)){s[g]=Object.entries(tbl).map(([n,v])=>({name:n,...v,gd:v.gf-v.ga})).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);}
  return s;
}
function resolveSlotAdmin(slot,grps){
  if(!slot)return'';
  if(TEAMS[slot])return slot;
  const m1=slot.match(/^([12])([A-L])$/);
  if(m1){const rank=parseInt(m1[1])-1;const grp=m1[2];const team=grps[grp]?.[rank];return(team&&team.pl>0)?team.name:'';}
  return'';
}
function buildB3MapAdmin(grps){
  const allThirds=Object.entries(grps)
    .map(([g,teams])=>teams[2]?{...teams[2],group:g}:null)
    .filter(t=>t&&t.pl>0)
    .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
  const map={};
  const used=new Set();
  for(const m of KO_ROUNDS[0].matches){
    ['s1','s2'].forEach(side=>{
      const slot=m[side];
      if(!slot||!slot.startsWith('3rd '))return;
      const allowedGroups=slot.replace('3rd ','').split('');
      const candidate=allThirds.find(t=>allowedGroups.includes(t.group)&&!used.has(t.name));
      if(candidate){map[`${m.id}_${side}`]=candidate.name;used.add(candidate.name);}
    });
  }
  return map;
}

function normalizeWinKey(raw){
  return raw.trim().toLowerCase().replace(/\s+/g,'').replace(/-/g,'_');
}
function buildWinnerMapAdmin(grps,b3map){
  const winners={};
  const losers={};
  const allMatches=KO_ROUNDS.flatMap(r=>r.matches);
  for(const m of allMatches){
    const sc=dbSc[m.id]||{};
    if(sc.s1===undefined||sc.s1===null)continue;
    let t1=sc.t1||'';let t2=sc.t2||'';
    if(!t1){
      if(m.s1?.startsWith('3rd '))t1=b3map[`${m.id}_s1`]||'';
      else{
        const rs=resolveSlotAdmin(m.s1,grps);
        if(rs)t1=rs;
        else{
          const wm=m.s1?.match(/^W\s+(.+)$/i);if(wm)t1=winners[normalizeWinKey(wm[1])]||'';
          if(!t1){const lm=m.s1?.match(/^L\s+(.+)$/i);if(lm)t1=losers[normalizeWinKey(lm[1])]||'';}
        }
      }
    }
    if(!t2){
      if(m.s2?.startsWith('3rd '))t2=b3map[`${m.id}_s2`]||'';
      else{
        const rs=resolveSlotAdmin(m.s2,grps);
        if(rs)t2=rs;
        else{
          const wm=m.s2?.match(/^W\s+(.+)$/i);if(wm)t2=winners[normalizeWinKey(wm[1])]||'';
          if(!t2){const lm=m.s2?.match(/^L\s+(.+)$/i);if(lm)t2=losers[normalizeWinKey(lm[1])]||'';}
        }
      }
    }
    const s1=Number(sc.s1),s2=Number(sc.s2);
    const pen1=sc.pen1!==undefined?Number(sc.pen1):null,pen2=sc.pen2!==undefined?Number(sc.pen2):null;
    const et1=sc.et1!==undefined?Number(sc.et1):null,et2=sc.et2!==undefined?Number(sc.et2):null;
    let winner='',loser='';
    if(pen1!==null&&pen2!==null){winner=pen1>pen2?t1:t2;loser=pen1>pen2?t2:t1;}
    else if(et1!==null&&et2!==null){const w=(s1+et1)>(s2+et2);winner=w?t1:t2;loser=w?t2:t1;}
    else{winner=s1>s2?t1:s2>s1?t2:'';loser=s1>s2?t2:s2>s1?t1:'';}
    if(winner)winners[m.id]=winner;
    if(loser)losers[m.id]=loser;
  }
  return{winners,losers};
}
function resolveWinSlot(slot,wmap){
  if(!slot)return'';
  const wm=slot.match(/^W\s+(.+)$/i);
  if(wm)return(wmap.winners||{})[normalizeWinKey(wm[1])]||'';
  const lm=slot.match(/^L\s+(.+)$/i);
  if(lm)return(wmap.losers||{})[normalizeWinKey(lm[1])]||'';
  return'';
}

window.saveKO=async function(id){
  const t1=document.getElementById('kt1_'+id)?.value?.trim();
  const t2=document.getElementById('kt2_'+id)?.value?.trim();
  const s1=document.getElementById('ks1_'+id)?.value;
  const s2=document.getElementById('ks2_'+id)?.value;
  const data={};
  if(t1)data.t1=t1;if(t2)data.t2=t2;
  if(s1!=='')data.s1=Number(s1);if(s2!=='')data.s2=Number(s2);
  // ET
  const etOn=document.getElementById('etC_'+id)?.checked;
  if(etOn){
    const et1=document.getElementById('ket1_'+id)?.value;
    const et2=document.getElementById('ket2_'+id)?.value;
    if(et1!=='')data.et1=Number(et1);if(et2!=='')data.et2=Number(et2);
  } else {delete data.et1;delete data.et2;}
  // Penalty
  const penOn=document.getElementById('penC_'+id)?.checked;
  if(penOn){
    const p1=document.getElementById('kp1_'+id)?.value;
    const p2=document.getElementById('kp2_'+id)?.value;
    if(p1!=='')data.pen1=Number(p1);if(p2!=='')data.pen2=Number(p2);
  } else {delete data.pen1;delete data.pen2;}
  if(!Object.keys(data).length){toast('কিছু একটা দিন!','err');return;}
  try{
    const ex=dbSc[id]||{};
    const newData={...ex,...data};
    if(!etOn){delete newData.et1;delete newData.et2;}
    if(!penOn){delete newData.pen1;delete newData.pen2;}
    await set(ref(db,'scores/'+id),newData);
    toast(`${id} সেভ ✓`,'ok');
  }catch(e){toast('সেভ ব্যর্থ!','err');}
};

window.closeModal=function(){document.getElementById('goalModal').classList.add('hide');modalMatchId=null;};

window.saveGoals=async function(){
  if(!modalMatchId)return;
  function collect(side){
    const c=document.getElementById('glist_'+side);if(!c)return[];
    return Array.from(c.children).map(row=>{
      const parts=row.id.split('_');const i=parts[parts.length-1];const s=parts[1];
      const name=document.getElementById(`gn_${s}_${i}`)?.value?.trim()||'';
      const min=Number(document.getElementById(`gm_${s}_${i}`)?.value||0);
      const pen=document.getElementById(`gp_${s}_${i}`)?.checked||false;
      return name?{name,min,pen}:null;
    }).filter(Boolean);
  }
  try{
    const ex=dbSc[modalMatchId]||{};
    await set(ref(db,'scores/'+modalMatchId),{...ex,goals1:collect('t1'),goals2:collect('t2')});
    toast('গোল তথ্য সেভ হয়েছে ✓','ok');
    closeModal();
  }catch(e){toast('গোল সেভ ব্যর্থ!','err');}
};

// ── THEME ──
window.toggleTheme=function(){
  const html=document.documentElement;
  const dark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',dark?'light':'dark');
  localStorage.setItem('theme',dark?'light':'dark');
};
(function(){const t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();

function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3500);
}

// expose markChanged globally
window.markChanged=function(id){
  pendingChanges.add(id);updateChangedCount();
  document.getElementById('s1_'+id)?.classList.add('changed');
  document.getElementById('s2_'+id)?.classList.add('changed');
  document.getElementById('tr-'+id)?.classList.add('changed-card');
};
</script>
